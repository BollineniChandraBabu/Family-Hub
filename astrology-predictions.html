<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script src="location-guard.js"></script>
  <title>Astrology Predictions • Family Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080814;
      --bg-2: #10102a;
      --card: rgba(19, 22, 55, 0.7);
      --card-border: rgba(174, 137, 255, 0.24);
      --text: #efeaff;
      --muted: #b4acd9;
      --accent-1: #b388ff;
      --accent-2: #6dc7ff;
      --accent-3: #ffb86d;
      --shadow: 0 15px 40px rgba(3, 4, 24, 0.45);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(50% 45% at 15% 10%, rgba(179, 136, 255, 0.25) 0%, rgba(179, 136, 255, 0) 100%),
        radial-gradient(48% 55% at 90% 0%, rgba(109, 199, 255, 0.24) 0%, rgba(109, 199, 255, 0) 100%),
        radial-gradient(42% 40% at 50% 100%, rgba(255, 184, 109, 0.16) 0%, rgba(255, 184, 109, 0) 100%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
      overflow-x: hidden;
    }

    .stars, .stars::before, .stars::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
      animation: twinkle 10s linear infinite;
    }
    .stars {
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,.75) 0 1px, transparent 2px),
                        radial-gradient(circle at 70% 60%, rgba(255,255,255,.6) 0 1px, transparent 2px),
                        radial-gradient(circle at 30% 80%, rgba(255,255,255,.5) 0 1px, transparent 2px);
      background-size: 260px 220px;
    }
    .stars::before { opacity: .35; background-size: 190px 190px; animation-duration: 15s; }
    .stars::after  { opacity: .2;  background-size: 320px 280px; animation-duration: 20s; }

    @keyframes twinkle {
      0%,100% { opacity: .6; transform: translateY(0); }
      50% { opacity: .95; transform: translateY(-8px); }
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #060611, #111034);
      transition: opacity .7s var(--ease), visibility .7s var(--ease);
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-box {
      width: min(320px, 88vw);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: riseIn .7s var(--spring) both;
    }
    .loader-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      animation: pulseGlow 1.6s ease-in-out infinite;
    }
    .loader-title {
      font-family: 'Cinzel', serif;
      letter-spacing: .08em;
      margin-bottom: 16px;
      font-size: 1rem;
    }
    .loader-track {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.12);
    }
    .loader-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      animation: fillTrack 1.2s var(--ease) forwards;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .7s var(--ease), transform .7s var(--ease);
      padding: clamp(20px, 5vw, 40px);
    }
    #app.ready { opacity: 1; transform: translateY(0); }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      background: linear-gradient(165deg, rgba(11, 14, 42, .84), rgba(20, 24, 64, .74));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: riseIn .8s var(--spring) .1s both;
    }

    .head {
      padding: clamp(24px, 4vw, 34px);
      border-bottom: 1px solid rgba(255,255,255,.12);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      justify-content: space-between;
    }
    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.2rem, 2.6vw, 2rem);
      letter-spacing: .03em;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: .95rem;
    }

    .picker {
      min-width: min(330px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color .25s var(--ease), transform .25s var(--ease);
    }
    .picker:focus-within {
      border-color: var(--accent-2);
      transform: translateY(-2px);
    }
    .picker label {
      color: var(--muted);
      font-size: .86rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    select {
      appearance: none;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-weight: 600;
      padding-right: 10px;
      outline: none;
      cursor: pointer;
    }
    option { color: #18132e; }

    .viewer-wrap {
      padding: clamp(14px, 2.5vw, 24px);
    }

    .viewer-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      min-height: 72vh;
      position: relative;
      transition: transform .35s var(--spring), box-shadow .35s var(--ease);
    }
    .viewer-card.loading {
      transform: scale(.996);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .pdf-loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(8, 8, 20, .78), rgba(16, 16, 42, .82));
      z-index: 3;
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s var(--ease), visibility .25s var(--ease);
    }
    .viewer-card.loading .pdf-loader {
      opacity: 1;
      visibility: visible;
    }
    .spinner {
      width: 54px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,.14);
      border-top-color: var(--accent-2);
      animation: spin 1s linear infinite;
      margin-inline: auto;
      margin-bottom: 14px;
    }
    .pdf-loader p {
      color: #ece9ff;
      font-size: .92rem;
      letter-spacing: .03em;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 72vh;
      border: none;
      display: block;
      background: #fff;
      animation: fadeIn .45s var(--ease);
    }

    .foot {
      padding: 16px 22px 22px;
      text-align: center;
      color: var(--muted);
      font-size: .83rem;
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(8, 8, 20, .42);
      letter-spacing: .02em;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fillTrack { to { width: 100%; } }
    @keyframes pulseGlow {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(179,136,255,.4)); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 16px rgba(109,199,255,.55)); }
    }

    @media (max-width: 720px) {
      .head { align-items: flex-start; }
      .picker { width: 100%; min-width: 100%; }
      iframe, .viewer-card { min-height: 64vh; }
      iframe { height: 64vh; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <div id="loader" role="status" aria-live="polite">
    <div class="loader-box">
      <div class="loader-icon">🔮</div>
      <div class="loader-title">Preparing Astrology Experience</div>
      <div class="loader-track"><div class="loader-fill"></div></div>
    </div>
  </div>

  <main id="app" aria-label="Astrology predictions viewer">
    <section class="shell">
      <header class="head">
        <div>
          <h1 class="title">Astrology Predictions</h1>
          <p class="subtitle">Choose a profile below and view the corresponding prediction file.</p>
        </div>

        <div class="picker">
          <label for="profileSelect">Profile</label>
          <select id="profileSelect" aria-label="Select astrology file">
            <option value="yokshith">Yokshith</option>
            <option value="chandu">Chandu</option>
            <option value="sindhu">Sindhu</option>
          </select>
        </div>
      </header>

      <div class="viewer-wrap">
        <article class="viewer-card loading" id="viewerCard">
          <div class="pdf-loader" id="pdfLoader">
            <div>
              <div class="spinner"></div>
              <p>Loading prediction file…</p>
            </div>
          </div>
          <iframe id="pdfFrame" title="Astrology prediction PDF" loading="eager"></iframe>
        </article>
      </div>

      <footer class="foot">
        © <span id="year"></span> Family Hub. All rights reserved.
      </footer>
    </section>
  </main>

  <script>
    const FILES = {
      yokshith: 'assets/astro/yokshith.pdf',
      chandu: 'assets/astro/chandu.pdf',
      sindhu: 'assets/astro/sindhu.pdf'
    };

    const SELECT = document.getElementById('profileSelect');
    const FRAME = document.getElementById('pdfFrame');
    const VIEWER_CARD = document.getElementById('viewerCard');
    const PAGE_LOADER = document.getElementById('loader');
    const APP = document.getElementById('app');

    const getPdfUrl = (key) => `${FILES[key]}#toolbar=0&navpanes=0&scrollbar=0&view=FitH`;

    const showPdfLoader = () => VIEWER_CARD.classList.add('loading');
    const hidePdfLoader = () => VIEWER_CARD.classList.remove('loading');

    const loadPrediction = (key) => {
      if (!FILES[key]) return;
      showPdfLoader();
      FRAME.src = getPdfUrl(key);
    };

    FRAME.addEventListener('load', () => {
      setTimeout(hidePdfLoader, 250);
    });

    SELECT.addEventListener('change', (event) => {
      loadPrediction(event.target.value);
    });

    window.addEventListener('load', () => {
      document.getElementById('year').textContent = new Date().getFullYear();
      loadPrediction(SELECT.value);

      setTimeout(() => {
        PAGE_LOADER.classList.add('hidden');
        APP.classList.add('ready');
      }, 900);
    });
  </script>
</body>
</html>
