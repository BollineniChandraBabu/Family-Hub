<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yokshith — Our Little Superstar ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ BASE ══ */
:root {
  --bg:       #FFFDF7;
  --bg2:      #F5F8FF;
  --card:     #FFFFFF;
  --cshadow:  0 2px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --cborder:  rgba(0,0,0,.07);
  --text:     #18181b;
  --body:     #3f3f46;
  --muted:    #a1a1aa;
  --ease:     cubic-bezier(.4,0,.2,1);
  --spring:   cubic-bezier(.34,1.56,.64,1);
  --yr1:      #FF6B35;
  --yr2:      #FFD23F;
  --yr3:      #06D6A0;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body {
  font-family:'Nunito',sans-serif;
  background: var(--page-bg, linear-gradient(140deg,#FFFDF7 0%,#F5F8FF 60%,#FFF5FB 100%));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
a { color:inherit; text-decoration:none; }
button { cursor:pointer; border:none; background:none; font:inherit; }

/* ══ LOADER ══ */
#loader {
  position:fixed; inset:0; z-index:9999;
  background: linear-gradient(140deg,#FFFDF7 0%,#FFF0E8 50%,#F5F8FF 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity 1s var(--ease), visibility 1s var(--ease);
}
#loader.out { opacity:0; visibility:hidden; pointer-events:none; }

.ld-rings { position:relative; width:160px; height:160px; margin-bottom:24px; }
.ld-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid transparent; animation:ldSpin 3s linear infinite;
}
.ld-ring-1 { border-top-color:#FF6B35; border-right-color:rgba(255,107,53,.2); animation-duration:3s; }
.ld-ring-2 { inset:14px; border-top-color:#FFD23F; border-left-color:rgba(255,210,63,.25); animation-duration:2s; animation-direction:reverse; }
.ld-ring-3 { inset:28px; border-top-color:#9B5DE5; border-bottom-color:rgba(155,93,229,.2); animation-duration:1.5s; }
.ld-center {
  position:absolute; inset:42px;
  background: linear-gradient(135deg,#FF6B35,#FFD23F);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; animation:ldPulse 1.5s ease-in-out infinite;
  box-shadow: 0 4px 20px rgba(255,107,53,.3);
}
@keyframes ldSpin { to { transform:rotate(360deg); } }
@keyframes ldPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

.ld-name {
  font-family:'Baloo 2',cursive; font-size:clamp(2rem,8vw,3rem); font-weight:800;
  background:linear-gradient(135deg,#FF6B35,#FFD23F,#F72585,#9B5DE5);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px; opacity:0; animation:ldUp .8s var(--spring) forwards .4s;
}
.ld-sub {
  font-size:.75rem; font-weight:700; letter-spacing:.35em; text-transform:uppercase;
  color:var(--muted); opacity:0; animation:ldFade .6s ease forwards .7s;
}
.ld-progress-wrap {
  width:min(180px,55vw); height:3px; background:rgba(0,0,0,.06); border-radius:4px;
  overflow:hidden; margin-top:28px; opacity:0; animation:ldFade .5s ease forwards .9s;
}
.ld-progress {
  height:100%; width:0; background:linear-gradient(90deg,#FF6B35,#FFD23F,#9B5DE5);
  border-radius:4px; animation:ldFill 1.8s var(--ease) forwards 1s;
}
@keyframes ldFill { from{width:0} to{width:100%} }
.ld-dots { display:flex; gap:8px; margin-top:16px; opacity:0; animation:ldFade .5s ease forwards 1.1s; }
.ld-dot {
  width:7px; height:7px; border-radius:50%;
  animation:ldBounce 1.2s ease-in-out infinite alternate;
}
.ld-dot:nth-child(1){ background:#FF6B35; animation-delay:0s; }
.ld-dot:nth-child(2){ background:#FFD23F; animation-delay:.2s; }
.ld-dot:nth-child(3){ background:#9B5DE5; animation-delay:.4s; }
@keyframes ldBounce { from{transform:scale(.6);opacity:.3;} to{transform:scale(1.3);opacity:1;} }
@keyframes ldUp { from{opacity:0;transform:translateY(16px) scale(.9);} to{opacity:1;transform:none;} }
@keyframes ldFade { from{opacity:0;} to{opacity:1;} }

/* ══ CANVAS / OVERLAY ══ */
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#float-layer { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
#confetti { position:fixed; inset:0; z-index:20; pointer-events:none; }

/* ══ APP ══ */
#app { position:relative; z-index:10; opacity:0; transition:opacity .8s ease; }
#app.in { opacity:1; }

/* ══ TRANSITIONS ══ */
.page-enter { animation:pageIn .6s var(--ease) forwards; }
.page-exit { animation:pageOut .35s var(--ease) forwards; }
@keyframes pageIn { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:none;} }
@keyframes pageOut { from{opacity:1;transform:none;} to{opacity:0;transform:translateY(-12px);} }

/* ══ LAYOUT ══ */
.sec { padding:clamp(50px,8vw,90px) clamp(16px,5vw,60px); position:relative; }
.sec-inner { max-width:720px; margin:0 auto; }
.sec-wide { max-width:960px; margin:0 auto; }
.sec-alt { background:rgba(0,0,0,.018); border-top:1px solid rgba(0,0,0,.05); border-bottom:1px solid rgba(0,0,0,.05); }

.sec-label {
  display:flex; align-items:center; gap:14px; margin-bottom:clamp(32px,5vw,52px);
}
.sl-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--yr1,#FF6B35)); opacity:.3; }
.sl-line-r { background:linear-gradient(to left,transparent,var(--yr1,#FF6B35)); }
.sl-text {
  font-family:'Space Grotesk',sans-serif; font-size:.7rem; font-weight:600;
  letter-spacing:.38em; text-transform:uppercase; white-space:nowrap;
  color:var(--yr1,#FF6B35); padding:5px 18px;
  border:1.5px solid var(--yr1,#FF6B35); border-radius:50px;
  background:rgba(255,107,53,.06);
}

/* Scroll reveal */
.sr { opacity:0; transform:translateY(26px); transition:opacity .75s var(--ease),transform .75s var(--ease); }
.sr.in { opacity:1; transform:none; }
.sr-delay-1 { transition-delay:.1s; }
.sr-delay-2 { transition-delay:.2s; }
.sr-delay-3 { transition-delay:.3s; }

/* ══ HERO ══ */
.hero {
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center;
  padding:clamp(90px,14vw,160px) clamp(16px,5vw,60px) clamp(70px,10vw,120px);
  position:relative; overflow:hidden;
}
.hero-bg-blob {
  position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none;
  animation:blobDrift 8s ease-in-out infinite alternate;
}
@keyframes blobDrift {
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(30px,-20px) scale(1.08);}
}
.hero-eyebrow {
  font-family:'Space Grotesk',sans-serif; font-size:.65rem; font-weight:600;
  letter-spacing:.5em; text-transform:uppercase; color:var(--yr1,#FF6B35);
  margin-bottom:16px; opacity:0; animation:ldFade .8s ease forwards 2.6s;
  background:rgba(255,107,53,.08); padding:6px 16px; border-radius:50px;
  border:1px solid rgba(255,107,53,.18);
}
.hero-emojis {
  display:flex; gap:clamp(10px,3vw,22px); justify-content:center;
  margin-bottom:clamp(18px,3vw,28px); opacity:0; animation:ldUp .8s var(--spring) forwards 2.8s;
}
.emoji-float {
  font-size:clamp(2rem,7vw,3.8rem); display:inline-block;
  animation:emojiDance 2.4s ease-in-out infinite alternate;
}
.emoji-float:nth-child(1){animation-delay:0s;}
.emoji-float:nth-child(2){animation-delay:.25s;}
.emoji-float:nth-child(3){animation-delay:.5s;}
.emoji-float:nth-child(4){animation-delay:.75s;}
.emoji-float:nth-child(5){animation-delay:1s;}
@keyframes emojiDance {
  0%{transform:translateY(0) rotate(-8deg) scale(1);}
  100%{transform:translateY(-16px) rotate(8deg) scale(1.12);}
}
.hero-title-l1 {
  display:block; font-family:'Baloo 2',cursive;
  font-size:clamp(3.2rem,14vw,9rem); font-weight:800; line-height:.95;
  background:linear-gradient(135deg,var(--yr1,#FF6B35) 0%,var(--yr2,#FFD23F) 60%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 2px 16px rgba(255,107,53,.18));
  opacity:0; animation:ldUp 1s var(--spring) forwards 3s;
}
.hero-title-l2 {
  display:block; font-family:'Baloo 2',cursive;
  font-size:clamp(1.8rem,8vw,5rem); font-weight:600; line-height:1.1;
  color:var(--body); opacity:0; animation:ldUp .9s var(--spring) forwards 3.2s;
  margin-top:6px;
}
.hero-badge {
  display:inline-flex; align-items:center; gap:10px;
  margin:clamp(16px,3vw,26px) 0;
  padding:12px 28px; border-radius:60px;
  background:var(--card); border:1.5px solid rgba(0,0,0,.08);
  box-shadow:var(--cshadow);
  opacity:0; animation:ldUp .9s var(--spring) forwards 3.4s;
}
.hb-label { font-size:.58rem; font-weight:700; letter-spacing:.35em; text-transform:uppercase; color:var(--muted); }
.hb-name { font-family:'Baloo 2',cursive; font-size:clamp(1.2rem,3.5vw,1.7rem); font-weight:700; color:var(--yr1,#FF6B35); }
.hb-sep { color:rgba(0,0,0,.12); }

.hero-tagline {
  max-width:520px; font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(1.1rem,3.5vw,1.45rem); font-weight:600; color:var(--body);
  line-height:1.8; margin-bottom:clamp(24px,4vw,44px);
  opacity:0; animation:ldFade .9s ease forwards 3.6s;
}

/* Age Ring */
.age-ring-wrap {
  position:relative; display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:clamp(28px,5vw,50px);
  opacity:0; animation:ldUp .9s var(--spring) forwards 3.8s;
}
.age-ring-svg { animation:ldSpin 15s linear infinite; }
.age-center { position:absolute; display:flex; flex-direction:column; align-items:center; }
.age-num-big {
  font-family:'Baloo 2',cursive; font-size:clamp(2.2rem,7vw,3.4rem); font-weight:800;
  line-height:1; color:var(--yr1,#FF6B35);
}
.age-num-label {
  font-family:'Space Grotesk',sans-serif; font-size:.5rem; font-weight:600;
  letter-spacing:.3em; text-transform:uppercase; color:var(--muted); margin-top:3px;
}

.scroll-cue {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  opacity:0; animation:ldFade 1s ease forwards 4.6s;
}
.sc-txt { font-size:.52rem; font-weight:700; letter-spacing:.45em; text-transform:uppercase; color:var(--muted); }
.sc-arr { width:1px; height:36px; background:linear-gradient(to bottom,var(--muted),transparent); animation:scBob 2s ease-in-out infinite; }
@keyframes scBob { 0%,100%{transform:scaleY(1);opacity:.6;} 50%{transform:scaleY(.7);opacity:1;} }

/* ══ POEM ══ */
.poem-card {
  background:var(--card); border-radius:28px; padding:clamp(30px,5vw,52px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  text-align:center; position:relative; overflow:hidden;
}
.poem-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,107,53,.04),rgba(155,93,229,.03));
  pointer-events:none;
}
.poem-deco { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yr1,#FF6B35),var(--yr2,#FFD23F),var(--yr3,#06D6A0)); border-radius:28px 28px 0 0; }
.poem-icon { font-size:clamp(2.2rem,6vw,3.2rem); display:block; margin-bottom:20px; animation:emojiDance 3s ease-in-out infinite alternate; }
.poem-line {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
  font-size:clamp(1.05rem,3.2vw,1.3rem); color:var(--body); line-height:2.2; display:block;
}
.poem-line em { font-style:normal; color:var(--yr1,#FF6B35); font-weight:600; }
.poem-attr {
  font-family:'Space Grotesk',sans-serif; font-size:.58rem; font-weight:600;
  letter-spacing:.35em; text-transform:uppercase; color:var(--muted);
  margin-top:24px; display:flex; align-items:center; justify-content:center; gap:10px;
}
.poem-attr::before,.poem-attr::after { content:''; width:28px; height:1px; background:var(--muted); opacity:.4; }

/* ══ MESSAGE ══ */
.msg-card {
  background:var(--card); border-radius:28px; padding:clamp(30px,5vw,52px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  position:relative; overflow:hidden;
}
.msg-stripe { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yr1),var(--yr2),var(--yr3),var(--yr1)); }
.msg-icon { font-size:clamp(1.8rem,5vw,2.4rem); display:block; margin-bottom:22px; text-align:center; animation:emojiDance 3.5s ease-in-out infinite alternate; }
.msg-p {
  font-family:'Nunito',sans-serif; font-size:clamp(1rem,3vw,1.15rem); font-weight:600;
  color:var(--body); line-height:1.95; margin-bottom:20px; text-align:center;
}
.msg-p:last-child { margin-bottom:0; }
.msg-p em { font-style:normal; color:var(--yr1,#FF6B35); font-weight:800; }
.msg-p strong { color:var(--text); font-weight:800; }

/* ══ MILESTONE ══ */
.milestone {
  background:var(--card); border-radius:24px; padding:clamp(24px,4vw,40px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  display:flex; gap:20px; align-items:flex-start; position:relative; overflow:hidden;
}
.milestone::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--yr2),var(--yr1)); }
.ms-emo { font-size:clamp(2.2rem,6vw,3rem); flex-shrink:0; margin-top:3px; animation:emojiDance 2.8s ease-in-out infinite alternate; }
.ms-eyebrow { font-family:'Space Grotesk',sans-serif; font-size:.58rem; font-weight:600; letter-spacing:.4em; text-transform:uppercase; color:var(--yr2,#FFD23F); margin-bottom:6px; }
.ms-title { font-family:'Baloo 2',cursive; font-size:clamp(1.05rem,3.5vw,1.35rem); font-weight:700; color:var(--text); margin-bottom:8px; }
.ms-text { font-size:.93rem; font-weight:600; color:var(--body); line-height:1.8; }

/* ══ HIGHLIGHT STRIPS ══ */
.highlights { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.hl-card {
  background:var(--card); border-radius:18px; padding:22px 18px;
  text-align:center; box-shadow:var(--cshadow); border:1px solid var(--cborder);
  transition:transform .35s var(--spring),box-shadow .35s;
}
.hl-card:hover { transform:translateY(-6px); box-shadow:0 12px 40px rgba(0,0,0,.1); }
.hl-emoji { font-size:1.9rem; display:block; margin-bottom:10px; animation:emojiDance 2s ease-in-out infinite alternate; }
.hl-num { font-family:'Baloo 2',cursive; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:800; color:var(--yr1,#FF6B35); line-height:1; }
.hl-lbl { font-size:.7rem; font-weight:700; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.15em; }
@media(max-width:500px){ .highlights{grid-template-columns:repeat(3,1fr);gap:10px;} }

/* ══ WISHES GRID ══ */
.wishes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr)); gap:14px; }
.wish-card {
  background:var(--card); border-radius:20px; padding:26px 18px;
  border:1.5px solid var(--cborder); text-align:center;
  box-shadow:var(--cshadow);
  transition:transform .4s var(--spring),box-shadow .4s,border-color .3s;
  cursor:default;
}
.wish-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 20px 50px rgba(0,0,0,.1); border-color:var(--yr1,#FF6B35); }
.wc-emoji { font-size:2rem; display:block; margin-bottom:12px; animation:emojiDance 2.2s ease-in-out infinite alternate; }
.wc-title { font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:700; margin-bottom:6px; }
.wc-text { font-size:.82rem; font-weight:600; color:var(--body); line-height:1.7; }

/* ══ CONFETTI BUTTON ══ */
.confetti-btn {
  font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:700;
  color:#fff; padding:16px 44px; border-radius:60px;
  background:linear-gradient(135deg,var(--yr1,#FF6B35),var(--yr2,#FFD23F));
  box-shadow:0 6px 28px rgba(255,107,53,.3);
  transition:transform .25s var(--spring),box-shadow .25s; cursor:pointer;
}
.confetti-btn:hover { transform:translateY(-4px) scale(1.04); box-shadow:0 14px 40px rgba(255,107,53,.35); }

/* ══ YEAR NAV ══ */
.year-nav { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
.yn-btn {
  display:flex; align-items:center; gap:8px;
  padding:12px 26px; border-radius:50px;
  font-family:'Space Grotesk',sans-serif; font-size:.85rem; font-weight:600;
  border:1.5px solid var(--cborder); background:var(--card); color:var(--body);
  box-shadow:var(--cshadow); transition:all .3s var(--ease);
}
.yn-btn:hover { background:var(--yr1,#FF6B35); border-color:var(--yr1,#FF6B35); color:#fff; transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,0,0,.15); }
.yn-btn.home:hover { background:var(--yr3,#06D6A0); border-color:var(--yr3,#06D6A0); }

/* ══ LOCKED BOX ══ */
.locked-box {
  max-width:400px; margin:0 auto; padding:36px 28px; text-align:center;
  background:var(--card); border-radius:24px; box-shadow:var(--cshadow);
  border:2px dashed rgba(0,0,0,.1);
}
.locked-emoji { font-size:2.8rem; display:block; margin-bottom:14px; animation:emojiDance 2s ease-in-out infinite alternate; }
.locked-title { font-family:'Baloo 2',cursive; font-size:1.25rem; font-weight:700; color:var(--yr1,#FF6B35); margin-bottom:10px; }
.locked-text { font-size:.88rem; font-weight:600; color:var(--body); line-height:1.8; }

.past-chip {
  display:inline-flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;
  padding:9px 22px; border-radius:50px; background:rgba(255,107,53,.07);
  border:1px solid rgba(255,107,53,.2); font-family:'Space Grotesk',sans-serif;
  font-size:.8rem; font-weight:600; color:var(--body); margin-bottom:24px;
}
.past-back-btn {
  background:var(--yr1,#FF6B35); color:#fff; border:none; padding:5px 16px;
  border-radius:50px; font-family:'Space Grotesk',sans-serif; font-size:.75rem;
  font-weight:700; cursor:pointer; transition:transform .2s;
}
.past-back-btn:hover { transform:scale(1.05); }

/* ══ WAITING PAGE ══ */
.wait-hero {
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center;
  padding:clamp(90px,14vw,160px) clamp(16px,5vw,60px) clamp(80px,10vw,130px);
  position:relative; overflow:hidden;
}
.wait-icon { font-size:clamp(4.5rem,14vw,7rem); display:block; margin-bottom:24px; animation:rocketBounce 2.5s ease-in-out infinite; filter:drop-shadow(0 4px 20px rgba(255,107,53,.2)); }
@keyframes rocketBounce { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-24px) rotate(8deg);} }
.wait-title {
  font-family:'Baloo 2',cursive; font-size:clamp(2.5rem,11vw,6.5rem); font-weight:800; line-height:1.05;
  background:linear-gradient(135deg,#FF6B35,#FFD23F,#F72585,#9B5DE5);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:12px; opacity:0; animation:ldUp 1s var(--spring) forwards .2s;
}
.wait-sub {
  font-size:clamp(.95rem,3.5vw,1.15rem); font-weight:700; color:var(--body);
  margin-bottom:44px; max-width:500px; line-height:1.8;
  opacity:0; animation:ldFade .9s ease forwards .5s;
}
.wait-sub em { color:var(--yr1,#FF6B35); font-style:normal; font-weight:800; }

/* Countdown widget */
.cd-card {
  background:var(--card); border-radius:28px; padding:clamp(24px,4vw,40px) clamp(28px,5vw,52px);

    primary: "#0055A5", secondary: "#F4D03F", tertiary: "#4CC9F0",
    bg: "linear-gradient(140deg,#F0F6FF 0%,#FFFDF0 50%,#F0FBFF 100%)",

    ring1: "#0055A5", ring2: "#F4D03F", ring3: "#4CC9F0",
    floatType: "particles",
    poem: [
      "Twenty-four — and you are <em>building something</em>,",
      "stone by stone, in the early morning light,",
      "you may not see the whole structure yet —",
      "but from here, it is already a magnificent sight."
    ],
    msgA: "Twenty-four is a building year. Not the glamorous, celebrated kind of building but the real kind — the daily, patient, occasionally unglamorous work of putting something durable together. <em>The architecture of your life at twenty-four is already something worth standing back and admiring</em>. The foundations are real. The walls are rising. The whole thing has the quality of something built to last.",
    msgB: "The skills you are developing, the habits you are forming, the reputation you are quietly and correctly earning — these are not small things. <em>These are the things that become the whole shape of a career, a life</em>. You are building with genuine care and genuine skill, and the building is showing it in every detail.",
    msgC: "Happy twenty-fourth birthday, our quietly-building, carefully-crafting, magnificently twenty-four-year-old. <strong>May this year add the most beautiful walls yet to the structure you are raising — and may you begin to see, from the inside, how extraordinary the view is going to be.</strong>",
    highlights: [{n:"24",l:"Years Old!",e:"🏗️"},{n:"∞",l:"Skills Sharpened",e:"💡"},{n:"∞",l:"Foundations Laid",e:"🌇"}],
    milestone: { e:"💡", title:"Twenty-Four — The Craft Is Becoming Real!", text:"At twenty-four the ten thousand hours are accumulating in real time — each day of deliberate work adding to something that is starting to feel undeniable. The expertise you are developing is not theoretical. It is yours, built from scratch, earned through genuine effort. It will be unshakeable because you built it that way." },
    wishes: [
      { e:"🏗️", title:"Build Boldly", c:"#0055A5", text:"May you build this year with the same vision and courage you bring to everything — and may the structure exceed your own high expectations." },
      { e:"🌇", title:"See the Skyline", c:"#F4D03F", text:"May you step back sometimes this year and actually see the skyline of what you are building — it is more impressive than you probably know." },
      { e:"💡", title:"Stay Inspired", c:"#4CC9F0", text:"May the inspiration never run dry — may new ideas arrive exactly when you need them, better than the ones you came in with." },
      { e:"🤝", title:"Build Together", c:"#0055A5", text:"May the people you build alongside this year be entirely worthy of the extraordinary thing you are all creating together." }
    ]
  },

    poem: [

      "of the most remarkable person on earth,",

      "even brighter than the years that followed your birth."
    ],
    msgA: "Twenty-five. A quarter of a century of Yokshith — and we need a moment, because the number is almost too big to hold. Twenty-five years of a mind that never stopped being curious, a heart that never stopped being generous, a laugh that has filled every room it entered for a quarter of a century. <em>What a twenty-five years it has been. What a person it has produced.</em>",
    msgB: "The particular thing about a quarter century is that you can genuinely see the arc now — where you started, how far you have come, the direction you are moving in. <em>The arc of you is extraordinary</em>. Not because of what you have achieved, but because of what the achieving has revealed: a character so solid, so warm, so unmistakably itself that it makes every achievement look like the natural result of being exactly who you are.",
    msgC: "Happy twenty-fifth birthday, our quarter-century wonder. <strong>Here is to the next twenty-five — which will be built on the most extraordinary foundation imaginable, and which will rise to something even more magnificent than the first. And the first has already been everything.</strong>",
    highlights: [{n:"25",l:"Years Old!",e:"🏆"},{n:"25",l:"Years of Wonder",e:"💫"},{n:"75",l:"More to Come!",e:"🌍"}],
    milestone: { e:"👑", title:"TWENTY-FIVE — A Golden Quarter Century!", text:"A quarter century of you. The gold of twenty-five is not decorative — it is the genuine, earned gold of a life that has been lived with intention, with love, with the specific and irreplaceable quality of you doing everything in the specific and irreplaceable way that only you do it. You are twenty-five years of pure, real, astonishing gold." },
    wishes: [
      { e:"🏆", title:"Quarter-Century Champion", c:"#C9A227", text:"May you stand at twenty-five and know, completely and clearly, that you are exactly the champion you were always going to be." },
      { e:"🎊", title:"Celebrate Every Bit", c:"#FF6B35", text:"May this quarter-century celebration be as extraordinary as the person it is celebrating — which means it needs to be very extraordinary indeed." },
      { e:"💫", title:"Shine On", c:"#FEE440", text:"May the next twenty-five years shine with twice the light of the first — and the first were genuinely, brilliantly bright." },
      { e:"🌍", title:"Leave Your Mark", c:"#C9A227", text:"May the next twenty-five years see you leave a mark on the world that is unmistakably, permanently, magnificently yours." }
    ]
  },

    msgC: "Happy twenty-seventh birthday, our genuinely discovering, truly arriving, magnificently twenty-seven-year-old. <strong>May this year bring you the most important discoveries yet — the ones about what truly matters, what truly lasts, and what you were truly, specifically, irreplaceably made for.</strong>",

    msgC: "Happy twenty-ninth birthday, our last-year-of-the-twenties, everything-the-twenties-could-possibly-be wonder. <strong>May this final year of the decade be its most magnificent chapter yet — and may thirty find you as ready, as rich, as completely yourself as twenty-nine is so brilliantly leaving you.</strong>",

    msgC: "Happy thirtieth birthday, our thirty-year-old, our new-chapter person, our heart-outside-our-body walking magnificently into its best decade. <strong>Welcome to your thirties, Yokshith. They are going to suit you perfectly. We have never — not once across all thirty of these years — been more certain of anything.</strong>",

      { e:"💫", title:"Everything Ahead", c:"#FF6B35", text:"May the next thirty years bring everything the first thirty prepared you for — and the first thirty were an extraordinary preparation." },

    highlights: [{n: "41", l: "Years Old!", e: "💫"}, {n: "∞", l: "Wisdom at Work", e: "🌿"}, {n: "∞", l: "Power and Grace", e: "⚡"}],
    milestone: {e: "💫", title: "Forty-One — Power and Grace!", text: "At forty-one you move through your life with a combination of power and grace that is genuinely remarkable to witness. The power comes from everything you have built. The grace comes from knowing exactly what you built it for. Together they make something extraordinary."},
    wishes: [{e: "💫", title: "Even More Brilliant", c: "#0277BD", text: "May forty-one be even more brilliant than forty — which is saying something genuinely extraordinary, because forty was remarkable."}, {e: "🌿", title: "Deeper Roots", c: "#F9A825", text: "May your roots go deeper still this year in all the things that truly, enduringly, beautifully matter."}, {e: "🎯", title: "Aimed True", c: "#80CBC4", text: "May your aim this year be the most precise it has ever been — landing exactly where it most needs to."}, {e: "⚡", title: "Electric Still", c: "#0277BD", text: "May the electric energy of your forties power everything you set your remarkable self to this year."}]
  },
  42: {

    msgB: "At forty-two you carry answers in a different, more useful way too — the wisdom accumulated from genuine experience, the perspectives that only someone who has really, fully, deliberately lived for forty-two real years can offer. <em>Your wisdom is actual wisdom now</em>. Real, earned, tested. People know it. They come to you for it.",
    msgC: "Happy forty-second birthday, our answer-to-everything, cosmically-significant, magnificently forty-two-year-old. <strong>May this year bring you the most meaningful questions yet — and may your extraordinary mind find exactly the right answers to every single one of them.</strong>",

    milestone: {e: "🌌", title: "Forty-Two — The Answer to Everything!", text: "At forty-two you are, in every meaningful sense, the answer to everything: what a life well lived looks like, what good character produces over decades, what love given freely for forty-two years actually becomes. The answer is extraordinary."},
    wishes: [{e: "🌌", title: "Cosmic Wonder", c: "#4527A0", text: "May the universe reveal itself to you this year as the magnificent, generous, endlessly extraordinary place it truly is."}, {e: "💡", title: "Keep Illuminating", c: "#EF6C00", text: "May your answers this year be as clear, as true, and as genuinely useful as everything you have learned and lived."}, {e: "🔮", title: "See What Comes", c: "#80DEEA", text: "May you see clearly this year the extraordinary things that are still coming your way — and may they arrive soon."}, {e: "⭐", title: "Cosmic Significance", c: "#4527A0", text: "May you feel this year the full, real weight of how significant and how extraordinary you truly, completely are."}]
  },

    msgC: "Happy forty-third birthday, our deep-wisdom-holding, long-arc-seeing, magnificently forty-three-year-old. <strong>May this year bring your wisdom to bear on exactly the things it can help most — and may the results be as extraordinary as everything else your hard-won, genuine wisdom has ever touched.</strong>",

    milestone: {e: "🦉", title: "Forty-Three — The Year of Real Wisdom!", text: "At forty-three your wisdom is no longer theoretical. It is embodied — lived in your decisions, your patience, your ability to see the truth of situations that would have confused younger versions of you. The owl was always the right symbol. You have earned every feather of it."},
    wishes: [{e: "📚", title: "Wisdom of Ages", c: "#2E7D32", text: "May the wisdom gathered across forty-three full years guide you to your most extraordinary year yet."}, {e: "🦉", title: "See Through Everything", c: "#F9A825", text: "May you see clearly through every complexity this year — with the vision that is entirely, completely your own."}, {e: "🌲", title: "Rooted and Standing", c: "#80CBC4", text: "May your roots hold you completely this year — steady, deep, nourished by everything you have ever lived and loved."}, {e: "💛", title: "Warm Light", c: "#2E7D32", text: "May the warmth you carry light up everyone around you with the full force of who you are."}]

    wishes: [{e: "⚡", title: "Double Your Power", c: "#B71C1C", text: "May this doubled year bring double the power, double the impact, double the extraordinary results you set out to achieve."}, {e: "💥", title: "Make an Impact", c: "#FFC107", text: "May your impact this year be felt far beyond the immediate — in the lives of everyone whose life your life touches."}, {e: "🌟", title: "Double Shine", c: "#42A5F5", text: "May you shine at forty-four with twice the brilliance of any year that came before — and all the years before were brilliant."}, {e: "🏆", title: "Double the Wins", c: "#B71C1C", text: "May this year bring double the victories — earned, savoured, and completely, deservingly yours."}]

    msgC: "Happy forty-fifth birthday, our golden-midpoint, two-extraordinary-views, magnificently forty-five-year-old. <strong>May this midpoint year be gold in every direction — gold in what you look back on with pride, gold in what you are living right now with joy, and gold in everything the remarkable second half still holds.</strong>",

    msgC: "Happy forty-ninth birthday, our grand-finale-of-the-forties, almost-fifty magnificence. <strong>May this final year of your forties be its most glorious chapter yet — and may fifty find you as ready, as magnificent, and as completely yourself as forty-nine is so beautifully, deliberately leaving you.</strong>",

    msgB: "The particular quality of fifty is its gold — the deep, warm, genuine gold of a life fully lived, a person fully realised, a love fully expressed and fully returned across fifty years of being utterly, brilliantly yourself. <em>Everything is golden at fifty</em>, Yokshith. The years behind, the person you are, the life you have built — all of it shines with a light that is entirely your own.",
    msgC: "Happy fiftieth birthday, our half-century wonder, our golden, magnificent, fifty-year-old marvel. <strong>Here is to the second fifty — which will be built on the most extraordinary foundation imaginable, and which will rise to something even more magnificent than the first. And the first was already everything.</strong>",
    highlights: [{n: "50", l: "Half a Century!", e: "🎊"}, {n: "5", l: "Full Decades", e: "👑"}, {n: "∞", l: "Golden Years Ahead", e: "💎"}],
    milestone: {e: "👑", title: "FIFTY — The Golden Half-Century!", text: "Fifty years. Five full, complete, extraordinarily lived decades. The gold of fifty is not decorative — it is the genuine gold of a life lived with intention, with love, with extraordinary purpose. You are fifty years of pure, real, deeply earned gold. We have never been more proud of anyone."},
    wishes: [{e: "🎊", title: "Fifty and Fabulous", c: "#B8860B", text: "May fifty be celebrated with all the gold and grandeur it deserves — and fifty deserves an enormous, extraordinary amount."}, {e: "👑", title: "Golden Crown", c: "#FFD700", text: "May you wear fifty like the golden crown it is — because you have earned every single jewel of it across every remarkable year."}, {e: "🌍", title: "Half-Century Mark", c: "#FFF0A0", text: "May the world see at fifty everything you have been for all of these extraordinary, unrepeatable, magnificent years."}, {e: "💎", title: "A Diamond Life", c: "#B8860B", text: "May the next fifty years shine with every facet that the first fifty so magnificently, so patiently, so beautifully cut and polished."}]

function applyTheme(t){

/* ══ CANVAS ANIMATION ENGINE ══ */
let _animId = null, _floatTimer = null;

function stopAnim(){
  if(_animId){ cancelAnimationFrame(_animId); _animId=null; }
  if(_floatTimer){ clearInterval(_floatTimer); _floatTimer=null; }
  document.getElementById('float-layer').innerHTML = '';
  const cv = document.getElementById('bg-canvas');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

function startAnim(theme){
  stopAnim();
  const cv = document.getElementById('bg-canvas');
  let W = cv.width = innerWidth, H = cv.height = innerHeight;
  const onResize = ()=>{ W=cv.width=innerWidth; H=cv.height=innerHeight; };
  window.addEventListener('resize', onResize);
  const ctx = cv.getContext('2d');
  const blobs = [
    {x:W*.15, y:H*.25, r:W*.22, c:theme.blob1, vx:.4, vy:.25},
    {x:W*.75, y:H*.6,  r:W*.18, c:theme.blob2, vx:-.3, vy:.35},
    {x:W*.5,  y:H*.1,  r:W*.15, c:theme.blob3, vx:.2, vy:-.3},
  ];
  let tick=0;
  function frame(){
    tick++;
    ctx.clearRect(0,0,W,H);
    blobs.forEach((b,i)=>{
      b.x += b.vx + Math.sin(tick*.004+i)*.5;
      b.y += b.vy + Math.cos(tick*.006+i)*.4;
      if(b.x<-b.r||b.x>W+b.r) b.vx*=-1;
      if(b.y<-b.r||b.y>H+b.r) b.vy*=-1;
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,b.c); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    _animId = requestAnimationFrame(frame);
  }
  frame();
  spawnFloaters(theme.floatType, theme.primary, theme.secondary);
}

function spawnFloaters(type, c1, c2){
  const layer = document.getElementById('float-layer');
  if(!document.getElementById('floatKF')){
    const s=document.createElement('style'); s.id='floatKF';
    s.textContent=`
      @keyframes floatUp{0%{opacity:0;transform:translateY(0) rotate(0deg);}5%{opacity:.6;}90%{opacity:.3;}100%{opacity:0;transform:translateY(-110vh) rotate(540deg) translateX(40px);}}
      @keyframes floatDown{0%{opacity:0;transform:translateY(-50px) rotate(0);}5%{opacity:.5;}90%{opacity:.2;}100%{opacity:0;transform:translateY(110vh) rotate(-360deg) translateX(-30px);}}
      @keyframes floatSway{0%,100%{transform:translateX(0) rotate(-5deg);}50%{transform:translateX(20px) rotate(5deg);}}
    `;
    document.head.appendChild(s);
  }
  const maps = {
    stars:    ['✨','⭐','💫','🌟','✦','✧'],
    bubbles:  ['○','◯','⬡','◇','□','△'],
    leaves:   ['🍃','🌿','🍀','🌱','🍂','🌾'],
    confetti: ['●','▲','■','◆','★','♦'],
    particles:['·','•','⬤','◉','◎','○']
  };
  const items = maps[type] || maps.stars;
  const isTextItem = (s)=>s.length<=1 && !['🍃','🌿','🍀','🌱','🍂','🌾','✨','⭐','💫','🌟'].includes(s);
  function mk(){
    if(!document.getElementById('float-layer')) return;
    const el = document.createElement('div');
    const item = items[Math.floor(Math.random()*items.length)];
    const sz = 10+Math.random()*18;
    const dur = 12+Math.random()*10;
    const dir = Math.random()<.5 ? 'floatUp' : 'floatDown';
    const yStart = dir==='floatUp' ? 'bottom:-50px;' : 'top:-50px;';
    const col = Math.random()<.5 ? c1 : c2;
    el.style.cssText = `position:absolute;left:${Math.random()*100}%;${yStart}font-size:${sz}px;opacity:0;animation:${dir} ${dur}s ${Math.random()*4}s ease-in-out forwards;color:${col};`;
    if(isTextItem(item)){ el.style.color = col; el.style.opacity='0'; }
    el.textContent = item;
    layer.appendChild(el);
    setTimeout(()=>el.remove(),(dur+5)*1000);
  }
  for(let i=0;i<14;i++) setTimeout(mk, i*400);
  _floatTimer = setInterval(mk, 1600);
}

/* ══ CONFETTI ══ */
const CCV = document.getElementById('confetti'), CCTX = CCV.getContext('2d');
let cps=[], cid=null;
function rsC(){ CCV.width=innerWidth; CCV.height=innerHeight; }
rsC(); window.addEventListener('resize',rsC);
function burst(n=150){
  const cols=['#FF6B35','#FFD23F','#F72585','#9B5DE5','#06D6A0','#3FA7D6','#FFF0E0','#FFB3C1'];
  for(let i=0;i<n;i++) cps.push({
    x:Math.random()*CCV.width, y:-20,
    vx:(Math.random()-.5)*7, vy:2+Math.random()*6,
    w:5+Math.random()*10, h:7+Math.random()*5,
    rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.25,
    c:cols[Math.floor(Math.random()*cols.length)],
    op:1, shape:Math.random()<.45?'rect':'circle'
  });
  if(!cid) cFrame();
}
function cFrame(){
  CCTX.clearRect(0,0,CCV.width,CCV.height);
  cps = cps.filter(p=>p.y<CCV.height+40 && p.op>0);
  cps.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vy+=.06;
    if(p.y>CCV.height*.7) p.op-=.02;
    CCTX.save(); CCTX.translate(p.x,p.y); CCTX.rotate(p.rot);
    CCTX.globalAlpha=p.op; CCTX.fillStyle=p.c;
    if(p.shape==='rect') CCTX.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    else{ CCTX.beginPath(); CCTX.arc(0,0,p.w/2,0,Math.PI*2); CCTX.fill(); }
    CCTX.restore();
  });
  if(cps.length>0) cid=requestAnimationFrame(cFrame);
  else{ CCTX.clearRect(0,0,CCV.width,CCV.height); cid=null; }
}

/* ══ SCROLL REVEAL ══ */
function initReveal(){
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{threshold:.08});
  document.querySelectorAll('.sr').forEach(el=>io.observe(el));
}

}

          </button>` : ''}
        </div>
        ${!canFwd && !fromWaiting ? `
        <div class="locked-box" style="margin-top:28px;">
          <span class="locked-emoji">🔮</span>
          <div class="locked-title">Next Year Is a Surprise!</div>
          <div class="locked-text">Come back on 2nd September ${year+1} to discover what Age ${age+1} holds for Yokshith. Some things are absolutely worth waiting for. ✨</div>
        </div>` : ''}
      </div>
    </div>` : '';

  document.getElementById('app').innerHTML = `
<div class="page-enter">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg-blob" style="width:clamp(280px,45vw,480px);height:clamp(280px,45vw,480px);background:radial-gradient(circle,${t.blob1},transparent 70%);top:-5%;right:-8%;animation-delay:0s;animation-duration:9s;"></div>
    <div class="hero-bg-blob" style="width:clamp(200px,32vw,360px);height:clamp(200px,32vw,360px);background:radial-gradient(circle,${t.blob2},transparent 70%);bottom:8%;left:-6%;animation-delay:4s;animation-duration:11s;"></div>
    <div class="hero-bg-blob" style="width:clamp(150px,22vw,260px);height:clamp(150px,22vw,260px);background:radial-gradient(circle,${t.blob3},transparent 70%);top:30%;left:5%;animation-delay:2s;animation-duration:7s;"></div>

    ${!isCurrent ? `
    <div style="margin-bottom:20px;opacity:0;animation:ldFade .7s ease forwards 2.4s;">
      <span class="past-chip">
        📅 Viewing ${year} · Age ${age}
        <button class="past-back-btn" onclick="goBday(${lastBdayYear},false)">→ Latest</button>
      </span>
    </div>` : ''}

    <div class="hero-eyebrow">2nd September ${year} · ${ordinal(age)} Birthday</div>
    <div class="hero-emojis">${t.emojis.map(e=>`<span class="emoji-float">${e}</span>`).join('')}</div>
    <span class="hero-title-l1" style="background:linear-gradient(135deg,${t.primary},${t.secondary});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Happy</span>
    <span class="hero-title-l2">Birthday, Yokshith!</span>
    <div class="hero-badge">
      <span class="hb-label">Our Star</span>
      <span class="hb-sep">·</span>
      <span class="hb-name" style="color:${t.primary}">Yokshith</span>
      <span class="hb-sep">·</span>
      <span class="hb-label">Age ${age}</span>
    </div>
    <p class="hero-tagline">${t.tagline}</p>
    <div class="age-ring-wrap">
      <svg class="age-ring-svg" width="150" height="150" viewBox="0 0 150 150">
        <defs>
          <linearGradient id="rg${age}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${t.ring1}"/>
            <stop offset="50%" stop-color="${t.ring2}"/>
            <stop offset="100%" stop-color="${t.ring3}"/>
          </linearGradient>
        </defs>
        <circle cx="75" cy="75" r="65" fill="none" stroke="url(#rg${age})" stroke-width="2.5" stroke-dasharray="8 5" opacity=".5"/>
        <circle cx="75" cy="75" r="50" fill="rgba(255,255,255,.6)" stroke="url(#rg${age})" stroke-width="1.5" opacity=".4"/>
        <circle cx="75" cy="75" r="35" fill="rgba(255,255,255,.8)" stroke="url(#rg${age})" stroke-width="1" opacity=".3"/>
      </svg>
      <div class="age-center">
        <span class="age-num-big" style="color:${t.primary}">${age}</span>
        <span class="age-num-label">Years Old</span>
      </div>
    </div>
    <div class="scroll-cue"><div class="sc-txt">Scroll for More</div><div class="sc-arr"></div></div>
  </div>

  <!-- HIGHLIGHTS STRIP -->
  <div class="sec sec-alt">
    <div class="sec-inner">
      <div class="highlights">${highlightsHtml}</div>
    </div>
  </div>

  <!-- POEM -->
  <div class="sec">
    <div class="sec-inner sr">
      <div class="poem-card">
        <div class="poem-deco" style="background:linear-gradient(90deg,${t.primary},${t.secondary},${t.tertiary});"></div>
        <span class="poem-icon">${t.emojis[2]}</span>
        ${t.poem.map(l=>`<span class="poem-line">${l}</span>`).join('')}
        <div class="poem-attr">— A Birthday Poem for Yokshith —</div>
      </div>
    </div>
  </div>

  <!-- MESSAGE -->
  <div class="sec sec-alt">
    <div class="sec-inner">
      <div class="sec-label sr">
        <div class="sl-line" style="background:linear-gradient(to right,transparent,${t.primary});"></div>
        <span class="sl-text" style="color:${t.primary};border-color:${t.primary};background:rgba(255,107,53,.05);">A Message from Amma &amp; Nanna</span>
        <div class="sl-line sl-line-r" style="background:linear-gradient(to left,transparent,${t.primary});"></div>
      </div>
      <div class="msg-card sr">
        <div class="msg-stripe" style="background:linear-gradient(90deg,${t.primary},${t.secondary},${t.tertiary});"></div>
        <span class="msg-icon">💌</span>
        <p class="msg-p">${t.msgA}</p>
        <p class="msg-p">${t.msgB}</p>
        <p class="msg-p">${t.msgC}</p>
      </div>
    </div>
  </div>

  <!-- MILESTONE -->
  <div class="sec">
    <div class="sec-inner sr">
      <div class="milestone">
        <div class="ms-emo">${t.milestone.e}</div>
        <div>
          <div class="ms-eyebrow" style="color:${t.secondary}">This Year's Milestone</div>
          <div class="ms-title">${t.milestone.title}</div>
          <div class="ms-text">${t.milestone.text}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- WISHES -->
  <div class="sec sec-alt">
    <div class="sec-wide">
      <div class="sec-label sr">
        <div class="sl-line" style="background:linear-gradient(to right,transparent,${t.primary});"></div>
        <span class="sl-text" style="color:${t.primary};border-color:${t.primary};">Birthday Wishes</span>
        <div class="sl-line sl-line-r" style="background:linear-gradient(to left,transparent,${t.primary});"></div>
      </div>
      <div class="wishes-grid">${wishesHtml}</div>
    </div>
  </div>

  <!-- CONFETTI BUTTON -->
  <div class="sec" style="padding-top:0;text-align:center;">
    <div class="sr">
      <button class="confetti-btn" onclick="burst(200)" style="background:linear-gradient(135deg,${t.primary},${t.secondary});">
        🎊 Make It Rain Confetti! 🎊
      </button>
    </div>
  </div>

  <!-- YEAR NAV -->
  ${navSection}

  <!-- SIGNATURE -->
  <div class="signature sr">
    <div class="sig-from">— with every piece of our hearts, always and forever —</div>
    <div class="sig-name" style="color:${t.tertiary}">Amma &amp; Nanna <span class="sig-heart">${t.emojis[1]}</span></div>
  </div>

</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
  initReveal();
}

/* ══ NAVIGATION ══ */
function goBday(year, fromWaiting){
  transition(()=>renderBirthday(year, fromWaiting));
}
function goWaiting(){
  transition(()=>renderWaiting());
}

/* ══ LAUNCH ══ */
window.addEventListener('DOMContentLoaded', ()=>{
  if(isToday(BIRTH_MONTH, BIRTH_DAY)){
    renderBirthday(CY, false);
    setTimeout(()=>burst(200), 2400);
  } else {
    renderWaiting();
  }
  // Dismiss loader
  setTimeout(()=>{
    document.getElementById('loader').classList.add('out');
    setTimeout(()=>{ document.getElementById('app').classList.add('in'); }, 200);
  }, 2800);
});
</script>
</body>
</html>
