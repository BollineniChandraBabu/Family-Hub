<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="location-guard.js"></script>
<title>Yokshith — Our Little Superstar ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ BASE ══ */
:root {
  --bg:       #FFFDF7;
  --bg2:      #F5F8FF;
  --card:     #FFFFFF;
  --cshadow:  0 2px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --cborder:  rgba(0,0,0,.07);
  --text:     #18181b;
  --body:     #3f3f46;
  --muted:    #a1a1aa;
  --ease:     cubic-bezier(.4,0,.2,1);
  --spring:   cubic-bezier(.34,1.56,.64,1);
  --yr1:      #FF6B35;
  --yr2:      #FFD23F;
  --yr3:      #06D6A0;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body {
  font-family:'Nunito',sans-serif;
  background: var(--page-bg, linear-gradient(140deg,#FFFDF7 0%,#F5F8FF 60%,#FFF5FB 100%));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
a { color:inherit; text-decoration:none; }
button { cursor:pointer; border:none; background:none; font:inherit; }

/* ══ LOADER ══ */
/* ══ LOADER ══ */
#loader {
  position:fixed; inset:0; z-index:9999;
  background:#060410;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  transition: opacity 1s ease, visibility 1s ease;
}
#loader.out { opacity:0; visibility:hidden; pointer-events:none; }
#ld-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

/* Vignette */
#loader::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 30%, #060410 100%);
  z-index:1;
}

/* Floating nebula blobs */
.ld-nebula {
  position:absolute; border-radius:50%; pointer-events:none;
  filter:blur(80px); mix-blend-mode:screen;
  animation: ldFloat 8s ease-in-out infinite;
}
.ld-nebula-1{ width:500px;height:500px;background:rgba(155,93,229,.18);top:-100px;left:-120px;animation-delay:0s; }
.ld-nebula-2{ width:350px;height:350px;background:rgba(247,37,133,.12);bottom:-80px;right:-80px;animation-delay:3s; }
.ld-nebula-3{ width:280px;height:280px;background:rgba(6,214,160,.1);top:50%;left:55%;animation-delay:5s; }

/* Central stage */
.ld-stage {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center;
  gap:0;
}

/* Pulsing orb behind everything */
.ld-orb-core {
  position:absolute; width:260px; height:260px; border-radius:50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,210,63,.18), rgba(247,37,133,.08) 50%, transparent 70%);
  filter:blur(30px);
  animation: ldOrbPulse 3s ease-in-out infinite;
  top:50%; left:50%; transform:translate(-50%,-50%);
}

/* Rotating arc rings */
.ld-arc-wrap {
  position:relative; width:110px; height:110px; margin-bottom:28px;
}
.ld-arc {
  position:absolute; inset:0; border-radius:50%;
  border:1.5px solid transparent;
}
.ld-arc-1 {
  border-top-color:rgba(255,210,63,.9); border-right-color:rgba(255,210,63,.2);
  animation:ldSpin 2.4s linear infinite;
  filter:drop-shadow(0 0 6px rgba(255,210,63,.8));
}
.ld-arc-2 {
  inset:12px;
  border-top-color:rgba(247,37,133,.9); border-left-color:rgba(247,37,133,.15);
  animation:ldSpin 1.7s linear infinite reverse;
  filter:drop-shadow(0 0 5px rgba(247,37,133,.7));
}
.ld-arc-3 {
  inset:24px;
  border-bottom-color:rgba(6,214,160,.8); border-right-color:rgba(6,214,160,.12);
  animation:ldSpin 3.1s linear infinite;
  filter:drop-shadow(0 0 5px rgba(6,214,160,.6));
}

/* Centre emoji inside arcs */
.ld-arc-center {
  position:absolute; inset:34px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #2a1060, #0d0620);
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
  box-shadow: inset 0 0 15px rgba(155,93,229,.3), 0 0 25px rgba(155,93,229,.2);
  animation:ldCenterPop .7s cubic-bezier(.34,1.56,.64,1) .2s both;
}

/* Name */
.ld-name {
  font-family:'Baloo 2',cursive; font-weight:900;
  font-size:clamp(2.8rem,11vw,4.2rem);
  letter-spacing:.06em; line-height:1;
  display:flex; margin-bottom:8px;
}
.ld-letter {
  display:inline-block;
  opacity:0; transform:translateY(-40px) rotate(-8deg) scale(.6);
  animation:ldLetterDrop .55s cubic-bezier(.34,1.4,.64,1) forwards;
}
/* Each letter gets its own gradient colour stop */
.ld-letter:nth-child(1){background:linear-gradient(160deg,#FFE259,#FFA751);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(2){background:linear-gradient(160deg,#FF8C42,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(3){background:linear-gradient(160deg,#F72585,#B5179E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(4){background:linear-gradient(160deg,#7B2FBE,#9B5DE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(5){background:linear-gradient(160deg,#4361EE,#4CC9F0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(6){background:linear-gradient(160deg,#06D6A0,#4CC9F0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(7){background:linear-gradient(160deg,#FFD23F,#F72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-letter:nth-child(8){background:linear-gradient(160deg,#FF8C42,#FFD23F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Subtitle */
.ld-sub {
  font-family:'Space Grotesk',sans-serif; font-size:.65rem; font-weight:700;
  letter-spacing:.45em; text-transform:uppercase;
  color:rgba(255,255,255,.3);
  opacity:0; animation:ldFadeSlide .5s ease forwards 1.5s;
  margin-bottom:32px;
}

/* Counter row */
.ld-counter-row {
  display:flex; flex-direction:column; align-items:center; gap:12px;
  opacity:0; animation:ldFadeSlide .5s ease forwards 1.1s;
}
.ld-counter-label {
  font-family:'Baloo 2',cursive; font-size:.8rem; font-weight:600;
  color:rgba(255,255,255,.3); letter-spacing:.08em;
}
.ld-counter-num {
  font-family:'Baloo 2',cursive; font-size:clamp(1.6rem,6vw,2.4rem); font-weight:900;
  line-height:1;
  background:linear-gradient(135deg,#FFE259 0%,#FF8C42 40%,#F72585 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 14px rgba(255,180,50,.5));
  min-width:3ch; text-align:center;
}

/* Progress bar */
.ld-bar-track {
  width:min(240px,68vw); height:2px;
  background:rgba(255,255,255,.07); border-radius:99px;
  position:relative; overflow:visible;
}
.ld-bar-fill {
  height:100%; width:0; border-radius:99px;
  background:linear-gradient(90deg,#FFE259,#FF8C42,#F72585,#9B5DE5,#4CC9F0);
  box-shadow:0 0 10px rgba(255,180,50,.9), 0 0 24px rgba(247,37,133,.4);
  position:relative; transition:none;
}
.ld-bar-fill::after {
  content:''; position:absolute; right:-5px; top:50%; transform:translateY(-50%);
  width:10px; height:10px; border-radius:50%;
  background:#fff;
  box-shadow:0 0 0 2px rgba(255,255,255,.3), 0 0 12px rgba(255,210,63,1), 0 0 24px rgba(255,180,50,.6);
}

/* Candles row */
.ld-candles {
  display:flex; gap:6px; margin-top:14px;
  opacity:0; animation:ldFadeSlide .4s ease forwards 1.3s;
}
.ld-candle {
  font-size:.95rem; filter:grayscale(1); opacity:.25;
  transition:filter .2s ease, opacity .2s ease, transform .2s ease;
}
.ld-candle.lit { filter:none; opacity:1; transform:scale(1.2); }

/* Keyframes */
@keyframes ldSpin      { to{transform:rotate(360deg)} }
@keyframes ldCenterPop { from{transform:scale(0)} to{transform:scale(1)} }
@keyframes ldLetterDrop{ to{opacity:1;transform:translateY(0) rotate(0) scale(1)} }
@keyframes ldFadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes ldOrbPulse  { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6} 50%{transform:translate(-50%,-50%) scale(1.3);opacity:1} }
@keyframes ldFloat     { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-25px)} }
/* Used site-wide for entrance animations */
@keyframes ldUp   { from{opacity:0;transform:translateY(18px) scale(.96);} to{opacity:1;transform:none;} }
@keyframes ldFade { from{opacity:0;} to{opacity:1;} }

/* ══ CANVAS / OVERLAY ══ */
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#float-layer { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
#confetti { position:fixed; inset:0; z-index:20; pointer-events:none; }

/* ══ APP ══ */
#app { position:relative; z-index:10; opacity:0; transition:opacity .8s ease; }
#app.in { opacity:1; }

/* ══ TRANSITIONS ══ */
.page-enter { animation:pageIn .6s var(--ease) forwards; }
.page-exit { animation:pageOut .35s var(--ease) forwards; }
@keyframes pageIn { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:none;} }
@keyframes pageOut { from{opacity:1;transform:none;} to{opacity:0;transform:translateY(-12px);} }

/* ══ LAYOUT ══ */
.sec { padding:clamp(50px,8vw,90px) clamp(16px,5vw,60px); position:relative; }
.sec-inner { max-width:720px; margin:0 auto; }
.sec-wide { max-width:960px; margin:0 auto; }
.sec-alt { background:rgba(0,0,0,.018); border-top:1px solid rgba(0,0,0,.05); border-bottom:1px solid rgba(0,0,0,.05); }

.sec-label {
  display:flex; align-items:center; gap:14px; margin-bottom:clamp(32px,5vw,52px);
}
.sl-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--yr1,#FF6B35)); opacity:.3; }
.sl-line-r { background:linear-gradient(to left,transparent,var(--yr1,#FF6B35)); }
.sl-text {
  font-family:'Space Grotesk',sans-serif; font-size:.7rem; font-weight:600;
  letter-spacing:.38em; text-transform:uppercase; white-space:nowrap;
  color:var(--yr1,#FF6B35); padding:5px 18px;
  border:1.5px solid var(--yr1,#FF6B35); border-radius:50px;
  background:rgba(255,107,53,.06);
}

/* Scroll reveal */
.sr { opacity:0; transform:translateY(26px); transition:opacity .75s var(--ease),transform .75s var(--ease); }
.sr.in { opacity:1; transform:none; }
.sr-delay-1 { transition-delay:.1s; }
.sr-delay-2 { transition-delay:.2s; }
.sr-delay-3 { transition-delay:.3s; }

/* ══ HERO ══ */
.hero {
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center;
  padding:clamp(90px,14vw,160px) clamp(16px,5vw,60px) clamp(70px,10vw,120px);
  position:relative; overflow:hidden;
}
.hero-bg-blob {
  position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none;
  animation:blobDrift 8s ease-in-out infinite alternate;
}
@keyframes blobDrift {
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(30px,-20px) scale(1.08);}
}
.hero-eyebrow {
  font-family:'Space Grotesk',sans-serif; font-size:.65rem; font-weight:600;
  letter-spacing:.5em; text-transform:uppercase; color:var(--yr1,#FF6B35);
  margin-bottom:16px; opacity:0; animation:ldFade .8s ease forwards 2.6s;
  background:rgba(255,107,53,.08); padding:6px 16px; border-radius:50px;
  border:1px solid rgba(255,107,53,.18);
}
.hero-emojis {
  display:flex; gap:clamp(10px,3vw,22px); justify-content:center;
  margin-bottom:clamp(18px,3vw,28px); opacity:0; animation:ldUp .8s var(--spring) forwards 2.8s;
}
.emoji-float {
  font-size:clamp(2rem,7vw,3.8rem); display:inline-block;
  animation:emojiDance 2.4s ease-in-out infinite alternate;
}
.emoji-float:nth-child(1){animation-delay:0s;}
.emoji-float:nth-child(2){animation-delay:.25s;}
.emoji-float:nth-child(3){animation-delay:.5s;}
.emoji-float:nth-child(4){animation-delay:.75s;}
.emoji-float:nth-child(5){animation-delay:1s;}
@keyframes emojiDance {
  0%{transform:translateY(0) rotate(-8deg) scale(1);}
  100%{transform:translateY(-16px) rotate(8deg) scale(1.12);}
}
.hero-title-l1 {
  display:block; font-family:'Baloo 2',cursive;
  font-size:clamp(3.2rem,14vw,9rem); font-weight:800; line-height:.95;
  background:linear-gradient(135deg,var(--yr1,#FF6B35) 0%,var(--yr2,#FFD23F) 60%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 2px 16px rgba(255,107,53,.18));
  opacity:0; animation:ldUp 1s var(--spring) forwards 3s;
}
.hero-title-l2 {
  display:block; font-family:'Baloo 2',cursive;
  font-size:clamp(1.8rem,8vw,5rem); font-weight:600; line-height:1.1;
  color:var(--body); opacity:0; animation:ldUp .9s var(--spring) forwards 3.2s;
  margin-top:6px;
}
.hero-badge {
  display:inline-flex; align-items:center; gap:10px;
  margin:clamp(16px,3vw,26px) 0;
  padding:12px 28px; border-radius:60px;
  background:var(--card); border:1.5px solid rgba(0,0,0,.08);
  box-shadow:var(--cshadow);
  opacity:0; animation:ldUp .9s var(--spring) forwards 3.4s;
}
.hb-label { font-size:.58rem; font-weight:700; letter-spacing:.35em; text-transform:uppercase; color:var(--muted); }
.hb-name { font-family:'Baloo 2',cursive; font-size:clamp(1.2rem,3.5vw,1.7rem); font-weight:700; color:var(--yr1,#FF6B35); }
.hb-sep { color:rgba(0,0,0,.12); }

.hero-tagline {
  max-width:520px; font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(1.1rem,3.5vw,1.45rem); font-weight:600; color:var(--body);
  line-height:1.8; margin-bottom:clamp(24px,4vw,44px);
  opacity:0; animation:ldFade .9s ease forwards 3.6s;
}

/* Age Ring */
.age-ring-wrap {
  position:relative; display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:clamp(28px,5vw,50px);
  opacity:0; animation:ldUp .9s var(--spring) forwards 3.8s;
}
.age-ring-svg { animation:ldSpin 15s linear infinite; }
.age-center { position:absolute; display:flex; flex-direction:column; align-items:center; }
.age-num-big {
  font-family:'Baloo 2',cursive; font-size:clamp(2.2rem,7vw,3.4rem); font-weight:800;
  line-height:1; color:var(--yr1,#FF6B35);
}
.age-num-label {
  font-family:'Space Grotesk',sans-serif; font-size:.5rem; font-weight:600;
  letter-spacing:.3em; text-transform:uppercase; color:var(--muted); margin-top:3px;
}

.scroll-cue {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  opacity:0; animation:ldFade 1s ease forwards 4.6s;
}
.sc-txt { font-size:.52rem; font-weight:700; letter-spacing:.45em; text-transform:uppercase; color:var(--muted); }
.sc-arr { width:1px; height:36px; background:linear-gradient(to bottom,var(--muted),transparent); animation:scBob 2s ease-in-out infinite; }
@keyframes scBob { 0%,100%{transform:scaleY(1);opacity:.6;} 50%{transform:scaleY(.7);opacity:1;} }

/* ══ POEM ══ */
.poem-card {
  background:var(--card); border-radius:28px; padding:clamp(30px,5vw,52px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  text-align:center; position:relative; overflow:hidden;
}
.poem-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,107,53,.04),rgba(155,93,229,.03));
  pointer-events:none;
}
.poem-deco { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yr1,#FF6B35),var(--yr2,#FFD23F),var(--yr3,#06D6A0)); border-radius:28px 28px 0 0; }
.poem-icon { font-size:clamp(2.2rem,6vw,3.2rem); display:block; margin-bottom:20px; animation:emojiDance 3s ease-in-out infinite alternate; }
.poem-line {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
  font-size:clamp(1.05rem,3.2vw,1.3rem); color:var(--body); line-height:2.2; display:block;
}
.poem-line em { font-style:normal; color:var(--yr1,#FF6B35); font-weight:600; }
.poem-attr {
  font-family:'Space Grotesk',sans-serif; font-size:.58rem; font-weight:600;
  letter-spacing:.35em; text-transform:uppercase; color:var(--muted);
  margin-top:24px; display:flex; align-items:center; justify-content:center; gap:10px;
}
.poem-attr::before,.poem-attr::after { content:''; width:28px; height:1px; background:var(--muted); opacity:.4; }

/* ══ MESSAGE ══ */
.msg-card {
  background:var(--card); border-radius:28px; padding:clamp(30px,5vw,52px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  position:relative; overflow:hidden;
}
.msg-stripe { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yr1),var(--yr2),var(--yr3),var(--yr1)); }
.msg-icon { font-size:clamp(1.8rem,5vw,2.4rem); display:block; margin-bottom:22px; text-align:center; animation:emojiDance 3.5s ease-in-out infinite alternate; }
.msg-p {
  font-family:'Nunito',sans-serif; font-size:clamp(1rem,3vw,1.15rem); font-weight:600;
  color:var(--body); line-height:1.95; margin-bottom:20px; text-align:center;
}
.msg-p:last-child { margin-bottom:0; }
.msg-p em { font-style:normal; color:var(--yr1,#FF6B35); font-weight:800; }
.msg-p strong { color:var(--text); font-weight:800; }

/* ══ MILESTONE ══ */
.milestone {
  background:var(--card); border-radius:24px; padding:clamp(24px,4vw,40px);
  box-shadow:var(--cshadow); border:1px solid var(--cborder);
  display:flex; gap:20px; align-items:flex-start; position:relative; overflow:hidden;
}
.milestone::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--yr2),var(--yr1)); }
.ms-emo { font-size:clamp(2.2rem,6vw,3rem); flex-shrink:0; margin-top:3px; animation:emojiDance 2.8s ease-in-out infinite alternate; }
.ms-eyebrow { font-family:'Space Grotesk',sans-serif; font-size:.58rem; font-weight:600; letter-spacing:.4em; text-transform:uppercase; color:var(--yr2,#FFD23F); margin-bottom:6px; }
.ms-title { font-family:'Baloo 2',cursive; font-size:clamp(1.05rem,3.5vw,1.35rem); font-weight:700; color:var(--text); margin-bottom:8px; }
.ms-text { font-size:.93rem; font-weight:600; color:var(--body); line-height:1.8; }

/* ══ HIGHLIGHT STRIPS ══ */
.highlights { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.hl-card {
  background:var(--card); border-radius:18px; padding:22px 18px;
  text-align:center; box-shadow:var(--cshadow); border:1px solid var(--cborder);
  transition:transform .35s var(--spring),box-shadow .35s;
}
.hl-card:hover { transform:translateY(-6px); box-shadow:0 12px 40px rgba(0,0,0,.1); }
.hl-emoji { font-size:1.9rem; display:block; margin-bottom:10px; animation:emojiDance 2s ease-in-out infinite alternate; }
.hl-num { font-family:'Baloo 2',cursive; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:800; color:var(--yr1,#FF6B35); line-height:1; }
.hl-lbl { font-size:.7rem; font-weight:700; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.15em; }
@media(max-width:500px){ .highlights{grid-template-columns:repeat(3,1fr);gap:10px;} }

/* ══ WISHES GRID ══ */
.wishes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr)); gap:14px; }
.wish-card {
  background:var(--card); border-radius:20px; padding:26px 18px;
  border:1.5px solid var(--cborder); text-align:center;
  box-shadow:var(--cshadow);
  transition:transform .4s var(--spring),box-shadow .4s,border-color .3s;
  cursor:default;
}

<script>
(function(){
  /* ── Starfield ── */
  var cv = document.getElementById('ld-canvas');
  var cx = cv.getContext('2d');
  var stars = [], W, H, rafId;

  function resize(){
    W = cv.width  = cv.offsetWidth  || window.innerWidth;
    H = cv.height = cv.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLS = ['#ffffff','#ffe259','#9B5DE5','#4CC9F0','#06D6A0','#F72585'];
  for(var i=0;i<100;i++){
    stars.push({
      x:Math.random()*2-1, y:Math.random()*2-1, // normalised –1..1
      size:Math.random()*1.3+.2,
      speed:Math.random()*.4+.06,
      phase:Math.random()*Math.PI*2,
      col:COLS[Math.floor(Math.random()*COLS.length)]
    });
  }

  var lastStar = 0;
  function drawStars(ts){
    rafId = requestAnimationFrame(drawStars);
    if(document.hidden) return;
    if(ts - lastStar < 33) return; // ~30fps
    lastStar = ts;
    cx.clearRect(0,0,W,H);
    var t = ts/1000;
    stars.forEach(function(s){
      var px = (s.x*.5+.5)*W;
      var py = (s.y*.5+.5)*H;
      var alpha = .25 + .55*Math.abs(Math.sin(t*s.speed*1.2 + s.phase));
      cx.globalAlpha = alpha;
      cx.fillStyle = s.col;
      cx.beginPath();
      cx.arc(px, py, s.size*(alpha*.6+.4), 0, Math.PI*2);
      cx.fill();
    });
    cx.globalAlpha = 1;
  }
  rafId = requestAnimationFrame(drawStars);

  /* ── Name letters ── */
  var name = 'YOKSHITH';
  var wrap = document.getElementById('ld-name-letters');
  name.split('').forEach(function(ch,i){
    var s = document.createElement('span');
    s.className = 'ld-letter';
    s.textContent = ch;
    s.style.animationDelay = (.3 + i*.09)+'s';
    wrap.appendChild(s);
  });

  /* ── Candles row ── */
  var candleRow = document.getElementById('ld-candles');
  var CANDLE_EMOJIS = ['🕯️','🎂','✨','🎁','🎈','🎉','🌟','⭐','💫','🎊'];
  for(var c=0;c<10;c++){
    var cd = document.createElement('span');
    cd.className = 'ld-candle';
    cd.textContent = CANDLE_EMOJIS[c];
    cd.id = 'lc'+c;
    candleRow.appendChild(cd);
  }

  /* ── Year counter ── */
  var numEl  = document.getElementById('ld-num');
  var fillEl = document.getElementById('ld-fill');
  var TOTAL  = 100;
  var DURATION = 2000;   // ms for the full count
  var DELAY    = 900;    // ms before counting starts
  var startTs  = null;

  function easeOutCubic(t){ return 1-Math.pow(1-t,3); }

  function tick(ts){
    if(!startTs) startTs = ts;
    var elapsed = ts - startTs;
    if(elapsed < DELAY){ requestAnimationFrame(tick); return; }
    var t = Math.min((elapsed - DELAY)/DURATION, 1);
    var eased = easeOutCubic(t);
    var n = Math.max(1, Math.round(eased * TOTAL));
    numEl.textContent = n;
    fillEl.style.width = (eased*100)+'%';
    // Light candles proportionally (10 candles for 100 years)
    var lit = Math.ceil(n/10);
    for(var i=0;i<10;i++){
      var el = document.getElementById('lc'+i);
      if(el){ el.className = 'ld-candle'+(i<lit?' lit':''); }
    }
    if(t < 1){ requestAnimationFrame(tick); }
    else{
      numEl.textContent = TOTAL;
      fillEl.style.width = '100%';
    }
  }
  requestAnimationFrame(tick);

  /* expose cleanup */
  window._ldStop = function(){ cancelAnimationFrame(rafId); };
})();
</script>

    msgA: "Three is the year of the question — and you, Yokshith, ask them all. Why is the sky blue? Why does rain fall down and not up? Why do we sleep, and where do we go when we do? <em>Every question you ask is evidence of a mind that refuses to take the world at face value</em>, and that is one of the most magnificent, most precious things about you.",
    msgB: "You are three years old and you are already reshaping the way we see the world around us. You point at things we walk past every day and make them completely new. You find genuine wonder in everything — puddles, pigeons, the way shadows stretch in late afternoon light, the sound rain makes on a window. <em>You are the best teacher we have ever had</em>, and you don't even know it yet. We are learning from you every single day.",
    msgC: "Happy third birthday, our curious, brilliant, endlessly questioning little explorer. <strong>May every question you ask find a beautiful answer — and may each answer lead you to even more wonderful questions. That is how the greatest minds in history have always worked, and yours is already one of them.</strong>",
    highlights: [{n:"3",l:"Years Old!",e:"🦕"},{n:"1000+",l:"Questions Asked",e:"🔍"},{n:"∞",l:"Discoveries",e:"🌍"}],
    milestone: { e:"🔍", title:"Three Years of Magnificent Questions!", text:"At three you hold an honorary PhD in curiosity — asking the questions that genuinely matter, the ones that remind everyone around you how extraordinary ordinary life truly is when you stop and really look at it. You have made us look at everything differently, and that is one of the greatest gifts any person can give another." },
    wishes: [
      { e:"🦕", title:"Dino Brave", c:"#2DC653", text:"May you be as mighty as the dinosaurs you love and twice as fascinating — because you already are, and then some." },
      { e:"🌍", title:"World Explorer", c:"#00B4D8", text:"May this whole beautiful world open its doors for you, one wonderful question at a time, for as long as you keep asking them." },
      { e:"📚", title:"Curious Mind", c:"#FFC300", text:"May your love of learning grow stronger every year, fuelled by all the questions only you can think to ask." },
      { e:"🌟", title:"You're Magic", c:"#FF5733", text:"May you always know that the curiosity inside you is one of your greatest, most irreplaceable, most extraordinary gifts." }
    ]
  },
  4: {

    emojis: ["🦸","⚡","🛡️","🌟","💥"],

    msgA: "Four years old — and you are already a superhero. Not the kind in movies, though you would absolutely, strongly argue otherwise at bedtime. The real kind: <em>the child who charges into situations without a trace of fear, who gives every hug like it is a rescue mission, who laughs with the full, unrestrained power of someone who has decided that joy is not optional — it is compulsory</em>.",
    msgB: "At four you are learning that you can make people laugh on purpose — and you do it, gloriously, every single day. You are learning that stories are yours to change in the middle if they aren't going the right way. You are learning that running is for arriving somewhere wonderful, and also sometimes just for the running itself. <em>You are bold and funny and soft and stubborn and creative and brave and we would not change one single thing</em>.",
    msgC: "Happy fourth birthday, our superhero, our adventurer, our spectacular four-year-old force of nature. <strong>The world is genuinely, measurably, permanently better because you are in it doing your excellent, unstoppable, wonderful, irreplaceable thing.</strong>",

    milestone: { e:"⚡", title:"Four Years of Superhero Power!", text:"At four, your superpower is undeniable and obvious to everyone who knows you: you make everyone around you feel the specific, irreplaceable joy of being in your presence. That warmth you carry — that enormous, generous, unstoppable heart — is the greatest power there is, and it belongs entirely to you." },
    wishes: [
      { e:"🦸", title:"Super You", c:"#EF233C", text:"May you always know that your real superpower — your laugh, your love, your spirit, your enormous heart — is mightier than any cape could ever be." },
      { e:"⚡", title:"Unstoppable", c:"#FFC300", text:"May nothing ever dim the electric, extraordinary energy that makes you unmistakably, magnificently, uniquely you." },
      { e:"🛡️", title:"Protected", c:"#3A86FF", text:"May you always feel safe, loved, and shielded by the arms of everyone who is lucky enough to have you in their life." },
      { e:"🌟", title:"Born to Lead", c:"#8338EC", text:"May the courage in you keep growing — brave enough to try, bold enough to fail, brilliant enough to try again anyway." }
    ]
  },

    msgA: "Five! The year of the big backpack, the shiny new shoes, the slightly terrifying and completely wonderful first day. <em>The year school begins</em> — and we watched you walk in with your heart so open and your eyes so wide and your chin so steady that we couldn't breathe from the size of our pride. You were ready. You were always going to be ready.",
    msgB: "At five you are learning to read letters and numbers, but you have always been fluent in the language that matters most: <em>the language of kindness, of enthusiasm, of finding something worth celebrating in almost any ordinary moment</em>. Your teachers are going to adore you. They won't be able to help themselves — no one who knows you ever can.",
    msgC: "Happy fifth birthday, our brilliant, backpack-wearing, high-fiving little champion. <strong>Five is the year the whole world starts to see what we have always known: that you are something completely, magnificently, irreplaceably special — and that the adventure you are beginning will astonish everyone lucky enough to watch it unfold.</strong>",
    highlights: [{n:"5",l:"Years Old!",e:"🏫"},{n:"1st",l:"School Year",e:"✏️"},{n:"∞",l:"New Friends",e:"🤝"}],
    milestone: { e:"🎒", title:"Five — The Year School Begins!", text:"At five you cross the threshold into a world of structured learning — and you bring with you every single thing a child needs to flourish: curiosity, warmth, a work ethic wrapped in joy, and a laugh that will make even the most serious teacher pause and smile. School is ready for you, Yokshith. And you are ready for everything." },

      { e:"📚", title:"Love Learning", c:"#3A86FF", text:"May every book you open lead you somewhere wonderful, and may every lesson stick like the most exciting story you have ever heard." },
      { e:"🎒", title:"New Beginnings", c:"#FFBE0B", text:"May every first day you ever face — of school, of anything — be the beginning of something incredible, because it always will be." },
      { e:"🤝", title:"Good Friends", c:"#06D6A0", text:"May school bring you friends who make you laugh until you can't breathe and stick with you for the rest of your wonderful life." },
      { e:"⭐", title:"Your Best", c:"#FF6B35", text:"May you always give your very best — and always know that your very best is already, always, more than enough." }
    ]
  },

    msgA: "Six is the year of the athlete, the artist, the builder, the strategist, the friend who already somehow knows how to really listen. <em>At six you are discovering what you love</em> — and watching that discovery happen in real time is one of the most thrilling, most moving things two parents can witness. It is like watching someone find the shape of themselves.",
    msgB: "You have grown so much this year — not just in height (though that too, astonishingly) but in the depth of your thinking, the width of your kindness, the range of your passions. <em>Six-year-old Yokshith is full of opinions, enthusiasms, questions, and the most excellent jokes we have ever been told</em>. We repeat them at dinner tables. We are not ashamed.",
    msgC: "Happy sixth birthday, our brilliant, athletic, creative, wonderful six-year-old. <strong>You are already so much more than we could have imagined, and the best — the most extraordinary, most surprising, most wonderful — is still completely, thrillingly ahead of you.</strong>",

    msgB: "This year you have developed strong opinions about everything — music, food, which route to take home, whether certain films are actually as good as everyone says. <em>You are becoming a person who thinks for themselves</em>, who has genuine taste, who has preferences that are entirely and wonderfully and unmistakably yours. We couldn't be more proud of who you are becoming.",
    msgC: "Happy seventh birthday, our magical, dreaming, star-counting, lucky seven. <strong>May every wish you make on every star you find come back to you, exactly when you need it most — because you deserve every single wish you have ever made.</strong>",

    wishes: [
      { e:"💫", title:"Wish Big", c:"#7B2FBE", text:"May every wish you make come true — and may the ones that don't turn into something even more extraordinary than you hoped for." },
      { e:"🌙", title:"Dream Always", c:"#C77DFF", text:"May your dreams be wild, wide, and wonderful — and may sleep always carry you to the best possible adventures." },
      { e:"🎲", title:"Love the Game", c:"#E0AAFF", text:"May life be the most incredible game you ever play — full of surprises, great moves, and spectacular comebacks." },
      { e:"🧲", title:"Draw Others In", c:"#9D4EDD", text:"May your warmth and spark keep pulling people toward you like the most wonderful, irresistible force in the room." }

    msgB: "We watch you think. Actually watch the specific, beautiful moment when something clicks — when a question finally meets its answer, when understanding arrives on your face like sunrise — <em>and it is one of the most beautiful things we have ever had the privilege of witnessing</em>. Your mind is extraordinary. It moves like something specifically engineered for joy and discovery.",
    msgC: "Happy eighth birthday, our scientist, our inventor, our brilliant and endlessly experimenting eight-year-old. <strong>May this year be full of discoveries that astonish even you — and may every experiment, even the messy ones especially, teach you exactly what you needed to know.</strong>",

      { e:"🤖", title:"Build Things", c:"#74C69D", text:"May you build and create and make things that simply could not have existed without your exact, irreplaceable imagination." },

    ]
  },

    msgB: "You have already climbed so much: the learning curves, the social complexities, the questions about who you are and what you want and which version of yourself feels most like home. <em>Nine-year-old Yokshith is already someone with real depth</em> — with a sense of justice, a wickedly good sense of humour, and a sense of self that most people spend entire decades trying to find.",
    msgC: "Happy ninth birthday, our mountain-climbing, summit-seeking, nothing-will-stop-me nine-year-old. <strong>One more year to ten — and you have never, ever been more completely, more magnificently, more gloriously yourself than you are right now.</strong>",

      { e:"🏔️", title:"Reach Peaks", c:"#E07A5F", text:"May every mountain you decide to climb turn out to be even more breathtaking at the top than it looked from the foot." },

    msgA: "TEN. We have written it in capitals because ten years deserves capitals, deserves every superlative, deserves a celebration that fills every room. <em>Ten years of the most extraordinary human being either of us has ever had the privilege of knowing</em>. Ten years of watching you arrive — in every room, at every age, in every version of yourself — and taking the breath clean away.",
    msgB: "A decade. Ten trips around the sun, ten winters and ten springs, ten years of growing taller and deeper and more astonishingly, unmistakably yourself. <em>We have loved every single version of you</em> — the tiny, sleeping, barely-there newborn version and this magnificent ten-year-old who knows exactly what they think and is no longer the least bit afraid to say it.",
    msgC: "Happy tenth birthday, our golden, glorious, decade-old wonder. <strong>Here is to the next ten — which will somehow, impossibly, be even more extraordinary, more beautiful, more surprising, and more magnificent than the first ten. And the first ten were everything.</strong>",

    wishes: [
      { e:"👑", title:"You Are the Crown", c:"#C9A227", text:"May you always wear your ten years like the crown they truly are — because you have more than earned every single one." },

      { e:"🌟", title:"Golden Light", c:"#F4E04D", text:"May your golden year be the brightest yet — because you have never, not once, needed anyone's permission to shine." },

    msgB: "You have developed a real sense of what you love this year — the music that speaks to something in you, the friends who genuinely get you, the activities that make time vanish entirely. <em>Watching you discover what makes you you</em> is one of the greatest privileges of our lives. We take careful note of every single thing.",
    msgC: "Happy eleventh birthday, our tween, our electric, our becoming-someone-wonderful eleven-year-old. <strong>May this year bring you the music that moves you, the friendships that hold you, and the quiet certainty that no matter what this wild, wonderful in-between age throws at you, you were made exactly for it.</strong>",

    wishes: [

    floatType: "bubbles",
    poem: [

      "you feel things in full — and that is not a flaw,",
      "that is the engine of everything you're for."

    msgB: "You are building something this year that you cannot yet fully see — a sense of who you are when the world pushes back, what you stand for when it costs something to stand for it, which friendships are worth protecting. <em>These are the most important things a twelve-year-old can be figuring out</em>, and you are figuring them out beautifully.",
    msgC: "Happy twelfth birthday, our feeling-everything, dreaming-big, entirely-brilliant twelve-year-old. <strong>May every big feeling this year point you toward something worth caring about — because the things worth caring about are always worth the feeling, and you have always known exactly which things those are.</strong>",

    milestone: { e:"🎮", title:"Twelve — The Year of Figuring It Out!", text:"At twelve you begin the real work of understanding yourself — your triggers and your strengths, your non-negotiables and your soft spots. Most people spend their entire lives on this work. You are starting it properly, early, and with remarkable self-awareness. That head start is worth more than you know." },
    wishes: [
      { e:"🌌", title:"Dream Without Limits", c:"#4361EE", text:"May your dreams at twelve be as vast as the night sky — with no ceiling, no boundary, nothing between you and everything you can imagine." },

    msgC: "Happy thirteenth birthday, our teenager, our beginning-of-something-vast, our brilliant thirteen-year-old. <strong>May these years give you every experience worth having — the joyful ones, the stretching ones, the ones that make you dig deep and discover that deep is exactly where your best self lives.</strong>",

    msgB: "Before thirty arrives, we want you to take a proper look back at everything your twenties were: the discoveries, the setbacks, the people who mattered, the choices made with integrity and the ones corrected with humility. <em>All of it has been exactly right</em>. Even the parts that didn't feel right at the time — especially those — have been precisely what was needed.",
    msgC: "Happy twenty-ninth birthday, our last-year-of-the-twenties, everything-the-twenties-could-possibly-be wonder. <strong>May this final year of the decade be its most magnificent chapter yet — and may thirty find you as ready, as rich, as completely yourself as twenty-nine is so brilliantly leaving you.</strong>",
    highlights: [{n:"29",l:"Years Old!",e:"🌅"},{n:"10",l:"Years of the 20s",e:"📖"},{n:"1",l:"Year to Thirty!",e:"🎉"}],
    milestone: { e:"🌅", title:"Twenty-Nine — The Twenties' Grand Finale!", text:"At twenty-nine you are standing in the final act of a decade that has been extraordinary. The curtain has not fallen yet. There is still a full year of your twenties to live, completely and without reservation. Live it that way. And then step into thirty the way you step into every room — like you were always meant to be there." },
    wishes: [
      { e:"🌅", title:"Golden Hour", c:"#8B2635", text:"May twenty-nine be a golden hour — warm, richly satisfying, full of the specific beauty of a decade at its most magnificent." },
      { e:"🎉", title:"Celebrate the Journey", c:"#C07178", text:"May you genuinely celebrate how far you have come — because the distance is extraordinary and you covered every mile yourself." },
      { e:"📖", title:"Write the Final Chapter", c:"#F4A261", text:"May the last chapter of your twenties be the best one — the one that makes the whole book shine with everything it was building toward." },
      { e:"🌊", title:"Carry It Forward", c:"#8B2635", text:"May everything the twenties have given you carry you magnificently into everything that thirty and beyond will bring." }
    ]

    ring1: "#E65100", ring2: "#F9A825", ring3: "#66BB6A",
    floatType: "particles",
    poem: ["Thirty-eight — the abundance arrives,", "every table set, every corner bright,", "you have cultivated something extraordinary —", "and the whole landscape glows with the light."],
    msgA: "Thirty-eight has the quality of abundance — not the material abundance of accumulation, but the genuine abundance of a life richly lived: full of meaning, saturated with connection, purposeful in its direction. <em>Your life is full, Yokshith, and the fullness is beautiful beyond words.</em>",
    msgB: "We see you at thirty-eight with a richness in your relationships, your work, your interior life, that is genuinely moving. <em>You have cultivated something extraordinary</em> — not by accident or luck but by the deliberate, loving, sustained attention you have given to everything and everyone that truly matters to you.",
    msgC: "Happy thirty-eighth birthday, our abundantly-living, richly-cultivated, magnificently thirty-eight-year-old. <strong>May this year add further to the already extraordinary abundance of your life — in all the ways that actually matter, and some you haven't yet imagined but will.</strong>",

    milestone: {e: "🍯", title: "Thirty-Eight — The Honey Years!", text: "At thirty-eight your life has the quality of honey — rich, warm, deep, produced by years of genuine effort and the sweetness that only real time and real love can create. You have made something extraordinary. We hope you taste every drop of it and know exactly what it is."},
    wishes: [{e: "🌻", title: "Stand in Full Sun", c: "#E65100", text: "May you stand in full sun this year — completely in the light of everything that brings you warmth and life and genuine joy."}, {e: "🍯", title: "Sweet and Real", c: "#F9A825", text: "May the richness and sweetness of your life this year be as real and as nourishing as everything you have built it from."}, {e: "💎", title: "True Wealth", c: "#66BB6A", text: "May the true wealth of your life — the love, the purpose, the joy, the depth — be fully felt and fully celebrated this year."}, {e: "🌈", title: "All the Colours", c: "#E65100", text: "May this year have all the colours of a full life — the bright ones and the deep ones and all the quiet, beautiful ones in between."}]

    msgC: "Happy thirty-ninth birthday, our grand-finale, full-decade-living, magnificently thirty-nine-year-old. <strong>May this final year of your thirties be its most gorgeous, most satisfying, most richly lived chapter yet — and may forty arrive to find you so completely ready that it barely seems like a step at all.</strong>",

    milestone: {e: "🎭", title: "Thirty-Nine — The Decade's Grand Finale!", text: "The curtain falls on your thirties with a performance that has been utterly extraordinary from first act to this final scene. You have given every act everything you had. Everyone who has watched your thirties unfold is on their feet. The next show is going to be even more magnificent."},
    wishes: [{e: "🎭", title: "Final Act Brilliance", c: "#1A237E", text: "May the final year of your thirties be its most brilliant act — the one that makes the whole decade shine with its fullest light."}, {e: "🌅", title: "Dawn of Forty", c: "#F57C00", text: "May the dawn of forty feel as warm and as full of genuine promise as every dawn of the thirties that came before it."}, {e: "🥂", title: "Toast the Decade", c: "#B39DDB", text: "May you genuinely, joyfully celebrate the extraordinary decade you are completing — it has been magnificent throughout."}, {e: "💫", title: "Carry the Light", c: "#1A237E", text: "May you carry every bright thing your thirties gave you straight into the next decade, without losing a single beam."}]

  40: {

    floatType: "confetti",

    msgA: "FORTY. The number that sounds enormous until you arrive at it and discover that forty is simply thirty with extra depth, extra breadth, extra confidence, extra everything that actually counts. <em>You are forty, Yokshith, and you have never been more magnificently, more completely, more entirely yourself than right now</em>. Forty is not an arrival. It is the full bloom.",

    msgC: "Happy fortieth birthday, our fabulous, fearless, fully-formed forty-year-old. <strong>Four decades of you. Four extraordinary decades. May the next four be everything the first four prepared you for — and the first four prepared you for something absolutely extraordinary.</strong>",

    milestone: {e: "👑", title: "FORTY — The Crown of Four Magnificent Decades!", text: "Forty years. The crown you wear at forty is not one anyone gave you — it is one you built yourself, year by year, choice by choice, value by value, love by love. It fits perfectly. It suits you completely. It is entirely, completely, magnificently your own."},
    wishes: [{e: "🎊", title: "Celebrate in Full", c: "#880E4F", text: "May forty be celebrated with all the joy and grandeur it genuinely deserves — and it deserves a great deal of both."}, {e: "💎", title: "Four-Decade Diamond", c: "#FDD835", text: "May you wear forty like the diamond it is — brilliant, hard, formed under pressure, and worth every single year that created it."}, {e: "👑", title: "Your Crown Always", c: "#29B6F6", text: "May you wear your crown at forty with the ease of someone who has always known it would eventually, perfectly arrive."}, {e: "🌍", title: "World at Your Feet", c: "#880E4F", text: "May the next chapter show the world everything you are — which is quite a lot, and then considerably more."}]

    msgA: "At forty-seven the word legacy starts to mean something real and personal rather than abstract. You can feel the shape of what you are leaving behind — not in monuments but in people: in the ways the people you love have been made genuinely, measurably better for knowing you. <em>That is the legacy, Yokshith. It is already extraordinary.</em>",
    msgB: "The lives you have touched, the differences you have made, the things that exist in the world because you were in it and gave your time and your love — <em>these are the real measures of a life</em>, and by every one of those measures, yours is already remarkable. We are deeply, permanently, irreversibly proud.",
    msgC: "Happy forty-seventh birthday, our legacy-building, lives-touching, magnificently forty-seven-year-old. <strong>May this year add more extraordinary chapters to the legacy you are building — and may you feel the full, warm, significant weight of everything you have already created.</strong>",
    highlights: [{n: "47", l: "Years Old!", e: "🌳"}, {n: "∞", l: "Lives Touched", e: "❤️"}, {n: "∞", l: "Legacy Built", e: "🏗️"}],
    milestone: {e: "🌳", title: "Forty-Seven — A Legacy Growing!", text: "At forty-seven you are a tree that has been growing for decades — giving shade, bearing fruit, providing roots for others to anchor themselves to. The legacy you are building is as real and as living as a forest. It was planted, lovingly and deliberately, entirely by you."},
    wishes: [{e: "🌳", title: "Grow Your Forest", c: "#4A148C", text: "May the legacy you are building keep growing — more beautiful, more far-reaching, more extraordinary with every passing year."}, {e: "💌", title: "Letters to the Future", c: "#FF6F00", text: "May what you give this year be received and cherished in ways that reach far beyond what you can currently see."}, {e: "❤️", title: "Love That Lasts", c: "#80CBC4", text: "May the love you have given and keep giving remain one of the most significant, most enduring things in the world."}, {e: "🌟", title: "Enduring Light", c: "#4A148C", text: "May your light endure long past this year — warming and illuminating everyone it reaches, always."}]

    msgC: "Happy fiftieth birthday, our half-century wonder, our golden, magnificent, fifty-year-old marvel. <strong>Here is to the second fifty — which will be built on the most extraordinary foundation imaginable, and which will rise to something even more magnificent than the first. And the first was already everything.</strong>",

    milestone: {e: "👑", title: "FIFTY — The Golden Half-Century!", text: "Fifty years. Five full, complete, extraordinarily lived decades. The gold of fifty is not decorative — it is the genuine gold of a life lived with intention, with love, with extraordinary purpose. You are fifty years of pure, real, deeply earned gold. We have never been more proud of anyone."},
    wishes: [{e: "🎊", title: "Fifty and Fabulous", c: "#B8860B", text: "May fifty be celebrated with all the gold and grandeur it deserves — and fifty deserves an enormous, extraordinary amount."}, {e: "👑", title: "Golden Crown", c: "#FFD700", text: "May you wear fifty like the golden crown it is — because you have earned every single jewel of it across every remarkable year."}, {e: "🌍", title: "Half-Century Mark", c: "#FFF0A0", text: "May the world see at fifty everything you have been for all of these extraordinary, unrepeatable, magnificent years."}, {e: "💎", title: "A Diamond Life", c: "#B8860B", text: "May the next fifty years shine with every facet that the first fifty so magnificently, so patiently, so beautifully cut and polished."}]

    msgA: "Fifty-six has the quality of layered richness — the kind that only comes from a life genuinely, fully lived across many seasons. <em>Each year you have been through has added something to the richness</em> — a new layer of understanding, a deeper capacity for love, a broader perspective, a quieter confidence. The total is extraordinary.",
    msgB: "We see you at fifty-six with a completeness that is beautiful to witness — not the completeness of someone who has stopped growing, but the completeness of someone who has been growing in the right directions for long enough that the growth has become something genuinely magnificent. <em>Fifty-six-year-old Yokshith is a person in their full richness.</em>",
    msgC: "Happy fifty-sixth birthday, our richly-layered, magnificently fifty-six-year-old. <strong>May this year add another beautiful layer to everything you already are — and may you feel the full, extraordinary weight of the richness you have accumulated across fifty-six remarkable years of living.</strong>",
    highlights: [{n: "56", l: "Years Old!", e: "🌊"}, {n: "∞", l: "Layers of Richness", e: "🍂"}, {n: "∞", l: "Depth and Warmth", e: "❤️"}],
    milestone: {e: "🌊", title: "Fifty-Six — Depth Upon Depth!", text: "At fifty-six you are as deep as the ocean — with layers that took decades to form and a warmth at the surface that invites everyone in. The depth is real. The warmth is real. Together they make something that is genuinely one of a kind."},
    wishes: [{e: "🌊", title: "Ocean Deep", c: "#37474F", text: "May the depth of who you are be fully felt and fully appreciated by everyone whose life your life touches this year."}, {e: "🍂", title: "Autumn Richness", c: "#EF6C00", text: "May the rich, warm, golden quality of your fifty-sixth year be as beautiful as the finest autumn you have ever witnessed."}, {e: "💡", title: "Wisdom in Action", c: "#81C784", text: "May the wisdom of fifty-six years find exactly the right moments to do its most important, most meaningful work."}, {e: "❤️", title: "Love Multiplied", c: "#37474F", text: "May the love you give and the love you receive this year be multiplied in all the most beautiful ways."}]

    msgA: "Sixty-five has the quality of deep, genuine generosity — not the anxious generosity of someone trying to earn something, but the free, joyful generosity of someone who has enough of everything that matters and finds real, deep pleasure in giving it away. <em>Your generosity at sixty-five is one of the most beautiful things about you.</em>",
    msgB: "The love you give, the wisdom you share, the time you spend on the people and the things that matter — all of it is given at sixty-five with a completeness and a warmth that is extraordinary. <em>People feel it</em>. The quality of your presence in their lives is one of the things they carry with them everywhere, and it is entirely, completely your gift.",
    msgC: "Happy sixty-fifth birthday, our generous, magnificently sixty-five-year-old. <strong>May this year bring you back everything you have given — in the best possible measure, from the best possible directions, at exactly the right moments.</strong>",
    highlights: [{n: "65", l: "Years Old!", e: "❤️"}, {n: "∞", l: "Given Freely", e: "🌿"}, {n: "∞", l: "Deep Joy", e: "💫"}],
    milestone: {e: "❤️", title: "Sixty-Five — The Generous Heart Year!", text: "At sixty-five your generosity has reached its fullest expression — the free, joyful, completely unencumbered kind that only comes from a person who has found the deepest peace in giving. That generosity is one of your most extraordinary, most enduring, most beloved qualities."},
    wishes: [{e: "❤️", title: "Generous Heart", c: "#2E7D32", text: "May your generous heart be celebrated this year in the way it fully deserves — by the love returned to it from every direction."}, {e: "🌿", title: "Rooted in Love", c: "#C62828", text: "May your deep roots in love hold you, nourish you, and let you keep giving to everyone who benefits from your extraordinary presence."}, {e: "💫", title: "Radiant Joy", c: "#FFD54F", text: "May the joy you give radiate outward this year and come back to you multiplied in all the most beautiful ways."}, {e: "🌳", title: "Shade and Shelter", c: "#2E7D32", text: "May you know how much shelter and shade you provide — and may it be a source of deep, genuine pride."}]

    milestone: {e: "🌺", title: "Eighty-Three — The Extraordinary Continues!", text: "At eighty-three you are more yourself than at any age before — more completely, more warmly, more magnificently yourself. That is one of the rarest things in the world: someone whose years have only increased the quality and the brightness of who they fundamentally, irreplaceably are."},

/* ══ CANVAS ANIMATION ENGINE ══ */
let _animId = null, _floatTimer = null, _animPaused = false;

// Pause all animations when tab is hidden — major perf win
document.addEventListener('visibilitychange', ()=>{
  _animPaused = document.hidden;
});

function stopAnim(){
  if(_animId){ cancelAnimationFrame(_animId); _animId=null; }
  if(_floatTimer){ clearInterval(_floatTimer); _floatTimer=null; }
  document.getElementById('float-layer').innerHTML = '';
  const cv = document.getElementById('bg-canvas');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

function startAnim(theme){
  stopAnim();
  const cv = document.getElementById('bg-canvas');
  // Use logical pixels only — no devicePixelRatio upscale (unnecessary for blobs)
  let W = cv.width = innerWidth, H = cv.height = innerHeight;
  const onResize = ()=>{ W=cv.width=innerWidth; H=cv.height=innerHeight; };
  window.addEventListener('resize', onResize);
  const ctx = cv.getContext('2d');
  const blobs = [
    {x:W*.15, y:H*.25, r:W*.22, c:theme.blob1, vx:.4, vy:.25},
    {x:W*.75, y:H*.6,  r:W*.18, c:theme.blob2, vx:-.3, vy:.35},
    {x:W*.5,  y:H*.1,  r:W*.15, c:theme.blob3, vx:.2, vy:-.3},
  ];
  let tick=0, lastDraw=0;
  const TARGET_FPS = 30; // throttle blobs to 30fps — plenty smooth, halves CPU
  const FRAME_MS   = 1000/TARGET_FPS;
  function frame(ts){
    _animId = requestAnimationFrame(frame);
    if(_animPaused) return;
    if(ts - lastDraw < FRAME_MS) return; // skip frame
    lastDraw = ts;
    tick++;
    ctx.clearRect(0,0,W,H);
    blobs.forEach((b,i)=>{
      b.x += b.vx + Math.sin(tick*.008+i)*.5;
      b.y += b.vy + Math.cos(tick*.012+i)*.4;
      if(b.x<-b.r||b.x>W+b.r) b.vx*=-1;
      if(b.y<-b.r||b.y>H+b.r) b.vy*=-1;
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,b.c); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
  }
  _animId = requestAnimationFrame(frame);
  spawnFloaters(theme.floatType, theme.primary, theme.secondary);
}

const MAX_FLOATERS = 18; // hard cap — prevents unbounded DOM growth

function spawnFloaters(type, c1, c2){
  const layer = document.getElementById('float-layer');
  if(!document.getElementById('floatKF')){
    const s=document.createElement('style'); s.id='floatKF';
    s.textContent=`
      @keyframes floatUp{0%{opacity:0;transform:translateY(0) rotate(0deg);}5%{opacity:.6;}90%{opacity:.3;}100%{opacity:0;transform:translateY(-110vh) rotate(540deg) translateX(40px);}}
      @keyframes floatDown{0%{opacity:0;transform:translateY(-50px) rotate(0);}5%{opacity:.5;}90%{opacity:.2;}100%{opacity:0;transform:translateY(110vh) rotate(-360deg) translateX(-30px);}}
    `;
    document.head.appendChild(s);
  }
  const maps = {
    stars:    ['✨','⭐','💫','🌟','✦','✧'],
    bubbles:  ['○','◯','⬡','◇','□','△'],
    leaves:   ['🍃','🌿','🍀','🌱','🍂','🌾'],
    confetti: ['●','▲','■','◆','★','♦'],
    particles:['·','•','⬤','◉','◎','○']
  };
  const items = maps[type] || maps.stars;
  function mk(){
    if(!document.getElementById('float-layer')) return;
    if(document.getElementById('float-layer').children.length >= MAX_FLOATERS) return;
    const el = document.createElement('div');
    const item = items[Math.floor(Math.random()*items.length)];
    const sz = 10+Math.random()*18;
    const dur = 12+Math.random()*10;
    const dir = Math.random()<.5 ? 'floatUp' : 'floatDown';
    const yStart = dir==='floatUp' ? 'bottom:-50px;' : 'top:-50px;';
    const col = Math.random()<.5 ? c1 : c2;
    el.style.cssText = `position:absolute;left:${Math.random()*100}%;${yStart}font-size:${sz}px;opacity:0;animation:${dir} ${dur}s ${Math.random()*2}s ease-in-out forwards;color:${col};will-change:transform;`;
    el.textContent = item;
    layer.appendChild(el);
    setTimeout(()=>{ if(el.parentNode) el.remove(); },(dur+3)*1000);
  }
  // Initial stagger — 8 items max to start
  for(let i=0;i<8;i++) setTimeout(mk, i*500);
  _floatTimer = setInterval(mk, 2400); // slower interval = fewer DOM ops
}

/* ══ CONFETTI ══ */
const CCV = document.getElementById('confetti'), CCTX = CCV.getContext('2d');
let cps=[], cid=null;
function rsC(){ CCV.width=innerWidth; CCV.height=innerHeight; }
rsC(); window.addEventListener('resize',rsC);
function burst(n=150){
  const cols=['#FF6B35','#FFD23F','#F72585','#9B5DE5','#06D6A0','#3FA7D6','#FFF0E0','#FFB3C1'];
  for(let i=0;i<n;i++) cps.push({
    x:Math.random()*CCV.width, y:-20,
    vx:(Math.random()-.5)*7, vy:2+Math.random()*6,
    w:5+Math.random()*10, h:7+Math.random()*5,
    rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.25,
    c:cols[Math.floor(Math.random()*cols.length)],
    op:1, shape:Math.random()<.45?'rect':'circle'
  });
  if(!cid) cFrame();
}
function cFrame(){
  CCTX.clearRect(0,0,CCV.width,CCV.height);
  cps = cps.filter(p=>p.y<CCV.height+40 && p.op>0);
  cps.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vy+=.06;
    if(p.y>CCV.height*.7) p.op-=.02;
    CCTX.save(); CCTX.translate(p.x,p.y); CCTX.rotate(p.rot);
    CCTX.globalAlpha=p.op; CCTX.fillStyle=p.c;
    if(p.shape==='rect') CCTX.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    else{ CCTX.beginPath(); CCTX.arc(0,0,p.w/2,0,Math.PI*2); CCTX.fill(); }
    CCTX.restore();
  });
  if(cps.length>0) cid=requestAnimationFrame(cFrame);
  else{ CCTX.clearRect(0,0,CCV.width,CCV.height); cid=null; }
}

/* ══ SCROLL REVEAL ══ */
function initReveal(){
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{threshold:.08});
  document.querySelectorAll('.sr').forEach(el=>io.observe(el));
}

}

        <div class="poem-deco" style="background:linear-gradient(90deg,${t.primary},${t.secondary},${t.tertiary});"></div>
        <span class="poem-icon">${t.emojis[2]}</span>
        ${t.poem.map(l=>`<span class="poem-line">${l}</span>`).join('')}
        <div class="poem-attr">— A Birthday Poem for Yokshith —</div>
      </div>
    </div>
  </div>

  <!-- MESSAGE -->
  <div class="sec sec-alt">
    <div class="sec-inner">
      <div class="sec-label sr">
        <div class="sl-line" style="background:linear-gradient(to right,transparent,${t.primary});"></div>
        <span class="sl-text" style="color:${t.primary};border-color:${t.primary};background:rgba(255,107,53,.05);">A Message from Amma &amp; Nanna</span>
        <div class="sl-line sl-line-r" style="background:linear-gradient(to left,transparent,${t.primary});"></div>
      </div>
      <div class="msg-card sr">
        <div class="msg-stripe" style="background:linear-gradient(90deg,${t.primary},${t.secondary},${t.tertiary});"></div>
        <span class="msg-icon">💌</span>
        <p class="msg-p">${t.msgA}</p>
        <p class="msg-p">${t.msgB}</p>
        <p class="msg-p">${t.msgC}</p>
      </div>
    </div>
  </div>

  <!-- MILESTONE -->
  <div class="sec">
    <div class="sec-inner sr">
      <div class="milestone">
        <div class="ms-emo">${t.milestone.e}</div>
        <div>
          <div class="ms-eyebrow" style="color:${t.secondary}">This Year's Milestone</div>
          <div class="ms-title">${t.milestone.title}</div>
          <div class="ms-text">${t.milestone.text}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- WISHES -->
  <div class="sec sec-alt">
    <div class="sec-wide">
      <div class="sec-label sr">
        <div class="sl-line" style="background:linear-gradient(to right,transparent,${t.primary});"></div>
        <span class="sl-text" style="color:${t.primary};border-color:${t.primary};">Birthday Wishes</span>
        <div class="sl-line sl-line-r" style="background:linear-gradient(to left,transparent,${t.primary});"></div>
      </div>
      <div class="wishes-grid">${wishesHtml}</div>
    </div>
  </div>

  <!-- CONFETTI BUTTON -->
  <div class="sec" style="padding-top:0;text-align:center;">
    <div class="sr">
      <button class="confetti-btn" onclick="burst(200)" style="background:linear-gradient(135deg,${t.primary},${t.secondary});">
        🎊 Make It Rain Confetti! 🎊
      </button>
    </div>
  </div>

  <!-- YEAR NAV -->
  ${navSection}

  <!-- SIGNATURE -->
  <div class="signature sr">
    <div class="sig-from">— with every piece of our hearts, always and forever —</div>
    <div class="sig-name" style="color:${t.tertiary}">Amma &amp; Nanna <span class="sig-heart">${t.emojis[1]}</span></div>
  </div>

</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
  initReveal();
}

/* ══ NAVIGATION ══ */
function goBday(year, fromWaiting){
  transition(()=>renderBirthday(year, fromWaiting));
}
function goWaiting(){
  transition(()=>renderWaiting());
}

/* ══ LAUNCH ══ */
window.addEventListener('DOMContentLoaded', ()=>{
  if(isToday(BIRTH_MONTH, BIRTH_DAY)){
    renderBirthday(CY, false);
    setTimeout(()=>burst(200), 2400);
  } else {
    renderWaiting();
  }
  // Dismiss loader
  setTimeout(()=>{
    if(window._ldStop) window._ldStop();
    document.getElementById('loader').classList.add('out');
    setTimeout(()=>{ document.getElementById('app').classList.add('in'); }, 600);
  }, 3200);
});
</script>
