<html lang="en">

<title>Yokshith — Our Little Superstar ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Baloo+2:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #FF6B35;
  --c2: #FFD23F;
  --c3: #06D6A0;
  --c4: #3FA7D6;
  --c5: #9B5DE5;
  --card: rgba(255,255,255,.06);
  --card-border: rgba(255,255,255,.1);
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.45);
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Nunito',sans-serif;background:#07070f;color:var(--text);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;background:none;font:inherit;}

/* ══ LOADER ══ */
#loader{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 40%,rgba(255,107,53,.22) 0%,transparent 50%),
             radial-gradient(ellipse at 70% 60%,rgba(155,93,229,.18) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 20%,rgba(255,210,63,.14) 0%,transparent 40%), #07070f;
  transition:opacity 1s var(--ease),visibility 1s var(--ease);
}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}

.ld-orbit-ring{position:absolute;border-radius:50%;border:1px solid transparent;}
.ld-orbit-ring-1{width:220px;height:220px;border-color:rgba(255,107,53,.3);animation:orbitSpin 6s linear infinite;}
.ld-orbit-ring-2{width:170px;height:170px;border-color:rgba(255,210,63,.2);border-style:dashed;animation:orbitSpin 9s linear infinite reverse;}
.ld-orbit-ring-3{width:130px;height:130px;border-color:rgba(155,93,229,.25);animation:orbitSpin 4s linear infinite;}
@keyframes orbitSpin{to{transform:rotate(360deg);}}

.ld-orbit-dot{position:absolute;width:180px;height:180px;animation:orbitSpin 3.5s linear infinite;}
.ld-orbit-dot::before{content:'⭐';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:20px;animation:orbitSpin 3.5s linear infinite reverse;filter:drop-shadow(0 0 8px rgba(255,210,63,.8));}

.ld-star{font-size:clamp(4rem,12vw,6rem);display:block;animation:ldStarPulse 2s ease-in-out infinite,ldPop 1s var(--spring) forwards;filter:drop-shadow(0 0 30px rgba(255,210,63,.6));}
@keyframes ldStarPulse{0%,100%{transform:scale(1) rotate(-5deg);}50%{transform:scale(1.15) rotate(5deg);}}
@keyframes ldPop{from{opacity:0;transform:scale(.3) rotate(-30deg);}to{opacity:1;}}

.ld-name{font-family:'Baloo 2',cursive;font-size:clamp(2.5rem,10vw,4rem);font-weight:800;background:linear-gradient(135deg,#FFD23F,#FF6B35,#F72585,#9B5DE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 20px rgba(255,107,53,.4));margin-top:12px;opacity:0;animation:ldUp .9s var(--spring) forwards .5s;}
.ld-tagline{font-size:clamp(.72rem,3vw,.92rem);font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.1em;margin-top:6px;opacity:0;animation:ldFade .8s ease forwards .9s;}
.ld-bar-wrap{width:min(200px,55vw);height:3px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:32px;opacity:0;animation:ldFade .5s ease forwards 1s;}
.ld-bar{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,#FFD23F,#FF6B35,#F72585,#9B5DE5);animation:ldBarFill 1.5s var(--ease) forwards 1.1s;}
@keyframes ldBarFill{from{width:0%;}to{width:100%;}}
.ld-dots{display:flex;gap:10px;margin-top:14px;opacity:0;animation:ldFade .5s ease forwards 1.2s;}
.ld-dot{width:6px;height:6px;border-radius:50%;animation:ldDotBounce 1.2s ease-in-out infinite alternate;}
.ld-dot:nth-child(1){background:#FFD23F;animation-delay:0s;}
.ld-dot:nth-child(2){background:#FF6B35;animation-delay:.2s;}
.ld-dot:nth-child(3){background:#F72585;animation-delay:.4s;}
@keyframes ldDotBounce{from{opacity:.3;transform:scale(.6);}to{opacity:1;transform:scale(1.4);}}
@keyframes ldUp{from{opacity:0;transform:translateY(20px) scale(.9);}to{opacity:1;transform:none;}}
@keyframes ldFade{from{opacity:0;}to{opacity:1;}}

/* ══ CANVAS / LAYERS ══ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#shape-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
#confetti{position:fixed;inset:0;z-index:20;pointer-events:none;}

/* ══ APP ══ */
#app{position:relative;z-index:10;opacity:0;transition:opacity .8s ease;min-height:100vh;}
#app.in{opacity:1;}

/* ══ LAYOUT ══ */
.sec{padding:clamp(50px,8vw,90px) clamp(16px,5vw,60px);position:relative;}
.sec-inner{max-width:700px;margin:0 auto;}
.sec-inner-wide{max-width:920px;margin:0 auto;}

.sec-label{display:flex;align-items:center;gap:14px;margin-bottom:clamp(32px,5vw,50px);}
.sl-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--c1));opacity:.4;}
.sl-line-r{background:linear-gradient(to left,transparent,var(--c1));}
.sl-text{font-family:'Fredoka',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.4em;text-transform:uppercase;white-space:nowrap;color:var(--c1);padding:5px 16px;border:1px solid var(--c1);border-radius:50px;background:rgba(0,0,0,.3);opacity:.8;}

/* Reveal */
.sr{opacity:0;transform:translateY(28px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.sr.in{opacity:1;transform:none;}

/* ══ HERO ══ */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(80px,12vw,140px) clamp(16px,5vw,60px) clamp(60px,8vw,100px);position:relative;overflow:hidden;}

.hero-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:.65rem;font-weight:500;letter-spacing:.55em;text-transform:uppercase;color:var(--c2);margin-bottom:16px;opacity:0;animation:ldFade .8s ease forwards 2.6s;text-shadow:0 0 20px var(--c2);}

.hero-emoji-row{display:flex;gap:clamp(10px,3vw,20px);justify-content:center;margin-bottom:clamp(16px,3vw,24px);opacity:0;animation:ldPop .8s var(--spring) forwards 2.8s;}
.her{font-size:clamp(2rem,7vw,4rem);display:inline-block;animation:herFloat 2s ease-in-out infinite alternate;}
.her:nth-child(1){animation-delay:0s;}
.her:nth-child(2){animation-delay:.25s;}
.her:nth-child(3){animation-delay:.5s;}
.her:nth-child(4){animation-delay:.75s;}
.her:nth-child(5){animation-delay:1s;}
@keyframes herFloat{from{transform:translateY(0) rotate(-6deg) scale(1);}to{transform:translateY(-14px) rotate(6deg) scale(1.12);}}

.hero-title-l1{display:block;font-family:'Baloo 2',cursive;font-size:clamp(3.5rem,16vw,10rem);font-weight:800;line-height:.9;background:linear-gradient(135deg,var(--c2) 0%,var(--c1) 50%,var(--c5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 30px rgba(255,107,53,.4));opacity:0;animation:ldUp 1s var(--spring) forwards 3s;}
.hero-title-l2{display:block;font-family:'Baloo 2',cursive;font-size:clamp(2rem,9vw,5.5rem);font-weight:600;line-height:1;background:linear-gradient(135deg,var(--c3) 0%,var(--c4) 60%,var(--c5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 30px rgba(63,167,214,.3));margin-top:4px;opacity:0;animation:ldUp .9s var(--spring) forwards 3.2s;}

.hero-name-badge{display:inline-flex;align-items:center;gap:10px;margin:clamp(16px,3vw,24px) 0;padding:12px 28px;border-radius:50px;background:linear-gradient(135deg,rgba(255,210,63,.12),rgba(255,107,53,.1));border:1px solid rgba(255,210,63,.25);backdrop-filter:blur(10px);opacity:0;animation:ldUp .9s var(--spring) forwards 3.4s;}
.hnb-label{font-size:.6rem;font-weight:700;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);}
.hnb-name{font-family:'Fredoka',sans-serif;font-size:clamp(1.3rem,4vw,1.9rem);font-weight:600;color:var(--c2);text-shadow:0 0 20px var(--c2);}
.hnb-sep{color:rgba(255,255,255,.2);}

.hero-tagline{max-width:500px;font-family:'Nunito',sans-serif;font-style:italic;font-weight:700;font-size:clamp(1rem,3.5vw,1.3rem);color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:clamp(24px,4vw,40px);opacity:0;animation:ldFade .9s ease forwards 3.6s;}

/* Age ring */
.age-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:clamp(30px,5vw,50px);opacity:0;animation:ldPop .9s var(--spring) forwards 3.8s;}
.age-ring-svg{animation:orbitSpin 12s linear infinite;}
.age-num{position:absolute;display:flex;flex-direction:column;align-items:center;}
.age-big{font-family:'Baloo 2',cursive;font-size:clamp(2rem,7vw,3.2rem);font-weight:800;line-height:1;}
.age-lbl{font-family:'Space Grotesk',sans-serif;font-size:.5rem;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:3px;}

.scroll-cue{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:ldFade 1.2s ease forwards 4.5s;}
.sc-txt{font-size:.54rem;font-weight:700;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.25);}
.sc-line{width:1px;height:32px;background:linear-gradient(to bottom,rgba(255,255,255,.3),transparent);animation:scPulse 2s ease-in-out infinite;}
@keyframes scPulse{0%,100%{opacity:.5;transform:scaleY(1);}50%{opacity:1;transform:scaleY(.6);}}

/* ══ POEM ══ */
.poem-block{position:relative;padding:clamp(28px,5vw,44px);background:var(--card);border-radius:24px;border:1px solid var(--card-border);overflow:hidden;text-align:center;}
.poem-block::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,210,63,.05),rgba(155,93,229,.05));pointer-events:none;}
.poem-glow{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--c2),transparent 70%);opacity:.12;filter:blur(20px);pointer-events:none;}
.poem-icon{font-size:clamp(2rem,6vw,3rem);display:block;margin-bottom:16px;animation:herFloat 2.5s ease-in-out infinite alternate;}
.poem-line{font-family:'Nunito',sans-serif;font-style:italic;font-weight:700;font-size:clamp(.95rem,3vw,1.2rem);color:rgba(255,255,255,.75);line-height:2.1;display:block;}
.poem-line em{font-style:normal;color:var(--c2);}
.poem-attr{font-size:.6rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;}
.poem-attr::before,.poem-attr::after{content:'';width:20px;height:1px;background:currentColor;opacity:.5;}

/* ══ MESSAGE ══ */
.msg-card{position:relative;background:var(--card);border-radius:24px;padding:clamp(28px,5vw,48px);overflow:hidden;}
.msg-stripe{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5));}
.msg-glow-ring{position:absolute;inset:-2px;border-radius:26px;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c1));z-index:-1;opacity:.22;animation:glowSpin 6s linear infinite;filter:blur(4px);}
@keyframes glowSpin{from{filter:hue-rotate(0deg) blur(4px);}to{filter:hue-rotate(360deg) blur(4px);}}
.msg-icon{font-size:clamp(2rem,6vw,2.8rem);display:block;margin-bottom:20px;text-align:center;animation:herFloat 3s ease-in-out infinite alternate;}
.msg-para{font-family:'Nunito',sans-serif;font-size:clamp(1rem,3vw,1.15rem);font-weight:600;color:rgba(255,255,255,.8);line-height:1.9;margin-bottom:18px;text-align:center;}
.msg-para:last-child{margin-bottom:0;}
.msg-para em{font-style:normal;color:var(--c2);font-weight:800;}
.msg-para strong{color:var(--c1);}

/* ══ MILESTONE ══ */
.milestone-banner{padding:clamp(22px,4vw,36px);border-radius:20px;background:linear-gradient(135deg,rgba(255,210,63,.08),rgba(255,107,53,.06),rgba(155,93,229,.06));border:1px solid rgba(255,210,63,.2);display:flex;gap:20px;align-items:flex-start;position:relative;overflow:hidden;}
.milestone-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c2),var(--c1),var(--c5));}
.ms-icon{font-size:clamp(2rem,6vw,3rem);flex-shrink:0;margin-top:2px;}
.ms-label{font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--c2);margin-bottom:5px;}
.ms-title{font-family:'Fredoka',sans-serif;font-size:clamp(1rem,3.5vw,1.35rem);font-weight:600;margin-bottom:6px;}
.ms-text{font-size:.9rem;font-weight:600;color:var(--muted);line-height:1.75;}

/* ══ WISHES ══ */
.wishes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));gap:14px;}
.wish-card{background:var(--card);border-radius:18px;padding:22px 16px;border:1px solid var(--card-border);text-align:center;transition:transform .4s var(--spring),box-shadow .4s,border-color .3s;cursor:default;}
.wish-card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 20px 50px rgba(0,0,0,.4);border-color:var(--c1);}
.wc-emoji{font-size:2rem;display:block;margin-bottom:10px;animation:herFloat 2s ease-in-out infinite alternate;}
.wc-title{font-family:'Fredoka',sans-serif;font-size:1.05rem;font-weight:600;margin-bottom:5px;}
.wc-text{font-size:.8rem;font-weight:600;color:var(--muted);line-height:1.6;}

/* ══ YEAR NAV ══ */
.year-nav{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;}
.yn-btn{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:500;border:1.5px solid var(--card-border);background:var(--card);color:var(--text);transition:all .35s var(--ease);backdrop-filter:blur(10px);}
.yn-btn:hover{background:var(--c1);border-color:var(--c1);color:#000;transform:translateY(-3px) scale(1.04);box-shadow:0 10px 30px rgba(0,0,0,.3);}
.yn-btn svg{flex-shrink:0;transition:transform .3s;}
.yn-btn:hover svg{transform:translateX(-3px);}
.yn-btn.fwd:hover svg{transform:translateX(3px);}
.yn-btn.home:hover svg{transform:none;}

.locked-box{max-width:380px;margin:0 auto;padding:28px;text-align:center;border:2px dashed rgba(255,255,255,.1);border-radius:20px;}
.locked-emoji{font-size:2.5rem;display:block;margin-bottom:12px;animation:herFloat 2s ease-in-out infinite alternate;}
.locked-title{font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:600;color:var(--c2);margin-bottom:8px;}
.locked-text{font-size:.85rem;font-weight:600;color:var(--muted);line-height:1.75;}

.past-banner{margin-bottom:20px;padding:10px 20px;border-radius:50px;background:rgba(255,210,63,.08);border:1px solid rgba(255,210,63,.2);font-family:'Fredoka',sans-serif;font-size:.95rem;color:rgba(255,255,255,.6);display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}

/* ══ WAITING ══ */
.wait-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(80px,12vw,140px) clamp(16px,5vw,60px) clamp(80px,10vw,120px);position:relative;overflow:hidden;}
.wait-rocket{font-size:clamp(4rem,14vw,7rem);display:block;animation:rocketFloat 2.5s ease-in-out infinite;margin-bottom:24px;filter:drop-shadow(0 0 30px rgba(255,107,53,.5));}
@keyframes rocketFloat{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-22px) rotate(8deg);}}
.wait-title{font-family:'Baloo 2',cursive;font-size:clamp(2.5rem,11vw,6rem);font-weight:800;line-height:1.05;background:linear-gradient(135deg,#FFD23F,#FF6B35,#F72585,#9B5DE5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 30px rgba(255,107,53,.4));margin-bottom:12px;opacity:0;animation:ldUp 1s var(--spring) forwards .2s;}
.wait-sub{font-size:clamp(.9rem,3.5vw,1.1rem);font-weight:700;color:var(--muted);margin-bottom:40px;max-width:480px;line-height:1.7;opacity:0;animation:ldFade .9s ease forwards .5s;}
.wait-sub em{color:var(--c2);font-style:normal;}

.cd-widget{background:var(--card);border-radius:24px;padding:clamp(24px,4vw,40px) clamp(28px,5vw,48px);border:1px solid var(--card-border);margin-bottom:40px;min-width:min(340px,90vw);position:relative;overflow:hidden;}
.cd-widget::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,210,63,.05),rgba(155,93,229,.04));}
.cd-widget-title{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:var(--c2);margin-bottom:4px;text-align:center;}
.cd-widget-date{font-size:.72rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;text-align:center;}
.cd-nums{display:flex;gap:clamp(10px,3vw,20px);justify-content:center;align-items:flex-end;position:relative;}
.cd-unit{text-align:center;}
.cd-num{font-family:'Baloo 2',cursive;font-size:clamp(2rem,8vw,3rem);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--c2),var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;transition:transform .2s var(--spring);}
.cd-lbl{font-size:.55rem;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.cd-sep{font-family:'Baloo 2',cursive;font-size:clamp(1.5rem,5vw,2.2rem);font-weight:800;color:rgba(255,255,255,.15);margin-bottom:8px;}

.wait-love-note{max-width:560px;margin:0 auto 40px;background:var(--card);border-radius:20px;padding:clamp(24px,4vw,36px);border:1px solid var(--card-border);}
.wln-top{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--c2);margin-bottom:14px;}
.wln-text{font-family:'Nunito',sans-serif;font-size:clamp(.9rem,3vw,1.05rem);font-weight:600;color:rgba(255,255,255,.65);line-height:1.9;margin-bottom:12px;}
.wln-text em{color:var(--c2);font-style:normal;}
.wln-sig{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.3);margin-top:16px;}

.memory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,165px),1fr));gap:12px;}
.memory-card{background:var(--card);border-radius:16px;padding:20px 14px;border:1px solid var(--card-border);text-align:center;cursor:pointer;transition:transform .35s var(--spring),box-shadow .35s,border-color .3s;}
.memory-card:hover{transform:translateY(-6px) scale(1.05);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:var(--c1);}
.mc-emoji{font-size:1.8rem;display:block;margin-bottom:8px;}
.mc-year{font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:600;color:var(--c2);}
.mc-lbl{font-size:.7rem;font-weight:600;color:var(--muted);margin-top:2px;}

/* ══ SIGNATURE / FOOTER ══ */
.signature{text-align:center;padding:clamp(30px,5vw,50px) 20px clamp(20px,3vw,30px);}
.sig-from{font-family:'Space Grotesk',sans-serif;font-size:.58rem;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:10px;}

/* ══ ANIMATION ENGINE ══ */
let _animId=null,_shapeTimer=null;
function stopAnim(){if(_animId){cancelAnimationFrame(_animId);_animId=null;}if(_shapeTimer){clearInterval(_shapeTimer);_shapeTimer=null;}document.getElementById('shape-layer').innerHTML='';const cv=document.getElementById('bg-canvas');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

function startAnim(type,bgColors){
  stopAnim();
  const cv=document.getElementById('bg-canvas');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const ctx=cv.getContext('2d');
  if(type==='starfield')animStarfield(ctx,cv,bgColors);
  else if(type==='bubbles')animBubbles(ctx,cv,bgColors);
  else if(type==='aurora')animAurora(ctx,cv,bgColors);
  else animParticles(ctx,cv,bgColors);
}

function animStarfield(ctx,cv,bgColors){
  const stars=Array.from({length:80},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:.5+Math.random()*2,vy:.2+Math.random()*.5,a:Math.random(),aa:.007+Math.random()*.012,c:bgColors[Math.floor(Math.random()*bgColors.length)]}));
  function frame(){ctx.clearRect(0,0,cv.width,cv.height);stars.forEach(s=>{s.y+=s.vy;s.a+=s.aa;if(s.y>cv.height+10){s.y=-10;s.x=Math.random()*cv.width;s.a=0;}const al=.6*Math.abs(Math.sin(s.a));const hex=Math.round(al*255).toString(16).padStart(2,'0');ctx.save();ctx.translate(s.x,s.y);const col=s.c.replace(/[\d.]+\)$/,`${al.toFixed(2)})`);ctx.fillStyle=col;const r=s.r*2,ri=s.r*.4;ctx.beginPath();for(let i=0;i<8;i++){const ang=i*Math.PI/4,rad=i%2===0?r:ri;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}ctx.closePath();ctx.fill();ctx.restore();});_animId=requestAnimationFrame(frame);}
  frame();
}

function animBubbles(ctx,cv,bgColors){
  const bubs=Array.from({length:45},()=>({x:Math.random()*cv.width,y:cv.height+50,r:4+Math.random()*14,vy:-(0.3+Math.random()*.6),a:Math.random(),aa:.005+Math.random()*.008,wobble:Math.random()*Math.PI*2,ws:(Math.random()-.5)*.03,c:bgColors[Math.floor(Math.random()*bgColors.length)]}));
  function frame(){ctx.clearRect(0,0,cv.width,cv.height);bubs.forEach(b=>{b.y+=b.vy;b.wobble+=b.ws;b.a+=b.aa;if(b.y<-30){b.y=cv.height+30;b.x=Math.random()*cv.width;b.a=0;}b.x+=Math.sin(b.wobble)*.5;const al=.45*Math.sin(Math.PI*Math.min(b.a,1));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle=b.c.replace(/[\d.]+\)$/,`${al.toFixed(2)})`);ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.2,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${(al*.4).toFixed(2)})`;ctx.fill();});_animId=requestAnimationFrame(frame);}
  frame();
}

function animParticles(ctx,cv,bgColors){
  const pts=Array.from({length:65},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:.8+Math.random()*2.5,vx:(Math.random()-.5)*.25,vy:-(0.12+Math.random()*.35),a:Math.random(),aa:.005+Math.random()*.012,c:bgColors[Math.floor(Math.random()*bgColors.length)]}));
  function frame(){ctx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.aa;if(p.y<-10||p.a>1.1){p.x=Math.random()*cv.width;p.y=cv.height+10;p.a=0;}const al=.5*Math.sin(Math.PI*p.a);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c.replace(/[\d.]+\)$/,`${al.toFixed(2)})`);ctx.fill();});_animId=requestAnimationFrame(frame);}
  frame();
}

function animAurora(ctx,cv,bgColors){
  const blobs=bgColors.map((c,i)=>({x:cv.width*(0.2+i*.25),y:cv.height*(0.3+i*.2),vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.35,r:cv.width*.2+i*40,c}));
  let tick=0;
  function frame(){tick++;ctx.clearRect(0,0,cv.width,cv.height);blobs.forEach((b,i)=>{b.x+=b.vx+Math.sin(tick*.006+i)*.6;b.y+=b.vy+Math.cos(tick*.008+i)*.4;if(b.x<0||b.x>cv.width)b.vx*=-1;if(b.y<0||b.y>cv.height)b.vy*=-1;const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c.replace(/[\d.]+\)$/,'.18)'));g.addColorStop(1,b.c.replace(/[\d.]+\)$/,'0)'));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});_animId=requestAnimationFrame(frame);}
  frame();
}

function spawnShapes(type){
  const layer=document.getElementById('shape-layer');
  const maps={stars:['⭐','✨','💫','🌟'],bubbles:['🫧','💧','🔵','🟣'],leaves:['🍃','🌿','🍀','🌱'],geometric:['◆','◇','▲','▸'],confetti:['🎊','🎉','✨','🎈']};

  function mk(){if(!document.getElementById('shape-layer'))return;const el=document.createElement('div');const sz=14+Math.random()*22,e=emojis[Math.floor(Math.random()*emojis.length)],dur=10+Math.random()*10,anim=Math.random()<.5?'sfRise':'sfFall',start=anim==='sfRise'?'bottom:-60px;':'top:-60px;';el.style.cssText=`position:absolute;left:${Math.random()*100}%;${start}font-size:${sz}px;animation:${anim} ${dur}s ${Math.random()*4}s linear forwards;`;el.textContent=e;layer.appendChild(el);setTimeout(()=>el.remove(),(dur+5)*1000);}
  for(let i=0;i<12;i++)setTimeout(mk,i*500);

const CCV=document.getElementById('confetti'),CCTX=CCV.getContext('2d');
let cps=[],cid=null;
function resizeC(){CCV.width=innerWidth;CCV.height=innerHeight;}resizeC();window.addEventListener('resize',resizeC);
function burst(n=140){
  const cols=['#FFD23F','#FF6B35','#F72585','#9B5DE5','#06D6A0','#3FA7D6','#ffffff'];
  for(let i=0;i<n;i++)cps.push({x:Math.random()*CCV.width,y:-20,vx:(Math.random()-.5)*6,vy:2+Math.random()*5,w:5+Math.random()*10,h:7+Math.random()*5,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.22,c:cols[Math.floor(Math.random()*cols.length)],op:1,shape:Math.random()<.45?'rect':'circle'});

}
function cFrame(){CCTX.clearRect(0,0,CCV.width,CCV.height);cps=cps.filter(p=>p.y<CCV.height+40&&p.op>0);cps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;p.vy+=.05;if(p.y>CCV.height*.75)p.op-=.018;CCTX.save();CCTX.translate(p.x,p.y);CCTX.rotate(p.rot);CCTX.globalAlpha=p.op;CCTX.fillStyle=p.c;if(p.shape==='rect')CCTX.fillRect(-p.w/2,-p.h/2,p.w,p.h);else{CCTX.beginPath();CCTX.arc(0,0,p.w/2,0,Math.PI*2);CCTX.fill();}CCTX.restore();});if(cps.length>0)cid=requestAnimationFrame(cFrame);else{CCTX.clearRect(0,0,CCV.width,CCV.height);cid=null;}}

<div class="sec"><div class="sec-inner sr">
  <div class="milestone-banner">
    <div class="ms-icon">${t.milestone}</div>
    <div>
      <div class="ms-label">This Year's Milestone</div>
      <div class="ms-title">${t.mileTitle}</div>
      <div class="ms-text">${t.mileText}</div>
    </div>
  </div>
</div></div>

<div class="sec" style="background:rgba(255,255,255,.02);"><div class="sec-inner-wide">
  <div class="sec-label sr"><div class="sl-line"></div><span class="sl-text">Birthday Wishes</span><div class="sl-line sl-line-r"></div></div>
  <div class="wishes-grid sr">${wishCards}</div>
</div></div>

<div class="sec" style="padding-top:0;text-align:center;">
  <div class="sr">
    <button onclick="burst(200)" style="font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:#000;background:linear-gradient(135deg,var(--c2),var(--c1));padding:16px 40px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.3);transition:transform .25s,box-shadow .25s;" onmouseover="this.style.transform='scale(1.07) translateY(-3px)'" onmouseout="this.style.transform=''">
      🎊 Make It Rain Confetti! 🎊
    </button>
  </div>
</div>

<div class="sec"><div class="sec-inner" style="text-align:center;">
  ${canBack||canFwd||fromWaiting?`
  <div style="font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:500;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;">Browse Birthdays</div>
  <div class="year-nav sr">
    ${canBack?`<button class="yn-btn" onclick="renderBirthday(${year-1},false)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M10 7H4M6 4l-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>${year-1} &middot; Age ${age-1}</button>`:''}
    ${canFwd?`<button class="yn-btn fwd" onclick="renderBirthday(${year+1},false)">${year+1} &middot; Age ${age+1}<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 7h6M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`:''}
    ${fromWaiting?`<button class="yn-btn home" onclick="renderWaiting()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2L2 6v6h3.5V9h3v3H12V6L7 2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Back Home</button>`:''}
  </div>
  ${!canFwd&&!fromWaiting?`<div class="locked-box sr" style="margin-top:24px;"><span class="locked-emoji">🔮</span><div class="locked-title">Next Year is a Surprise!</div><div class="locked-text">Come back on 2nd September ${year+1} to discover what Age ${age+1} holds for Yokshith. Some things are worth waiting for. ✨</div></div>`:''}
  `:''}
</div></div>

<div class="signature sr">
  <div class="sig-from">&mdash; with every piece of our hearts, always and forever &mdash;</div>
  <div class="sig-name">Amma &amp; Nanna <span class="sig-heart">${t.emojis[1]}</span></div>
</div>

</div>`;
  window.scrollTo({top:0,behavior:'smooth'});initReveal();
}

/* ══ LAUNCH ══ */
window.addEventListener('DOMContentLoaded',()=>{
  if(isToday(BIRTH_MONTH,BIRTH_DAY)){renderBirthday(CY,false);setTimeout(()=>burst(180),2200);}
  else renderWaiting();
  setTimeout(()=>{document.getElementById('loader').classList.add('out');setTimeout(()=>{document.getElementById('app').classList.add('in');},200);},2600);
});
</script>
</body>
</html>
