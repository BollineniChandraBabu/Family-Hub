<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="location-guard.js"></script>
  <title>Access Restricted</title>
  <style>
    :root {
      --bg: #fff8f3;
      --card: #ffffff;
      --text: #3b2a22;
      --muted: #7e6558;
      --accent: #c69a4d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #ffe9d4, var(--bg) 45%);
      font-family: "Lato", Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
      border: 1px solid #f0dfcf;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      margin-bottom: 12px;
      color: var(--accent);
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .region-list {
      margin-top: 14px;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="restricted-title">
    <h1 id="restricted-title">Access Restricted</h1>
    <p>
      This site is currently available only for visitors from the following regions:
    </p>
    <p class="region-list">Andhra Pradesh & Telangana</p>
  </main>
</body>
</html>
