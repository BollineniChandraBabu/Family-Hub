<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Family — Celebrations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --silver: #a8b8c8;
  --bg: #05060f;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.9);
  --muted: rgba(255,255,255,0.4);
  --radius: 20px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  min-height:100vh;
  font-family:'Jost',sans-serif;
  overflow-x:hidden;
  color:var(--text);
}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#05060f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity .8s ease, visibility .8s ease;
}
#loader.hide{opacity:0;visibility:hidden;}
.loader-ring{
  width:72px;height:72px;
  border:2px solid rgba(201,168,76,.15);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1.1s linear infinite;
  position:relative;
}
.loader-ring::after{
  content:'✦';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:var(--gold);animation:spin 1.1s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.6em;
  text-transform:uppercase;color:var(--muted);
  animation:loaderPulse 1.4s ease-in-out infinite alternate;
}
@keyframes loaderPulse{from{opacity:.3;}to{opacity:.9;}}

/* ── CANVAS ── */
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── AURORA ── */
.aurora{
  position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;
}
.aurora-band{
  position:absolute;border-radius:50%;filter:blur(120px);
  animation:auroraFloat ease-in-out infinite alternate;opacity:.12;
}
.ab1{width:800px;height:400px;background:linear-gradient(135deg,#1a3a6e,#2d1b69);top:-100px;left:-200px;animation-duration:12s;}
.ab2{width:600px;height:500px;background:linear-gradient(135deg,#6e1a3a,#3a1a1a);bottom:-150px;right:-100px;animation-duration:9s;}
.ab3{width:400px;height:400px;background:linear-gradient(135deg,#1a4a3a,#0d2a1a);top:40%;left:30%;animation-duration:15s;}
@keyframes auroraFloat{
  from{transform:translate(0,0) scale(1) rotate(0deg);}
  to{transform:translate(30px,-20px) scale(1.15) rotate(8deg);}
}

/* ── LAYOUT ── */
.page-wrap{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:0 0 60px;
}

/* ── HEADER ── */
header{
  padding:clamp(40px,7vw,80px) clamp(20px,5vw,60px) clamp(20px,4vw,40px);
  text-align:center;
  opacity:0;animation:riseUp .9s ease forwards .3s;
}
.header-badge{
  display:inline-flex;align-items:center;gap:10px;
  font-size:.6rem;letter-spacing:.5em;text-transform:uppercase;
  color:var(--gold);font-weight:300;
  border:1px solid rgba(201,168,76,.25);border-radius:50px;
  padding:6px 18px;margin-bottom:24px;
  background:rgba(201,168,76,.05);
}
.header-badge span{width:4px;height:4px;border-radius:50%;background:var(--gold);display:inline-block;animation:badgePulse 2s ease-in-out infinite;}
@keyframes badgePulse{0%,100%{opacity:.4;}50%{opacity:1;}}
h1{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,7vw,4rem);
  font-weight:700;
  letter-spacing:.08em;
  background:linear-gradient(135deg,#e8c97a 0%,#c9a84c 40%,#ffffff 60%,#c9a84c 80%,#e8c97a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
  line-height:1.1;
}
.header-sub{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(.9rem,3vw,1.2rem);
  color:var(--muted);
  letter-spacing:.05em;
}
.header-divider{
  display:flex;align-items:center;justify-content:center;gap:20px;
  margin-top:30px;
}
.hd-line{width:clamp(40px,8vw,100px);height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4));}
.hd-line:last-child{background:linear-gradient(to left,transparent,rgba(201,168,76,.4));}
.hd-icon{color:var(--gold);font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;font-size:.55rem;color:rgba(201,168,76,.6);}

/* ── SECTION LABEL ── */
.section-label{
  text-align:center;padding:0 20px 20px;
  opacity:0;animation:riseUp .8s ease forwards .5s;
}
.sl-inner{
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.5em;text-transform:uppercase;
  color:var(--muted);display:inline-flex;align-items:center;gap:12px;
}
.sl-inner::before,.sl-inner::after{content:'';width:30px;height:1px;background:rgba(255,255,255,.1);}

/* ── MEMBERS GRID ── */
.members-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));
  gap:20px;
  padding:0 clamp(16px,4vw,60px) 20px;
  max-width:1200px;
  margin:0 auto;
  width:100%;
}

/* ── MEMBER CARD ── */
.member-card{
  position:relative;
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;color:inherit;
  opacity:0;
  transform:translateY(30px);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease;
  display:block;
}
.member-card.visible{opacity:1;transform:translateY(0);}
.member-card:hover{transform:translateY(-8px) scale(1.02);}
.member-card:hover .mc-shine{opacity:1;}
.member-card:hover .mc-visit{background:var(--card-accent,var(--gold));color:#000;}
.member-card:hover .mc-visit-arrow{transform:translateX(4px);}

.mc-bg{
  position:absolute;inset:0;
  background:var(--card-bg, linear-gradient(135deg,rgba(30,15,20,.95),rgba(15,8,12,.98)));
  z-index:0;
}
.mc-border{
  position:absolute;inset:0;border-radius:var(--radius);z-index:1;pointer-events:none;
  border:1px solid var(--card-border,rgba(255,255,255,.08));
  transition:border-color .3s;
}
.member-card:hover .mc-border{border-color:var(--card-accent-alpha,rgba(201,168,76,.3));}
.mc-glow{
  position:absolute;inset:-1px;border-radius:calc(var(--radius)+1px);z-index:0;
  background:var(--card-glow,linear-gradient(135deg,rgba(201,168,76,.15),transparent,rgba(201,168,76,.08),transparent));
  opacity:0;transition:opacity .4s;
}
.member-card:hover .mc-glow{opacity:1;}
.mc-shine{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.04),transparent);
  transition:opacity .3s;opacity:0;z-index:2;pointer-events:none;
  animation:none;
}
.member-card:hover .mc-shine{left:150%;transition:left .7s ease,opacity .3s;opacity:1;}

.mc-content{position:relative;z-index:3;padding:clamp(24px,4vw,36px);}

.mc-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:22px;}
.mc-avatar{
  width:62px;height:62px;flex-shrink:0;
  border-radius:50%;
  background:var(--card-avatar-bg,rgba(201,168,76,.1));
  border:2px solid var(--card-accent-alpha,rgba(201,168,76,.2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
  position:relative;overflow:hidden;
  transition:transform .3s;
}
.member-card:hover .mc-avatar{transform:scale(1.08);}
.mc-avatar-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:1px solid var(--card-accent-alpha,rgba(201,168,76,.15));
  animation:ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.1);opacity:1;}}

.mc-identity{flex:1;}
.mc-name{
  font-family:'Cinzel',serif;font-size:clamp(1.1rem,3vw,1.35rem);
  font-weight:600;color:var(--text);margin-bottom:5px;
  letter-spacing:.04em;
}
.mc-relation{
  display:inline-block;
  font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;
  font-weight:400;
  color:var(--card-accent-text,rgba(201,168,76,.8));
  background:var(--card-accent-bg,rgba(201,168,76,.08));
  border:1px solid var(--card-accent-alpha,rgba(201,168,76,.15));
  padding:3px 10px;border-radius:50px;
}

.mc-events-label{
  font-size:.55rem;letter-spacing:.35em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;font-weight:400;
}

.mc-event{
  background:rgba(0,0,0,.25);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,.05);
  transition:background .3s;
}
.member-card:hover .mc-event{background:rgba(0,0,0,.35);}
.mc-event-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.mc-event-name{
  font-family:'Playfair Display',serif;font-size:.85rem;
  color:rgba(255,255,255,.7);font-style:italic;
}
.mc-event-date{
  font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin-top:3px;
}
.mc-countdown{
  font-family:'Cinzel',serif;font-size:.75rem;
  color:var(--card-accent-text,var(--gold));
  white-space:nowrap;letter-spacing:.05em;
}
.mc-countdown.live{animation:countdownPulse 2s ease-in-out infinite;}
@keyframes countdownPulse{0%,100%{opacity:.7;}50%{opacity:1;}}
.mc-today-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:#0a0a0a;
  background:var(--card-accent,var(--gold));
  padding:3px 10px;border-radius:50px;font-weight:600;
  animation:todayPop .8s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes todayPop{from{transform:scale(0);}to{transform:scale(1);}}

.mc-visit{
  width:100%;margin-top:20px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--card-accent-alpha,rgba(201,168,76,.2));
  border-radius:10px;padding:12px 20px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(255,255,255,.6);cursor:pointer;
  transition:all .3s ease;
}
.mc-visit-arrow{font-size:.8rem;transition:transform .3s;}

/* ── FUTURE CARD ── */
.future-card{
  border-radius:var(--radius);overflow:hidden;
  border:1px dashed rgba(255,255,255,.07);
  min-height:280px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:30px;text-align:center;
  opacity:0;
  animation:riseUp .8s ease forwards;
  transition:border-color .3s, background .3s;
}
.future-card:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.02);}
.future-icon{
  width:54px;height:54px;border-radius:50%;
  border:1px dashed rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:rgba(255,255,255,.15);
}
.future-label{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;
  text-transform:uppercase;color:rgba(255,255,255,.2);
}
.future-sub{font-size:.75rem;color:rgba(255,255,255,.12);font-style:italic;font-family:'Playfair Display',serif;}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;text-align:center;
  padding:clamp(20px,4vw,40px) 20px;
  border-top:1px solid rgba(255,255,255,.04);
  margin-top:20px;
  opacity:0;animation:riseUp .8s ease forwards 1s;
}
.footer-line1{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:.85rem;color:rgba(255,255,255,.2);margin-bottom:8px;
}
.footer-copy{
  font-size:.6rem;letter-spacing:.2em;color:rgba(255,255,255,.13);
}
.footer-copy em{font-style:normal;color:rgba(201,168,76,.35);}

@keyframes riseUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .members-grid{grid-template-columns:1fr;padding:0 16px 20px;}
}
@media(min-width:600px) and (max-width:900px){
  .members-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Family Portal</div>
</div>

<!-- BACKGROUND -->
<canvas id="canvas"></canvas>
<div class="aurora">
  <div class="aurora-band ab1"></div>
  <div class="aurora-band ab2"></div>
  <div class="aurora-band ab3"></div>
</div>

<div class="page-wrap">
  <header>
    <div class="header-badge"><span></span>Est. 2023 · Family Celebrations Portal</div>
    <h1>Our Family</h1>
    <p class="header-sub">Celebrations, Milestones &amp; Memories — All in One Place</p>
    <div class="header-divider">
      <div class="hd-line"></div>
      <span class="hd-icon">✦ Crafted with Love ✦</span>
      <div class="hd-line"></div>
    </div>
  </header>

  <div class="section-label">
    <span class="sl-inner">Family Members</span>
  </div>

  <div class="members-grid" id="members-grid">
    <!-- Cards injected by JS -->
  </div>

  <footer>
    <div class="footer-line1">"Every celebration is a thread woven into the fabric of our story."</div>
    <div class="footer-copy">
      © <em id="yr"></em> All Rights Reserved &nbsp;·&nbsp;
      <em>Developed with ❤️ by Chandu</em>
    </div>
  </footer>
</div>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// ── FAMILY DATA CONFIG ───────────────────────────────────
// Add new members here in the future
const FAMILY = [
  {
    id: 'sindhu',
    name: 'Sindhu',
    relation: 'My Wife',
    avatar: '🌹',
    file: 'sindhu.html',
    cardBg: 'linear-gradient(135deg,rgba(35,10,20,.96),rgba(15,5,10,.98))',
    cardBorder: 'rgba(201,116,138,.12)',
    cardAccent: '#c9748a',
    cardAccentAlpha: 'rgba(201,116,138,.25)',
    cardAccentBg: 'rgba(201,116,138,.08)',
    cardAccentText: '#e8a0b0',
    cardAvatarBg: 'rgba(201,116,138,.1)',
    cardGlow: 'linear-gradient(135deg,rgba(201,116,138,.2),transparent,rgba(212,164,90,.1),transparent)',
    events: [
      { name: "Birthday", emoji: "🎂", month: 9, day: 25 },
      { name: "Wedding Anniversary", emoji: "💍", month: 11, day: 19 }
    ]
  },
  {
    id: 'yokshith',
    name: 'Yokshith',
    relation: 'My Son',
    avatar: '🌟',
    file: 'yokshith.html',
    cardBg: 'linear-gradient(135deg,rgba(10,10,30,.96),rgba(5,5,20,.98))',
    cardBorder: 'rgba(63,167,214,.12)',
    cardAccent: '#3FA7D6',
    cardAccentAlpha: 'rgba(63,167,214,.25)',
    cardAccentBg: 'rgba(63,167,214,.08)',
    cardAccentText: '#7ecde8',
    cardAvatarBg: 'rgba(63,167,214,.1)',
    cardGlow: 'linear-gradient(135deg,rgba(255,210,63,.15),transparent,rgba(63,167,214,.1),transparent)',
    events: [
      { name: "Birthday", emoji: "🎉", month: 9, day: 2 }
    ]
  }
];

// ── COUNTDOWN HELPER ─────────────────────────────────────
function getNextOccurrence(month, day) {
  const now = new Date();
  const thisYear = now.getFullYear();
  const target = new Date(thisYear, month - 1, day, 0, 0, 0);
  if (target < now) target.setFullYear(thisYear + 1);
  return target;
}

function isToday(month, day) {
  const n = new Date();
  return n.getMonth() + 1 === month && n.getDate() === day;
}

function formatCountdown(ms) {
  if (ms <= 0) return null;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (d > 60) return `${d} days away`;
  if (d > 0) return `${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDate(month, day) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[month-1]} ${day}`;
}

// ── BUILD CARDS ──────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('members-grid');
  
  FAMILY.forEach((member, idx) => {
    const card = document.createElement('a');
    card.href = member.file;
    card.className = 'member-card';
    card.style.setProperty('--card-bg', member.cardBg);
    card.style.setProperty('--card-border', member.cardBorder);
    card.style.setProperty('--card-accent', member.cardAccent);
    card.style.setProperty('--card-accent-alpha', member.cardAccentAlpha);
    card.style.setProperty('--card-accent-bg', member.cardAccentBg);
    card.style.setProperty('--card-accent-text', member.cardAccentText);
    card.style.setProperty('--card-avatar-bg', member.cardAvatarBg);
    card.style.setProperty('--card-glow', member.cardGlow);

    // Build events HTML
    let eventsHTML = '';
    member.events.forEach(ev => {
      const today = isToday(ev.month, ev.day);
      const next = getNextOccurrence(ev.month, ev.day);
      const ms = next - new Date();
      const cd = today ? 'TODAY' : formatCountdown(ms);
      eventsHTML += `
        <div class="mc-event">
          <div class="mc-event-row">
            <div>
              <div class="mc-event-name">${ev.emoji} ${ev.name}</div>
              <div class="mc-event-date">${formatDate(ev.month, ev.day)}</div>
            </div>
            ${today
              ? `<span class="mc-today-badge">✨ Today!</span>`
              : `<div class="mc-countdown live" data-month="${ev.month}" data-day="${ev.day}">${cd}</div>`
            }
          </div>
        </div>`;
    });

    card.innerHTML = `
      <div class="mc-bg"></div>
      <div class="mc-glow"></div>
      <div class="mc-border"></div>
      <div class="mc-shine"></div>
      <div class="mc-content">
        <div class="mc-header">
          <div class="mc-avatar">
            ${member.avatar}
            <div class="mc-avatar-ring"></div>
          </div>
          <div class="mc-identity">
            <div class="mc-name">${member.name}</div>
            <span class="mc-relation">${member.relation}</span>
          </div>
        </div>
        <div class="mc-events-label">Upcoming Celebrations</div>
        ${eventsHTML}
        <div class="mc-visit">
          <span>Open Celebrations</span>
          <span class="mc-visit-arrow">→</span>
        </div>
      </div>`;

    setTimeout(() => {
      grid.appendChild(card);
      requestAnimationFrame(() => {
        setTimeout(() => card.classList.add('visible'), 50);
      });
    }, idx * 180);
  });

  // Future member slots
  const futureSlots = [
    { label: 'Add Family Member', sub: 'More celebrations coming soon…' },
    { label: 'Add Family Member', sub: 'Expand your family portal…' }
  ];
  futureSlots.forEach((slot, i) => {
    const fc = document.createElement('div');
    fc.className = 'future-card';
    fc.style.animationDelay = `${(FAMILY.length + i) * 0.18 + 0.4}s`;
    fc.innerHTML = `
      <div class="future-icon">+</div>
      <div class="future-label">${slot.label}</div>
      <div class="future-sub">${slot.sub}</div>`;
    setTimeout(() => grid.appendChild(fc), (FAMILY.length + i) * 180 + 200);
  });
}

// ── LIVE COUNTDOWN UPDATE ────────────────────────────────
function updateCountdowns() {
  document.querySelectorAll('.mc-countdown[data-month]').forEach(el => {
    const m = parseInt(el.dataset.month), d = parseInt(el.dataset.day);
    const next = getNextOccurrence(m, d);
    el.textContent = formatCountdown(next - new Date()) || '0:00:00';
  });
}
setInterval(updateCountdowns, 1000);

// ── CONSTELLATION CANVAS ─────────────────────────────────
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
let stars = [], lines = [];

function resize() { cvs.width = innerWidth; cvs.height = innerHeight; initStars(); }
function initStars() {
  stars = [];
  const count = Math.floor((cvs.width * cvs.height) / 12000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * cvs.width, y: Math.random() * cvs.height,
      r: .5 + Math.random() * 1.5, vx: (Math.random() - .5) * .12,
      vy: (Math.random() - .5) * .12, op: .1 + Math.random() * .6,
      tw: 1 + Math.random() * 2, tp: Math.random() * Math.PI * 2
    });
  }
}

function drawConstellation(t) {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  stars.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    if (s.x < 0) s.x = cvs.width; if (s.x > cvs.width) s.x = 0;
    if (s.y < 0) s.y = cvs.height; if (s.y > cvs.height) s.y = 0;
    const op = s.op * (.6 + .4 * Math.sin(t / 1000 * s.tw + s.tp));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${op})`;
    ctx.fill();
  });
  // Connection lines
  stars.forEach((a, i) => {
    stars.slice(i + 1).forEach(b => {
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(201,168,76,${.08 * (1 - dist/120)})`;
        ctx.lineWidth = .5;
        ctx.stroke();
      }
    });
  });
  requestAnimationFrame(drawConstellation);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(drawConstellation);

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    buildCards();
  }, 1200);
});
</script>
</body>
