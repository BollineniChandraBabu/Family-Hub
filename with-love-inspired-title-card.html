<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>With Love Inspired 3D Title Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #06080f;
      --bg-mid: #12182a;
      --bg-btm: #1a2238;
      --gold: #d5b16e;
      --gold-soft: #f6e0a2;
      --rose: #efb2be;
      --ink: #111827;
      --white: #ffffff;
      --shadow: 0 24px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(1200px 800px at 20% 20%, rgba(239, 178, 190, 0.12), transparent 60%),
        radial-gradient(1000px 700px at 80% 80%, rgba(213, 177, 110, 0.12), transparent 60%),
        linear-gradient(160deg, var(--bg-top), var(--bg-mid) 50%, var(--bg-btm));
      font-family: "Cinzel", serif;
      color: var(--white);
      perspective: 1200px;
    }

    .ambient-glow {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 40%, rgba(246, 224, 162, 0.12), transparent 35%),
        radial-gradient(circle at 70% 60%, rgba(239, 178, 190, 0.1), transparent 38%);
      filter: blur(24px);
      animation: breathe 8s ease-in-out infinite;
      pointer-events: none;
    }

    .title-stage {
      width: min(90vw, 980px);
      height: min(56vw, 560px);
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(16deg) rotateY(-12deg);
      animation: drift 9s ease-in-out infinite alternate;
    }

    .plane {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      box-shadow: var(--shadow);
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .plane.back {
      background:
        linear-gradient(140deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01)),
        radial-gradient(circle at 30% 20%, rgba(246, 224, 162, 0.14), transparent 40%),
        radial-gradient(circle at 80% 75%, rgba(239, 178, 190, 0.1), transparent 38%),
        #10182e;
      border: 1px solid rgba(255, 255, 255, 0.14);
      transform: translateZ(-60px) scale(1.03);
    }

    .plane.front {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(2px);
      display: grid;
      place-items: center;
      transform: translateZ(26px);
    }

    .sparkle,
    .sparkle::before,
    .sparkle::after {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold-soft);
      box-shadow: 0 0 16px rgba(246, 224, 162, 0.8);
      content: "";
    }

    .sparkle {
      top: 20%;
      left: 18%;
      animation: twinkle 2.4s ease-in-out infinite;
    }

    .sparkle::before {
      top: 200px;
      left: 580px;
      animation: twinkle 3s ease-in-out infinite 0.6s;
    }

    .sparkle::after {
      top: 320px;
      left: 140px;
      animation: twinkle 2.8s ease-in-out infinite 1.1s;
    }

    .title-wrap {
      text-align: center;
      transform-style: preserve-3d;
      animation: titleFloat 6.5s ease-in-out infinite;
      padding: 0 2rem;
    }

    .line-script {
      font-family: "Great Vibes", cursive;
      color: var(--rose);
      font-size: clamp(2rem, 5.5vw, 4.8rem);
      letter-spacing: 0.02em;
      margin: 0;
      opacity: 0;
      transform: translateZ(90px) translateY(12px);
      animation: riseIn 1.2s cubic-bezier(.2,.8,.2,1) forwards 0.4s;
      text-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
    }

    .line-main {
      margin: 0.4rem 0 0;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.28em;
      font-size: clamp(2rem, 6.4vw, 6rem);
      line-height: 0.95;
      color: var(--gold-soft);
      text-shadow:
        0 1px 0 #fce9bc,
        0 2px 0 #e7ca86,
        0 3px 0 #c9a15e,
        0 14px 24px rgba(0, 0, 0, 0.5);
      transform: translateZ(150px);
      opacity: 0;
      animation: slamIn 1.6s cubic-bezier(.17,1,.3,1) forwards 0.9s;
    }

    .line-sub {
      margin-top: 1.2rem;
      font-size: clamp(0.72rem, 1.6vw, 1.1rem);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      opacity: 0;
      transform: translateZ(70px) translateY(10px);
      animation: riseIn 1.1s ease forwards 1.8s;
    }

    .scan {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 35%,
        rgba(255, 255, 255, 0.22) 49%,
        rgba(255, 255, 255, 0.02) 56%,
        transparent 66%
      );
      transform: translateX(-120%);
      animation: sweep 4.8s ease-in-out infinite 2.3s;
      pointer-events: none;
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateZ(120px) translateY(0); }
    }

    @keyframes slamIn {
      0% { opacity: 0; transform: translateZ(240px) scale(1.2); }
      60% { opacity: 1; transform: translateZ(145px) scale(0.98); }
      100% { opacity: 1; transform: translateZ(150px) scale(1); }
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0) rotateZ(0deg); }
      50% { transform: translateY(-5px) rotateZ(0.5deg); }
    }

    @keyframes sweep {
      0%, 25% { transform: translateX(-130%); }
      45%, 100% { transform: translateX(140%); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.35; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    @keyframes drift {
      0% { transform: rotateX(15deg) rotateY(-11deg) translateY(0); }
      100% { transform: rotateX(18deg) rotateY(-7deg) translateY(-6px); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @media (max-width: 700px) {
      .title-stage {
        height: min(74vw, 510px);
        transform: rotateX(12deg) rotateY(-8deg);
      }

      .line-main { letter-spacing: 0.18em; }
      .line-sub { letter-spacing: 0.24em; }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true"></div>

  <main class="title-stage" aria-label="3D motion title card inspired by romantic cinema title design">
    <section class="plane back" aria-hidden="true"></section>

    <section class="plane front">
      <span class="sparkle" aria-hidden="true"></span>
      <div class="title-wrap">
        <p class="line-script">Inspired by</p>
        <h1 class="line-main">With Love</h1>
        <p class="line-sub">A 3D Motion Design Title Card</p>
      </div>
      <div class="scan" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
