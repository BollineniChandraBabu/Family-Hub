function initReveal(){const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.1});document.querySelectorAll('.sr,.sr-l,.sr-r').forEach(el=>io.observe(el));}

let animLoop=null;let petalTimer=null;
function clearAnim(){if(animLoop){cancelAnimationFrame(animLoop);animLoop=null;}if(petalTimer){clearInterval(petalTimer);petalTimer=null;}document.getElementById('petal-layer').innerHTML='';document.getElementById('shape-layer').innerHTML='';const cv=document.getElementById('fx-canvas');const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);}
function startAnim(type,colors){clearAnim();const cv=document.getElementById('fx-canvas');function resize(){cv.width=innerWidth;cv.height=innerHeight;}resize();window.addEventListener('resize',resize);if(type==='petals')animPetals(colors);else if(type==='sparkles')animSparkles(cv,colors);else if(type==='starfall')animStarfall(cv,colors);else if(type==='bubbles')animBubbles(cv,colors);else if(type==='geometric')animGeometric(colors);else if(type==='botanical')animBotanical(colors);else if(type==='aurora')animAurora(cv,colors);else if(type==='confetti')animConfetti(cv,colors);else animSparkles(cv,colors);}

function animPetals(colors){function mkPetal(){const layer=document.getElementById('petal-layer');const el=document.createElement('div');const sz=7+Math.random()*15;const c=colors[Math.floor(Math.random()*colors.length)];const dur=12+Math.random()*10;el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-60px;pointer-events:none;opacity:0;animation:petal${Math.floor(Math.random()*3)+1} ${dur}s ${Math.random()*3}s linear forwards;`;el.innerHTML=`<svg width="${sz}" height="${sz*1.4}" viewBox="0 0 20 28"><ellipse cx="10" cy="14" rx="6" ry="13" fill="${c}" opacity=".75" transform="rotate(${Math.random()*25-12.5},10,14)"/></svg>`;layer.appendChild(el);setTimeout(()=>el.remove(),(dur+4)*1000);}if(!document.getElementById('petalKF')){const s=document.createElement('style');s.id='petalKF';s.textContent=`@keyframes petal1{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.55}95%{opacity:.2}100%{opacity:0;transform:translateY(115vh) rotate(720deg) translateX(80px)}}@keyframes petal2{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.45}95%{opacity:.15}100%{opacity:0;transform:translateY(115vh) rotate(-540deg) translateX(-60px)}}@keyframes petal3{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.5}95%{opacity:.18}100%{opacity:0;transform:translateY(115vh) rotate(900deg) translateX(50px)}}`;document.head.appendChild(s);}for(let i=0;i<10;i++)setTimeout(mkPetal,i*600);petalTimer=setInterval(mkPetal,1600);}
function animSparkles(cv,colors){const ctx=cv.getContext('2d');const pts=Array.from({length:60},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:0.6+Math.random()*2,vx:(Math.random()-.5)*.2,vy:-(0.1+Math.random()*.3),a:Math.random(),va:0.005+Math.random()*.012,c:colors[Math.floor(Math.random()*colors.length)]}));function frame(){ctx.clearRect(0,0,cv.width,cv.height);pts.forEach((p)=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;if(p.y<-10||p.a>1.05){p.x=Math.random()*cv.width;p.y=cv.height+10;p.a=0;}const alpha=.55*Math.sin(Math.PI*p.a);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));ctx.fill();});animLoop=requestAnimationFrame(frame);}frame();}
function animStarfall(cv,colors){const ctx=cv.getContext('2d');const stars=Array.from({length:55},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:0.5+Math.random()*1.8,vy:0.3+Math.random()*.8,a:Math.random(),c:colors[Math.floor(Math.random()*colors.length)]}));function frame(){ctx.clearRect(0,0,cv.width,cv.height);stars.forEach(s=>{s.y+=s.vy;s.a+=0.008;if(s.y>cv.height+10){s.y=-10;s.x=Math.random()*cv.width;}const alpha=.5*Math.abs(Math.sin(s.a));ctx.save();ctx.translate(s.x,s.y);ctx.fillStyle=s.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));ctx.beginPath();const r=s.r*1.8,ri=s.r*.4;for(let i=0;i<8;i++){const angle=i*Math.PI/4;const rad=i%2===0?r:ri;i===0?ctx.moveTo(Math.cos(angle)*rad,Math.sin(angle)*rad):ctx.lineTo(Math.cos(angle)*rad,Math.sin(angle)*rad);}ctx.closePath();ctx.fill();ctx.restore();});animLoop=requestAnimationFrame(frame);}frame();}
function animBubbles(cv,colors){const ctx=cv.getContext('2d');const bubs=Array.from({length:40},()=>({x:Math.random()*cv.width,y:cv.height+50,r:3+Math.random()*8,vy:-(0.25+Math.random()*.5),a:Math.random(),c:colors[Math.floor(Math.random()*colors.length)],wobble:Math.random()*Math.PI*2,ws:(Math.random()-.5)*.02}));function frame(){ctx.clearRect(0,0,cv.width,cv.height);bubs.forEach(b=>{b.y+=b.vy;b.wobble+=b.ws;b.a+=0.006;if(b.y<-20){b.y=cv.height+30;b.x=Math.random()*cv.width;b.a=0;}b.x+=Math.sin(b.wobble)*.4;const alpha=.35*Math.sin(Math.PI*Math.min(b.a,1));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle=b.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.25,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${alpha*.5})`;ctx.fill();});animLoop=requestAnimationFrame(frame);}frame();}
function animGeometric(colors){const layer=document.getElementById('shape-layer');if(!document.getElementById('geoKF')){const s=document.createElement('style');s.id='geoKF';s.textContent=`@keyframes geoRise{0%{opacity:0;transform:translateY(0) rotate(0) scale(1)}5%{opacity:.4}95%{opacity:.15}100%{opacity:0;transform:translateY(-115vh) rotate(720deg) scale(.4)}}@keyframes geoFall{0%{opacity:0;transform:translateY(-100px) rotate(0)}5%{opacity:.35}95%{opacity:.1}100%{opacity:0;transform:translateY(115vh) rotate(-540deg)}}`;document.head.appendChild(s);}function mkShape(){const el=document.createElement('div');const sz=8+Math.random()*20;const c=colors[Math.floor(Math.random()*colors.length)];const type=Math.random();const dur=10+Math.random()*8;const anim=Math.random()<.5?'geoRise':'geoFall';const startY=anim==='geoRise'?`bottom:${-50}px;`:`top:${-50}px;`;let shape='';if(type<.33)shape=`border-radius:50%;width:${sz}px;height:${sz}px;background:${c};opacity:.4;`;else if(type<.66)shape=`width:${sz*.7}px;height:${sz*.7}px;background:${c};opacity:.3;transform:rotate(45deg);`;else shape=`width:0;height:0;border-left:${sz*.5}px solid transparent;border-right:${sz*.5}px solid transparent;border-bottom:${sz*.9}px solid ${c};opacity:.25;`;el.style.cssText=`position:absolute;left:${Math.random()*100}%;${startY}animation:${anim} ${dur}s ${Math.random()*4}s linear forwards;${shape}`;layer.appendChild(el);setTimeout(()=>el.remove(),(dur+5)*1000);}for(let i=0;i<14;i++)setTimeout(mkShape,i*500);petalTimer=setInterval(mkShape,1400);}
function animBotanical(colors){const layer=document.getElementById('shape-layer');if(!document.getElementById('botKF')){const s=document.createElement('style');s.id='botKF';s.textContent=`@keyframes leafFall{0%{opacity:0;transform:translateY(-40px) rotate(-20deg)}5%{opacity:.5}95%{opacity:.2}100%{opacity:0;transform:translateY(115vh) rotate(520deg) translateX(60px)}}`;document.head.appendChild(s);}function mkLeaf(){const el=document.createElement('div');const sz=10+Math.random()*18;const c=colors[Math.floor(Math.random()*colors.length)];const dur=11+Math.random()*9;el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-60px;animation:leafFall ${dur}s ${Math.random()*3}s linear forwards;`;el.innerHTML=`<svg width="${sz}" height="${sz*1.8}" viewBox="0 0 20 36"><path d="M10 2 C16 8 18 14 14 22 C12 28 10 34 10 34 C10 34 8 28 6 22 C2 14 4 8 10 2Z" fill="${c}" opacity=".65"/><path d="M10 2 L10 34" stroke="${c}" stroke-width=".5" opacity=".3"/></svg>`;layer.appendChild(el);setTimeout(()=>el.remove(),(dur+4)*1000);}for(let i=0;i<10;i++)setTimeout(mkLeaf,i*700);petalTimer=setInterval(mkLeaf,1800);}
function animAurora(cv,colors){const ctx=cv.getContext('2d');const blobs=colors.slice(0,4).map((c,i)=>({x:cv.width*(0.2+i*.2),y:cv.height*(0.3+i*.15),vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,r:cv.width*.18+i*30,c}));let tick=0;function frame(){tick++;ctx.clearRect(0,0,cv.width,cv.height);blobs.forEach((b,i)=>{b.x+=b.vx+Math.sin(tick*.007+i)*0.5;b.y+=b.vy+Math.cos(tick*.009+i)*0.4;if(b.x<0||b.x>cv.width)b.vx*=-1;if(b.y<0||b.y>cv.height)b.vy*=-1;const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c+'18');g.addColorStop(1,b.c+'00');ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});animLoop=requestAnimationFrame(frame);}frame();}
function animConfetti(cv,colors){const ctx=cv.getContext('2d');let particles=[];function burst(n=120){for(let i=0;i<n;i++){particles.push({x:Math.random()*cv.width,y:-20,vx:(Math.random()-.5)*5,vy:1.5+Math.random()*4,w:4+Math.random()*9,h:6+Math.random()*5,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.18,c:colors[Math.floor(Math.random()*colors.length)],op:1,shape:Math.random()<.5?'rect':'circle'});}}burst(140);setInterval(()=>burst(60),4000);function frame(){ctx.clearRect(0,0,cv.width,cv.height);particles=particles.filter(p=>p.y<cv.height+30&&p.op>.02);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;p.vy+=.04;if(p.y>cv.height*.75)p.op-=.015;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.op;ctx.fillStyle=p.c;if(p.shape==='rect')ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);else{ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}ctx.restore();});animLoop=requestAnimationFrame(frame);}frame();}

function spawnLoaderPetals(){const layer=document.getElementById('ld-petals');if(!layer)return;const colors=['#F0C8CC','#F4DEC8','#FAE8DC','#EDD8D0','#F8E0DC'];for(let i=0;i<14;i++){const el=document.createElement('div');el.className='ld-petal';const sz=7+Math.random()*14;const c=colors[Math.floor(Math.random()*colors.length)];const dur=8+Math.random()*7;el.style.cssText=`left:${Math.random()*100}%;top:-40px;animation-duration:${dur}s;animation-delay:${Math.random()*5}s;`;el.innerHTML=`<svg width="${sz}" height="${sz*1.4}" viewBox="0 0 20 28"><ellipse cx="10" cy="14" rx="6" ry="13" fill="${c}" opacity=".6" transform="rotate(${Math.random()*25-12},10,14)"/></svg>`;layer.appendChild(el);}}

window.addEventListener('DOMContentLoaded',()=>{
  spawnLoaderPetals();
  detectPage();
  setTimeout(()=>{
    document.getElementById('loader').classList.add('out');
    setTimeout(()=>{
      document.getElementById('bg-base').classList.add('in');
      document.querySelector('.bg-noise').classList.add('in');
      document.getElementById('app').classList.add('in');
    },200);
  },2800);
});
</script>
