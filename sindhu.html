<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sindhu — My Love, My Life 🌹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,500;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Cinzel:wght@300;400;500&family=Lato:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   CSS TOKENS  (overridden per year by JS)
═══════════════════════════════════════════════ */
:root {
  --bg:         #FBF8F2;
  --bg2:        #F5EFE4;
  --bg3:        #EDE3D5;
  --acc-pale:   #FAE8E8;
  --acc-lt:     #E8A8B0;
  --acc-mid:    #C07880;
  --acc-dark:   #904050;
  --gold:       #C09A52;
  --gold-lt:    #D8BC82;
  --gold-pale:  #F4E4C0;
  --ink:        #2C1F18;
  --ink-2:      #5A3E32;
  --ink-3:      #9A7A6A;
  --ink-4:      #C4A898;
  --white:      #FFFFFF;
  --card-bg:    rgba(255,255,255,0.85);
  --ease:       cubic-bezier(.4,0,.2,1);
  --spring:     cubic-bezier(.34,1.56,.64,1);
}

/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Lato',sans-serif;background:#FBF8F2;color:var(--ink);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;background:none;font:inherit;}

/* ═══════════════════════════════════════════════
   LOADER  — full immersive cover
═══════════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  /* Hard-coded — never flickers regardless of CSS variable state */
  background:#FBF8F2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  /* Smooth exit */
  transition:opacity 1s cubic-bezier(.4,0,.2,1), visibility 1s cubic-bezier(.4,0,.2,1);
}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}

/* Decorative corner lines on loader */
#loader::before,#loader::after{
  content:'';position:absolute;
  width:clamp(80px,15vw,140px);height:clamp(80px,15vw,140px);
  border-color:rgba(192,120,128,.18);border-style:solid;
}
#loader::before{top:24px;left:24px;border-width:1px 0 0 1px;}
#loader::after{bottom:24px;right:24px;border-width:0 1px 1px 0;}

/* Inner corner (pseudo on a child) */
.ld-corner-tr,.ld-corner-bl{
  position:absolute;
  width:clamp(80px,15vw,140px);height:clamp(80px,15vw,140px);
  border-color:rgba(192,120,128,.12);border-style:solid;
}
.ld-corner-tr{top:24px;right:24px;border-width:1px 1px 0 0;}
.ld-corner-bl{bottom:24px;left:24px;border-width:0 0 1px 1px;}

/* Animated background petals inside loader */
.ld-petal{
  position:absolute;pointer-events:none;opacity:0;
  animation:ldPetalDrift linear infinite;
}
@keyframes ldPetalDrift{
  0%  {opacity:0;transform:translateY(-40px) rotate(0deg) translateX(0);}
  8%  {opacity:.35;}
  92% {opacity:.15;}
  100%{opacity:0;transform:translateY(105vh) rotate(600deg) translateX(60px);}
}

/* Central logo mark */
.ld-logo-wrap{
  margin-bottom:28px;position:relative;
  opacity:0;animation:ldRise 1s var(--spring) forwards .1s;
}

/* Outer rotating ring */
.ld-ring-outer{
  position:absolute;inset:-14px;border-radius:50%;
  border:1px solid transparent;
  border-top-color:rgba(192,154,82,.4);
  border-right-color:rgba(192,154,82,.2);
  animation:ldSpin 6s linear infinite;
}
/* Inner counter ring */
.ld-ring-inner{
  position:absolute;inset:-7px;border-radius:50%;
  border:1px dashed rgba(192,120,128,.25);
  animation:ldSpin 9s linear infinite reverse;
}
@keyframes ldSpin{to{transform:rotate(360deg);}}

/* SVG heart logo */
.ld-heart-svg{display:block;filter:drop-shadow(0 4px 24px rgba(192,120,128,.22));}
.ld-heart-draw{
  stroke-dasharray:160;stroke-dashoffset:160;
  animation:ldDraw 1.8s cubic-bezier(.4,0,.2,1) forwards .4s;
}
.ld-heart-fill{
  opacity:0;animation:ldFillHeart 1s ease forwards 1.6s;
}
@keyframes ldDraw{to{stroke-dashoffset:0;}}
@keyframes ldFillHeart{from{opacity:0;}to{opacity:1;}}

/* Orbiting dot */
.ld-orbit{
  position:absolute;inset:-20px;
  animation:ldSpin 3s linear infinite;
}
.ld-orbit-dot{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;
  background:var(--gold,#C09A52);
  opacity:0;animation:ldFade .3s ease forwards 1.8s;
  box-shadow:0 0 6px rgba(192,154,82,.5);
}

/* Name text */
.ld-name{
  font-family:'Great Vibes',cursive;
  font-size:clamp(2.8rem,8vw,4.2rem);
  color:#C07880;line-height:1;
  filter:drop-shadow(0 2px 16px rgba(192,120,128,.2));
  margin-bottom:6px;
  opacity:0;animation:ldRise .9s ease forwards .8s;
  letter-spacing:.02em;
}
.ld-tagline{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.85rem,2.5vw,1.05rem);
  color:#9A7A6A;letter-spacing:.08em;
  margin-bottom:36px;
  opacity:0;animation:ldFade .7s ease forwards 1.2s;
}

/* Progress track */
.ld-progress-wrap{
  width:min(220px,55vw);
  opacity:0;animation:ldFade .5s ease forwards 1.3s;
  margin-bottom:14px;
}
.ld-progress-track{
  width:100%;height:1px;
  background:rgba(192,120,128,.15);
  border-radius:2px;overflow:hidden;position:relative;
}
.ld-progress-fill{
  height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,#C07880,#C09A52,#C07880);
  background-size:200% 100%;
  animation:ldFillBar 1.6s cubic-bezier(.4,0,.2,1) forwards 1.4s,
            ldShimmer 2s linear infinite 1.4s;
}
@keyframes ldFillBar{from{width:0;}to{width:100%;}}
@keyframes ldShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* Caption dots */
.ld-caption{
  font-family:'Cinzel',serif;font-size:.55rem;font-weight:300;
  letter-spacing:.55em;text-transform:uppercase;
  color:rgba(154,122,106,.6);
  display:flex;align-items:center;gap:8px;
  opacity:0;animation:ldFade .5s ease forwards 1.5s;
}
.ld-caption-dot{
  width:3px;height:3px;border-radius:50%;
  background:rgba(192,120,128,.4);
  animation:ldDotPulse 1.4s ease-in-out infinite alternate;
}
.ld-caption-dot:nth-child(2){animation-delay:.2s;}
.ld-caption-dot:nth-child(4){animation-delay:.4s;}
@keyframes ldDotPulse{from{opacity:.2;transform:scale(.7);}to{opacity:1;transform:scale(1.3);}}

/* Rising animation */
@keyframes ldRise{from{opacity:0;transform:translateY(18px) scale(.95);}to{opacity:1;transform:none;}}
@keyframes ldFade{from{opacity:0;}to{opacity:1;}}

/* ═══════════════════════════════════════════════
   FIXED LAYERS — start invisible, fade in after loader exits
═══════════════════════════════════════════════ */
.bg-base{
  position:fixed;inset:0;z-index:0;
  transition:background 1.2s var(--ease), opacity .6s ease;
  opacity:0;
}
.bg-base.in{opacity:1;}

.bg-noise{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity .8s ease;
}
.bg-noise.in{opacity:.022;}
.bg-noise-svg{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px;}

#fx-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
#petal-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
#shape-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}

/* ═══════════════════════════════════════════════
   APP — hidden until loader exits
═══════════════════════════════════════════════ */
#app{
  position:relative;z-index:10;
  opacity:0;transition:opacity .7s ease;
}
#app.in{opacity:1;}

.page-enter{animation:pageIn .9s var(--ease) forwards;}
@keyframes pageIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* ═══════════════════════════════════════════════
   TYPOGRAPHY HELPERS
═══════════════════════════════════════════════ */
.font-display{font-family:'Playfair Display',serif;}
.font-romantic{font-family:'Cormorant Garamond',serif;}
.font-script{font-family:'Great Vibes',cursive;}
.font-formal{font-family:'Cinzel',serif;}

/* ═══════════════════════════════════════════════
   SHARED SECTION COMPONENTS
═══════════════════════════════════════════════ */
.section-ornament{
  display:flex;align-items:center;gap:16px;margin-bottom:clamp(36px,5vw,56px);
}
.so-line{flex:1;height:1px;}
.so-line-l{background:linear-gradient(to right,transparent,var(--acc-lt));opacity:.6;}
.so-line-r{background:linear-gradient(to left,transparent,var(--acc-lt));opacity:.6;}
.so-text{
  font-family:'Cinzel',serif;font-size:.58rem;font-weight:400;letter-spacing:.55em;text-transform:uppercase;
  color:var(--acc-mid);white-space:nowrap;
  padding:5px 14px;border:1px solid var(--acc-pale);border-radius:50px;
  background:rgba(255,255,255,.6);
}
.so-diamond{width:8px;height:8px;border:1.5px solid var(--gold);transform:rotate(45deg);flex-shrink:0;}

/* Big script number / title */
.event-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(3.5rem,13vw,9rem);
  line-height:1;
  color:var(--acc-mid);
  filter:drop-shadow(0 2px 24px rgba(192,120,128,.2));
  text-align:center;display:block;
}
.event-subtitle{
  font-family:'Playfair Display',serif;font-weight:700;font-style:italic;
  font-size:clamp(1.6rem,5vw,3.2rem);
  color:var(--ink);text-align:center;
  letter-spacing:-.01em;line-height:1.15;
}

/* Poem block */
.poem-block{
  max-width:520px;margin:0 auto;
  text-align:center;padding:clamp(24px,4vw,40px);
  background:var(--acc-pale);border-radius:20px;
  border-left:3px solid var(--acc-lt);
  position:relative;overflow:hidden;
}
.poem-block::before{
  content:'"';font-family:'Playfair Display',serif;font-size:8rem;
  color:var(--acc-lt);opacity:.3;
  position:absolute;top:-20px;left:10px;line-height:1;pointer-events:none;
}
.poem-line{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(1rem,3vw,1.2rem);color:var(--ink-2);
  line-height:2;display:block;
}

/* Message card */
.message-card{
  max-width:680px;margin:0 auto;
  background:var(--white);border-radius:24px;
  box-shadow:0 8px 40px rgba(44,31,24,.08);
  padding:clamp(28px,5vw,52px);
  position:relative;overflow:hidden;
  border-top:3px solid var(--acc-mid);
}
.message-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:120px;
  background:linear-gradient(180deg,var(--acc-pale),transparent);
  pointer-events:none;
}
.message-para{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:clamp(1.05rem,2.8vw,1.28rem);color:var(--ink-2);
  line-height:2;margin-bottom:20px;position:relative;
}
.message-para:last-child{margin-bottom:0;}
.message-para em{font-style:normal;color:var(--acc-dark);font-weight:500;}
.message-para strong{font-style:normal;color:var(--gold);font-weight:600;}

/* Wishes grid */
.wishes-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));
  gap:16px;max-width:680px;margin:0 auto;
}
.wish-card{
  background:var(--white);border-radius:18px;padding:22px 18px;
  border:1px solid var(--acc-pale);text-align:center;
  box-shadow:0 3px 16px rgba(44,31,24,.06);
  transition:transform .4s var(--spring),box-shadow .4s;
}
.wish-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(44,31,24,.1);}
.wc-icon{font-size:1.8rem;display:block;margin-bottom:10px;}
.wc-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--acc-dark);margin-bottom:6px;}
.wc-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;font-weight:300;color:var(--ink-3);line-height:1.7;}

/* Milestone banner */
.milestone-banner{
  max-width:680px;margin:0 auto;padding:22px 28px;
  background:linear-gradient(135deg,var(--acc-pale),var(--gold-pale));
  border-radius:16px;
  border:1px solid var(--acc-lt);
  display:flex;gap:18px;align-items:flex-start;
}
.mb-icon{font-size:2.2rem;flex-shrink:0;margin-top:2px;}
.mb-label{font-family:'Cinzel',serif;font-size:.58rem;font-weight:400;letter-spacing:.4em;text-transform:uppercase;color:var(--acc-mid);margin-bottom:5px;}
.mb-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:5px;}
.mb-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:.95rem;color:var(--ink-3);line-height:1.8;}

/* Countdown row */
.cd-row{
  display:flex;align-items:center;justify-content:center;gap:clamp(12px,3vw,28px);
  padding:22px 28px;background:var(--white);border-radius:16px;
  box-shadow:0 3px 16px rgba(44,31,24,.07);
  max-width:460px;margin:0 auto;
}
.cd-unit{text-align:center;}
.cd-num{
  font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;
  color:var(--acc-mid);line-height:1;display:block;
}
.cd-lbl{font-family:'Cinzel',serif;font-size:.48rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-4);margin-top:3px;}
.cd-sep{font-size:1.8rem;color:var(--acc-pale);font-weight:300;margin-bottom:14px;}

/* Back nav pill */
.year-nav{
  display:flex;align-items:center;justify-content:center;gap:12px;
  flex-wrap:wrap;margin-top:16px;
}
.yn-btn{
  font-family:'Cinzel',serif;font-size:.65rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;
  color:var(--acc-mid);padding:10px 22px;border-radius:50px;
  border:1px solid var(--acc-lt);background:rgba(255,255,255,.7);
  transition:all .35s var(--ease);display:flex;align-items:center;gap:8px;
}
.yn-btn:hover{background:var(--acc-mid);color:white;border-color:var(--acc-mid);transform:translateY(-2px);}
.yn-btn svg{flex-shrink:0;transition:transform .3s;}
.yn-btn:hover svg{transform:translateX(-3px);}
.yn-btn.fwd:hover svg{transform:translateX(3px);}
.viewing-past-banner{
  background:var(--acc-pale);border:1px solid var(--acc-lt);border-radius:12px;
  padding:10px 22px;text-align:center;margin-bottom:20px;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--ink-3);
}
.locked-msg{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:28px;border:2px dashed var(--acc-pale);border-radius:20px;
  text-align:center;margin:20px auto;max-width:400px;
}
.locked-icon{font-size:2.5rem;}
.locked-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink-2);}
.locked-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--ink-3);}

/* Signature */
.signature-section{
  text-align:center;padding:clamp(30px,5vw,50px) 20px clamp(20px,3vw,30px);
}
.sig-from{font-family:'Cinzel',serif;font-size:.6rem;font-weight:300;letter-spacing:.45em;text-transform:uppercase;color:var(--ink-4);margin-bottom:10px;}
.sig-name{
  font-family:'Great Vibes',cursive;font-size:clamp(2.5rem,8vw,4rem);
  color:var(--gold);filter:drop-shadow(0 2px 12px rgba(192,154,82,.25));
}
.sig-heart{font-size:1.3rem;animation:heartPulse 2.2s ease-in-out infinite;display:inline-block;}
@keyframes heartPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

/* Scroll reveal */
.sr{opacity:0;transform:translateY(24px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.sr.in{opacity:1;transform:none;}
.sr-l{opacity:0;transform:translateX(-24px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.sr-l.in{opacity:1;transform:none;}
.sr-r{opacity:0;transform:translateX(24px);transition:opacity .8s var(--ease),transform .8s var(--ease);}
.sr-r.in{opacity:1;transform:none;}

/* Page section spacing */
.psec{padding:clamp(50px,7vw,90px) clamp(18px,5vw,60px);}
.psec-inner{max-width:760px;margin:0 auto;}
.psec-wide{max-width:1000px;margin:0 auto;}

/* Anniversary timeline */
.timeline{max-width:620px;margin:0 auto;position:relative;padding-left:36px;}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--acc-lt),var(--gold-lt),transparent);}
.tl-item{position:relative;margin-bottom:28px;}
.tl-dot{
  position:absolute;left:-32px;top:4px;
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--acc-lt);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:.5rem;
}
.tl-dot.current{background:var(--acc-mid);border-color:var(--acc-mid);}
.tl-dot.current::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--acc-lt);animation:dotPulse 2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:0;transform:scale(1.5);}}
.tl-year{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.3em;color:var(--ink-4);margin-bottom:3px;}
.tl-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:3px;}
.tl-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;font-weight:300;color:var(--ink-3);}

/* Waiting page specific */
.wait-event-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:20px;max-width:660px;margin:0 auto;}
.wait-ev-card{
  background:var(--white);border-radius:20px;padding:28px 24px;
  box-shadow:0 6px 28px rgba(44,31,24,.08);
  position:relative;overflow:hidden;
}
.wait-ev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ev-stripe);}
.wec-icon{font-size:2.2rem;margin-bottom:14px;display:block;}
.wec-label{font-family:'Cinzel',serif;font-size:.58rem;font-weight:400;letter-spacing:.4em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px;}
.wec-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:var(--ink);margin-bottom:4px;}
.wec-date{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--ink-3);margin-bottom:18px;}

/* Memory grid on waiting page */
.memory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));gap:14px;max-width:780px;margin:0 auto;}
.memory-card{
  background:var(--white);border-radius:14px;padding:18px 16px;
  box-shadow:0 2px 12px rgba(44,31,24,.06);
  text-align:center;cursor:pointer;
  transition:transform .35s var(--spring),box-shadow .35s;
  border-bottom:2px solid var(--acc-pale);
}
.memory-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(44,31,24,.1);}
.mc-emoji{font-size:1.5rem;display:block;margin-bottom:8px;}
.mc-year{font-family:'Cinzel',serif;font-size:.7rem;font-weight:500;letter-spacing:.25em;color:var(--acc-mid);}
.mc-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:var(--ink-3);margin-top:2px;}

/* ── FOOTER ── */
.footer{
  position:relative;z-index:10;background:var(--ink);
  padding:clamp(36px,5vw,56px) clamp(18px,5vw,60px);text-align:center;
}
.footer::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 100%,rgba(192,120,128,.1) 0%,transparent 60%);}
.ft-inner{position:relative;max-width:600px;margin:0 auto;}
.ft-brand{font-family:'Great Vibes',cursive;font-size:clamp(1.8rem,5vw,2.6rem);color:var(--acc-lt);margin-bottom:4px;filter:drop-shadow(0 2px 10px rgba(192,120,128,.3));}

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════ */
const BDAY  = { month:9,  day:25, birthYear:1994 };
const ANNIV = { month:11, day:19, startYear:2023 };

const NOW   = new Date();
const TODAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
const CY    = NOW.getFullYear();
const CM    = NOW.getMonth() + 1;
const CD    = NOW.getDate();

const MN  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MNS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function isToday(m,d){ return CM===m && CD===d; }
function nextOcc(m,d){ let dt=new Date(CY,m-1,d); if(dt<=TODAY) dt=new Date(CY+1,m-1,d); return dt; }
function daysTo(m,d){ return Math.ceil((nextOcc(m,d)-TODAY)/86400000); }
function cdTo(m,d){
  const diff=nextOcc(m,d)-new Date();
  return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
}
function pad(n){return String(n).padStart(2,'0');}
function ordinal(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

// Last reachable birthday year (don't show future years as a surprise)
const lastBdayYear  = (new Date(CY,BDAY.month-1,BDAY.day)  <=TODAY) ? CY : CY-1;
const lastAnnivYear = (new Date(CY,ANNIV.month-1,ANNIV.day)<=TODAY) ? CY : CY-1;

document.getElementById('ft-yr').textContent = CY;

/* generator for ages outside defined range */
function genBdayTheme(age) {
  const palettes = [
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#FAE8E8,transparent 50%),#FBF8F2`,accPale:'#FAE8E8',accLt:'#E8A8B0',accMid:'#C07880',accDark:'#904050',cardBg:'#FEF4F5',anim:'petals',colors:['#F0C8CC','#DDB890','#F8D8DC']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#E8F4EA,transparent 50%),#F8FAF6`,accPale:'#E8F4EA',accLt:'#94C89A',accMid:'#5A9460',accDark:'#3A6840',cardBg:'#F0FAF2',anim:'botanical',colors:['#94C89A','#B8D8A0','#D4E8C8']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#EEF0FA,transparent 50%),#F8F8FC`,accPale:'#EEF0FA',accLt:'#9098D8',accMid:'#5058B0',accDark:'#303880',cardBg:'#F4F5FD',anim:'starfall',colors:['#B0B8F0','#D0B890','#C8C0F0']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#FAF0E4,transparent 50%),#FAF8F2`,accPale:'#FAF0E4',accLt:'#D89858',accMid:'#B07830',accDark:'#784820',cardBg:'#FEF8F2',anim:'aurora',colors:['#E8B870','#E09870','#F0C890']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#E4F4F8,transparent 50%),#F4FAFC`,accPale:'#E4F4F8',accLt:'#68B8C8',accMid:'#3888A0',accDark:'#1A5870',cardBg:'#EEF8FC',anim:'bubbles',colors:['#88CCD8','#A8D8E8','#C8ECF0']},
  ];
  const p = palettes[age % palettes.length];
  return {
    name:`${age} — Another Beautiful Year`,
    tagline:`${age} years of the most extraordinary woman I know.`,
    bg:p.bg, accPale:p.accPale, accLt:p.accLt, accMid:p.accMid, accDark:p.accDark,
    cardBg:p.cardBg, animType:p.anim, animColors:p.colors,
    poem:[`${age} candles, each one a year of light,`,`a testament to who you've grown to be,`,`more beautiful, more whole, more radiant,`,`more wonderful than words can ever say from me.`],
    msgA:`${age} years of you — and still, still, every year finds me more amazed than the last. There is something about the way you exist in the world that refuses to become ordinary, no matter how many years pass. <em>You are stubbornly, gloriously extraordinary.</em>`,
    msgB:`I have catalogued every version of you that has existed across the years: the nervous ones, the triumphant ones, the quiet Tuesday ones that I love most of all. <strong>Every single version has been my favourite.</strong> This one included. Especially this one.`,
    msgC:`Happy ${ordinal(age)} birthday, Sindhu. The years are counting, but what they're counting is beauty — and that particular number only grows.`,
    milestone:`🎂 Year ${age} Celebration`,
    mileTitle:`${age} Magnificent Years`,
    mileText:`Another year of you, which means another year of the world being richer, warmer, and infinitely more beautiful for your presence in it.`,
    wishes:[
      {icon:'🌟',title:'Joy Always',text:'May this year overflow with the joy you so freely give to everyone around you.'},
      {icon:'🌹',title:'Deep Love',text:'May our love continue to deepen and surprise us both with its beauty.'},
      {icon:'✨',title:'Your Light',text:'May you never forget how brightly you shine, even on the days when you cannot feel it.'},
      {icon:'💛',title:'All My Love',text:'Every wish I have is wrapped up in one: may you be happy, deeply and completely happy.'},
    ]
  };
}

function getBdayTheme(age){ return BDAY_THEMES[age] || genBdayTheme(age); }

/* generate for years beyond defined */
function genAnnivTheme(years) {
  const milestones = {
    6:"Candy/Iron",7:"Wool/Copper",8:"Bronze/Pottery",9:"Pottery",10:"Tin/Aluminum",
    11:"Steel",12:"Silk/Linen",13:"Lace",14:"Ivory/Opal",15:"Crystal",20:"China",
    25:"Silver",30:"Pearl",35:"Coral",40:"Ruby",45:"Sapphire",50:"Gold",
    55:"Emerald",60:"Diamond",65:"Blue Sapphire",70:"Platinum"
  };
  const nearest = Object.keys(milestones).map(Number).reduce((a,b)=>Math.abs(b-years)<Math.abs(a-years)?b:a);
  const ms = milestones[nearest] || `${years}-Year`;
  const palettes=[
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#FAE8E8,transparent 50%),#FBF8F2`,p:'#FAE8E8',l:'#E8A8B0',m:'#C07880',d:'#904050',cb:'#FEF4F5',a:'petals',c:['#F0C8CC','#DDB890']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#F4E0C8,transparent 50%),#FAF4EC`,p:'#F4E0C8',l:'#C09060',m:'#906038',d:'#603818',cb:'#FEF8F0',a:'aurora',c:['#D0A870','#E0C098']},
    {bg:`radial-gradient(ellipse 70% 55% at 0% 0%,#E4F0F8,transparent 50%),#F4F8FC`,p:'#E4F0F8',l:'#68A8C8',m:'#387898',d:'#1A4870',cb:'#EEF8FC',a:'sparkles',c:['#88C0D8','#A8D0E8']},
  ];
  const p = palettes[years%palettes.length];
  return {
    name:`${years} Years of Extraordinary Love`,
    tagline:`${years} years — and every single one has been the best year of my life.`,
    traditional:`${ms} Anniversary`,
    traditionalNote:`Like ${ms.toLowerCase()}: a symbol of what we have built — enduring, precious, and more valuable with every year.`,
    bg:p.bg, accPale:p.p, accLt:p.l, accMid:p.m, accDark:p.d, cardBg:p.cb,
    animType:p.a, animColors:p.c,
    poem:[`${years} years — and I would write it in gold,`,`on every surface I could find,`,`that choosing you was the best decision,`,`that loving you is peace of mind.`],
    msgA:`${years} years of marriage to the most extraordinary person I have ever known. <em>Every year has added something to us that we couldn't have had without the years before it.</em> We are richer for every season we have shared.`,
    msgB:`I look at what we have built — our family, our home, the private world that only we two fully understand — and I am moved by how much of it is beautiful, and how much of its beauty came from choosing to keep going on the days when going was hard. <strong>That is what real love looks like. We have it.</strong>`,
    msgC:`${years} years, Sindhu. And I choose you still, every morning, in every version of this life. Happy anniversary, my love. The very best is still ahead of us.`,
    milestone:`🥂 ${years}-Year Anniversary`,
    mileTitle:`${ordinal(years)} Anniversary — ${ms}`,
    mileText:`${ms}: a symbol of ${years} extraordinary years of love, growth, and the daily miracle of two people choosing each other completely.`,
    journeyNote:`${years} years: proof that what two people build together, with intention and love and the willingness to keep going, is the most beautiful thing in the world.`,
    wishes:[
      {icon:'🌹',title:'Enduring Love',text:'May what we have only deepen and grow more beautiful with every year we add to it.'},
      {icon:'✨',title:'Our Light',text:'May we always be each other\'s light — in the bright times and especially in the dark ones.'},
      {icon:'🥂',title:'Celebration',text:'May we always find reasons to celebrate — each other, our family, this extraordinary life.'},
      {icon:'💛',title:'Always',text:'Always and forever, in every year that comes — this love is yours and this love is ours.'},
    ]
  };
}

function getAnnivTheme(years){ return ANNIV_THEMES[years] || genAnnivTheme(years); }

function applyTheme(t) {
  const r = document.documentElement;
  r.style.setProperty('--bg',        'transparent');
  r.style.setProperty('--acc-pale',  t.accPale);
  r.style.setProperty('--acc-lt',    t.accLt);
  r.style.setProperty('--acc-mid',   t.accMid);
  r.style.setProperty('--acc-dark',  t.accDark);
  r.style.setProperty('--card-bg',   t.cardBg);
  r.style.setProperty('--gold',      '#C09A52');
  r.style.setProperty('--gold-lt',   '#D8BC82');
  // bg-base gradient
  document.getElementById('bg-base').style.background = t.bg;
}

/* ══════════════════════════════════════════════════════
   DETERMINE WHICH PAGE TO SHOW
══════════════════════════════════════════════════════ */
function detectPage() {
  if (isToday(BDAY.month, BDAY.day)) {
    state.page = 'birthday';
    state.bdayViewYear = CY;
    renderBirthday(CY);
  } else if (isToday(ANNIV.month, ANNIV.day)) {
    state.page = 'anniversary';
    state.annivViewYear = CY;
    renderAnniversary(CY);
  } else {
    state.page = 'waiting';
    renderWaiting();
  }
}

function tickWaiting() {
  const bd = cdTo(BDAY.month,  BDAY.day);
  const an = cdTo(ANNIV.month, ANNIV.day);
  const elems = {
    'bd-d':bd.d,'bd-h':bd.h,'bd-m':bd.m,'bd-s':bd.s,
    'an-d':an.d,'an-h':an.h,'an-m':an.m,'an-s':an.s,
  };
  Object.entries(elems).forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(el && el.textContent !== pad(val)){
      el.style.opacity='.3'; el.style.transform='translateY(-4px)';
      setTimeout(()=>{ el.textContent=pad(val); el.style.opacity=''; el.style.transform=''; },150);
    }
  });
}

function openMemory(type, year) {
  if(type==='birthday') renderBirthday(year, true);
  else renderAnniversary(year, true);
}

/* ══════════════════════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════════════════════ */
function initReveal() {
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{threshold:.1});
  document.querySelectorAll('.sr,.sr-l,.sr-r').forEach(el=>io.observe(el));
}

/* ══════════════════════════════════════════════════════
   ANIMATION ENGINE
══════════════════════════════════════════════════════ */
let animLoop = null;
let petalTimer = null;

function clearAnim() {
  if(animLoop){ cancelAnimationFrame(animLoop); animLoop=null; }
  if(petalTimer){ clearInterval(petalTimer); petalTimer=null; }
  document.getElementById('petal-layer').innerHTML='';
  document.getElementById('shape-layer').innerHTML='';
  const cv=document.getElementById('fx-canvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
}

function startAnim(type, colors) {
  clearAnim();
  const cv=document.getElementById('fx-canvas');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);

  if(type==='petals')    animPetals(colors);
  else if(type==='sparkles')  animSparkles(cv, colors);
  else if(type==='starfall')  animStarfall(cv, colors);
  else if(type==='bubbles')   animBubbles(cv, colors);
  else if(type==='geometric') animGeometric(colors);
  else if(type==='botanical') animBotanical(colors);
  else if(type==='aurora')    animAurora(cv, colors);
  else if(type==='confetti')  animConfetti(cv, colors);
  else animSparkles(cv, colors);
}

/* ── petals ── */
function animPetals(colors) {
  function mkPetal() {
    const layer=document.getElementById('petal-layer');
    const el=document.createElement('div');
    const sz=7+Math.random()*15;
    const c=colors[Math.floor(Math.random()*colors.length)];
    const dur=12+Math.random()*10;
    el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-60px;pointer-events:none;opacity:0;animation:petal${Math.floor(Math.random()*3)+1} ${dur}s ${Math.random()*3}s linear forwards;`;
    el.innerHTML=`<svg width="${sz}" height="${sz*1.4}" viewBox="0 0 20 28"><ellipse cx="10" cy="14" rx="6" ry="13" fill="${c}" opacity=".75" transform="rotate(${Math.random()*25-12.5},10,14)"/></svg>`;
    layer.appendChild(el);
    setTimeout(()=>el.remove(), (dur+4)*1000);
  }
  // Inject keyframes
  if(!document.getElementById('petalKF')){
    const s=document.createElement('style'); s.id='petalKF';
    s.textContent=`
      @keyframes petal1{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.55}95%{opacity:.2}100%{opacity:0;transform:translateY(115vh) rotate(720deg) translateX(80px)}}
      @keyframes petal2{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.45}95%{opacity:.15}100%{opacity:0;transform:translateY(115vh) rotate(-540deg) translateX(-60px)}}
      @keyframes petal3{0%{opacity:0;transform:translateY(0) rotate(0)}5%{opacity:.5}95%{opacity:.18}100%{opacity:0;transform:translateY(115vh) rotate(900deg) translateX(50px)}}`;
    document.head.appendChild(s);
  }
  for(let i=0;i<10;i++) setTimeout(mkPetal,i*600);
  petalTimer=setInterval(mkPetal, 1600);
}

/* ── sparkles (canvas) ── */
function animSparkles(cv, colors) {
  const ctx=cv.getContext('2d');
  const pts=Array.from({length:60},()=>({
    x:Math.random()*cv.width, y:Math.random()*cv.height,
    r:0.6+Math.random()*2, vx:(Math.random()-.5)*.2,
    vy:-(0.1+Math.random()*.3), a:Math.random(),
    va:0.005+Math.random()*.012,
    c:colors[Math.floor(Math.random()*colors.length)]
  }));
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach((p,i)=>{
      p.x+=p.vx; p.y+=p.vy; p.a+=p.va;
      if(p.y<-10||p.a>1.05){
        p.x=Math.random()*cv.width; p.y=cv.height+10; p.a=0;
      }
      const alpha=.55*Math.sin(Math.PI*p.a);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));
      ctx.fill();
    });
    animLoop=requestAnimationFrame(frame);
  }
  frame();
}

/* ── starfall (canvas) ── */
function animStarfall(cv, colors) {
  const ctx=cv.getContext('2d');
  const stars=Array.from({length:55},()=>({
    x:Math.random()*cv.width, y:Math.random()*cv.height,
    r:0.5+Math.random()*1.8, vy:0.3+Math.random()*.8,
    a:Math.random(), c:colors[Math.floor(Math.random()*colors.length)]
  }));
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.y+=s.vy; s.a+=0.008;
      if(s.y>cv.height+10){ s.y=-10; s.x=Math.random()*cv.width; }
      const alpha=.5*Math.abs(Math.sin(s.a));
      // 4-point star
      ctx.save(); ctx.translate(s.x,s.y); ctx.fillStyle=s.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));
      ctx.beginPath();
      const r=s.r*1.8, ri=s.r*.4;
      for(let i=0;i<8;i++){
        const angle=i*Math.PI/4;
        const rad=i%2===0?r:ri;
        i===0?ctx.moveTo(Math.cos(angle)*rad,Math.sin(angle)*rad):ctx.lineTo(Math.cos(angle)*rad,Math.sin(angle)*rad);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    });
    animLoop=requestAnimationFrame(frame);
  }
  frame();
}

/* ── bubbles (canvas) ── */
function animBubbles(cv, colors) {
  const ctx=cv.getContext('2d');
  const bubs=Array.from({length:40},()=>({
    x:Math.random()*cv.width, y:cv.height+50,
    r:3+Math.random()*8, vy:-(0.25+Math.random()*.5),
    a:Math.random(), c:colors[Math.floor(Math.random()*colors.length)],
    wobble:Math.random()*Math.PI*2, ws:(Math.random()-.5)*.02
  }));
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    bubs.forEach(b=>{
      b.y+=b.vy; b.wobble+=b.ws; b.a+=0.006;
      if(b.y<-20){ b.y=cv.height+30; b.x=Math.random()*cv.width; b.a=0; }
      b.x+=Math.sin(b.wobble)*.4;
      const alpha=.35*Math.sin(Math.PI*Math.min(b.a,1));
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle=b.c+(Math.round(alpha*255).toString(16).padStart(2,'0'));
      ctx.lineWidth=1; ctx.stroke();
      // highlight
      ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.25,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${alpha*.5})`;
      ctx.fill();
    });
    animLoop=requestAnimationFrame(frame);
  }
  frame();
}

/* ── geometric (CSS shapes) ── */
function animGeometric(colors) {

  }
  function mkShape(){
    const el=document.createElement('div');
    const sz=8+Math.random()*20;
    const c=colors[Math.floor(Math.random()*colors.length)];

    const anim=Math.random()<.5?'geoRise':'geoFall';
    const startY=anim==='geoRise'?`bottom:${-50}px;`:`top:${-50}px;`;
    let shape='';
    if(type<.33) shape=`border-radius:50%;width:${sz}px;height:${sz}px;background:${c};opacity:.4;`;
    else if(type<.66) shape=`width:${sz*.7}px;height:${sz*.7}px;background:${c};opacity:.3;transform:rotate(45deg);`;
    else shape=`width:0;height:0;border-left:${sz*.5}px solid transparent;border-right:${sz*.5}px solid transparent;border-bottom:${sz*.9}px solid ${c};opacity:.25;`;
    el.style.cssText=`position:absolute;left:${Math.random()*100}%;${startY}animation:${anim} ${dur}s ${Math.random()*4}s linear forwards;${shape}`;
    layer.appendChild(el);
    setTimeout(()=>el.remove(),(dur+5)*1000);

  for(let i=0;i<14;i++) setTimeout(mkShape,i*500);

    el.innerHTML=`<svg width="${sz}" height="${sz*1.8}" viewBox="0 0 20 36"><path d="M10 2 C16 8 18 14 14 22 C12 28 10 34 10 34 C10 34 8 28 6 22 C2 14 4 8 10 2Z" fill="${c}" opacity=".65"/><path d="M10 2 L10 34" stroke="${c}" stroke-width=".5" opacity=".3"/></svg>`;

/* ── aurora (canvas smooth blobs) ── */
function animAurora(cv, colors) {
  const ctx=cv.getContext('2d');
  const blobs=colors.slice(0,4).map((c,i)=>({
    x:cv.width*(0.2+i*.2), y:cv.height*(0.3+i*.15),
    vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.3,
    r:cv.width*.18+i*30, c
  }));
  let tick=0;
  function frame(){
    tick++;
    ctx.clearRect(0,0,cv.width,cv.height);
    blobs.forEach((b,i)=>{
      b.x+=b.vx+Math.sin(tick*.007+i)*0.5;
      b.y+=b.vy+Math.cos(tick*.009+i)*0.4;
      if(b.x<0||b.x>cv.width) b.vx*=-1;
      if(b.y<0||b.y>cv.height) b.vy*=-1;
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,b.c+'18');
      g.addColorStop(1,b.c+'00');
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    animLoop=requestAnimationFrame(frame);
  }
  frame();
}

/* ── confetti (canvas burst) ── */
function animConfetti(cv, colors) {
  const ctx=cv.getContext('2d');
  let particles=[];
  function burst(n=120){
    for(let i=0;i<n;i++){
      particles.push({
        x:Math.random()*cv.width, y:-20,
        vx:(Math.random()-.5)*5, vy:1.5+Math.random()*4,
        w:4+Math.random()*9, h:6+Math.random()*5,
        rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.18,
        c:colors[Math.floor(Math.random()*colors.length)], op:1,
        shape:Math.random()<.5?'rect':'circle'
      });
    }
  }
  burst(140);
  setInterval(()=>burst(60), 4000);
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    particles=particles.filter(p=>p.y<cv.height+30&&p.op>.02);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vy+=.04;
      if(p.y>cv.height*.75) p.op-=.015;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.op; ctx.fillStyle=p.c;
      if(p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      else { ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    animLoop=requestAnimationFrame(frame);
  }
  frame();
}

/* Spawn soft petals inside the loader while it's visible */
function spawnLoaderPetals() {
  const layer = document.getElementById('ld-petals');
  if (!layer) return;
  const colors = ['#F0C8CC','#F4DEC8','#FAE8DC','#EDD8D0','#F8E0DC'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'ld-petal';
    const sz = 7 + Math.random() * 14;
    const c  = colors[Math.floor(Math.random() * colors.length)];
    const dur = 8 + Math.random() * 7;
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:-40px;
      animation-duration:${dur}s;
      animation-delay:${Math.random()*5}s;
    `;
    el.innerHTML = `<svg width="${sz}" height="${sz*1.4}" viewBox="0 0 20 28">
      <ellipse cx="10" cy="14" rx="6" ry="13" fill="${c}" opacity=".6"
        transform="rotate(${Math.random()*25-12},10,14)"/>
    </svg>`;
    layer.appendChild(el);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  spawnLoaderPetals();
  detectPage();

  // Reveal bg + app after loader exit
  setTimeout(() => {
    document.getElementById('loader').classList.add('out');
    // Slight delay so loader starts fading before content appears
    setTimeout(() => {
      document.getElementById('bg-base').classList.add('in');
      document.querySelector('.bg-noise').classList.add('in');
      document.getElementById('app').classList.add('in');
    }, 200);
  }, 2400);
});
</script>
